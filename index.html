<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>INFINITE PLANE • Regen • Easy Mode • Smart Inventory</title>
    <style>
        * {
            user-select: none;
            touch-action: none;
        }
        body {
            margin: 0;
            overflow: hidden;
            background: #0a1f1a;
            font-family: 'Segoe UI', system-ui, monospace;
        }
        canvas {
            display: block;
            background: #2c5e3f;
            cursor: crosshair;
        }
        /* Joystick bases */
        .joy-base {
            position: fixed;
            width: 130px;
            height: 130px;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255,220,150,0.9);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: auto;
            z-index: 20;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        .joy-thumb {
            position: fixed;
            width: 55px;
            height: 55px;
            background: #ffd966;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 21;
            box-shadow: 0 0 12px gold;
        }
        #shootBase, #skillBase { background: rgba(0,0,0,0.45); }
        #shootThumb { background: #ff7043; box-shadow: 0 0 12px #ff5722; }
        #skillThumb { background: #42a5f5; box-shadow: 0 0 12px #2196f3; }
        .action-btn {
            position: fixed;
            padding: 12px 28px;
            font-weight: bold;
            color: white;
            border: 3px solid white;
            border-radius: 60px;
            cursor: pointer;
            z-index: 100;
            font-size: 1rem;
            backdrop-filter: blur(8px);
            transition: 0.05s linear;
            text-align: center;
        }
        #dashBtn {
            bottom: 30px;
            right: 30px;
            background: #d62828;
        }
        #dashBtn:active { transform: scale(0.94); background: #b71c1c; }
        #dashBtn.disabled { background: #5a626e; border-color: #aaa; pointer-events: none; opacity: 0.6; }
        #pickupBtn {
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2a9d8f;
            padding: 10px 32px;
            display: none;
            font-size: 0.9rem;
        }
        #deathScreen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 200;
            color: white;
            font-size: 3rem;
            font-weight: bold;
        }
        #restartBtn {
            margin-top: 30px;
            padding: 14px 40px;
            font-size: 1.3rem;
            background: #f4a261;
            border: none;
            border-radius: 60px;
            cursor: pointer;
        }
        .ui-text {
            position: fixed;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            padding: 5px 14px;
            border-radius: 40px;
            font-weight: bold;
            font-family: monospace;
            font-size: 0.9rem;
            pointer-events: none;
            z-index: 99;
        }
        #enemyCounter { bottom: 20px; left: 20px; color: #ffd966; }
        #regenStatus { top: 20px; left: 20px; color: #aaffdd; }
        #easyToggle {
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 50px;
            color: #f9c74f;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid #ffb347;
            font-family: monospace;
            pointer-events: auto;
        }
        #easyToggle.active { background: #4caf50; color: white; border-color: white; box-shadow: 0 0 15px #4caf50; }
        .inv-slot {
            position: fixed;
            bottom: 120px;
            left: 20px;
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 20px;
            z-index: 98;
            pointer-events: none;
        }
        .inv-icon {
            width: 45px;
            height: 45px;
            background: rgba(0,0,0,0.6);
            border: 2px solid white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div class="joy-base" id="moveBase"></div><div class="joy-thumb" id="moveThumb"></div>
<div class="joy-base" id="shootBase"></div><div class="joy-thumb" id="shootThumb"></div>
<div class="joy-base" id="skillBase"></div><div class="joy-thumb" id="skillThumb"></div>
<button id="dashBtn" class="action-btn">⚡ DASH</button>
<button id="pickupBtn" class="action-btn">📦 PICK UP</button>
<div id="deathScreen"><div>💀 YOU DIED 💀</div><button id="restartBtn">⟳ RESTART</button></div>
<div id="enemyCounter" class="ui-text">👥 ENEMIES: 0 / 8</div>
<div id="regenStatus" class="ui-text">❤️ REGEN: --</div>
<div id="easyToggle">🔘 EASY MODE: OFF</div>
<div class="inv-slot" id="invSlots"></div>

<script>
    (function(){
        // ---------- CANVAS ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // ---------- GAME CONST ----------
        const MAX_ENEMIES = 8;
        let easyMode = false;
        const EASY_HP_FACTOR = 0.4;
        const REGEN_DELAY = 5.0;    // seconds
        const REGEN_RATE = 12;       // HP/s

        // player
        let player = {
            worldX: canvas.width/2,
            worldY: canvas.height/2,
            radius: 18,
            baseSpeed: 280,
            health: 100,
            maxHealth: 100,
            isDead: false
        };
        let lastDamageTime = performance.now() / 1000;

        // camera
        let camX = 0, camY = 0;

        // dash
        let dashActive = false, dashTimer = 0, dashDir = {x:0,y:0}, dashCooldown = 0;
        const DASH_DUR = 0.25, DASH_SPEED = 1250, DASH_CD = 1.0;

        // movement & recoil
        let moveVec = {x:0,y:0}, recoil = {x:0,y:0};

        // inventory (4 slots)
        let inventory = [null, null, null, null];
        let currentWeapon = null;

        // weapon data
        const pistol = { ammo:12, maxAmmo:12, spare:20, reload:1.2, fireRate:0.45, speed:600, dmg:10 };
        const shotgun = { ammo:8, maxAmmo:8, spare:20, reload:1.8, pellets:8, spread:Math.PI/9, speed:500, dmg:8, recoilForce:400 };
        const sniper = { ammo:5, maxAmmo:5, spare:10, reload:2.0, fireRate:1.5, speed:6000, dmg:70, recoilForce:600 };
        const daggerW = { dmg:25, dashDist:120, dashDur:0.12, cd:0.7 };
        const spray = { ammo:30, maxAmmo:30, spare:5, reload:1.5, burstCount:3, burstDelay:0.06, burstCd:0.25, speed:550, dmg:6, spread:0.15 };

        let isReloading = false, reloadTimer = 0, lastFire = 0;
        let sprayBurstLeft = 0, sprayBurstTimer = 0, sprayNextBurst = 0;
        let skillCD = 0, skillDur = 0;
        let daggerDashActive = false, daggerDashT = 0, daggerDashDir = {x:0,y:0}, daggerDashSpd = 0, daggerCD = 0;
        let daggerSkillActive = false, daggerSkillT = 0, daggerSkillDir = {x:0,y:0}, daggerSkillSpd = 0;
        let skillTarget = {x:0,y:0};
        let spraySkillActive = false, spraySkillBack = false, spraySkillT = 0, spraySkillBullets = 0, spraySkillNextFire = 0, spraySkillAim = {x:0,y:0};

        // world objects
        let floorItems = [];
        let enemies = [];
        let playerBullets = [];
        let enemyBullets = [];
        let houses = [];
        let screenShake = 0, shakeTimer = 0, skillFlash = 0;

        // wave spawn
        let waveTimer = 0, waveNum = 0;
        const WAVE_INTERVAL = 4.0;
        const enemyTypes = ['pistol','sword','spray','gang','shotgun','sniper'];
        const baseHealth = { pistol:40, sword:60, spray:50, gang:20, shotgun:50, sniper:30 };

        // ---------- helper functions ----------
        function updateUI() {
            document.getElementById('enemyCounter').innerHTML = `👥 ENEMIES: ${enemies.length} / ${MAX_ENEMIES}`;
            let invDiv = document.getElementById('invSlots');
            invDiv.innerHTML = '';
            for(let i=0;i<4;i++){
                let slot = inventory[i];
                let icon = slot ? (slot.icon || '⬜') : '⬛';
                invDiv.innerHTML += `<div class="inv-icon" style="border-color:${currentWeapon===slot?.name?'#ffaa44':'white'}">${icon}</div>`;
            }
        }

        function applyEasyHealth(e){
            let base = baseHealth[e.type] || 30;
            if(easyMode) e.health = Math.max(1, Math.floor(base * EASY_HP_FACTOR));
            else e.health = base;
        }

        function setEasyMode(val){
            easyMode = val;
            let btn = document.getElementById('easyToggle');
            if(easyMode){ btn.innerText = '🌟 EASY MODE: ON'; btn.classList.add('active'); }
            else { btn.innerText = '🔘 EASY MODE: OFF'; btn.classList.remove('active'); }
            for(let e of enemies) applyEasyHealth(e);
        }
        document.getElementById('easyToggle').addEventListener('click', ()=> setEasyMode(!easyMode));

        function damagePlayer(amt){
            if(player.isDead) return;
            player.health = Math.max(0, player.health - amt);
            lastDamageTime = performance.now() / 1000;
            if(player.health <= 0){ player.isDead = true; document.getElementById('deathScreen').style.display = 'flex'; }
        }

        function updateRegen(dt){
            if(player.isDead) return;
            let nowSec = performance.now()/1000;
            let since = nowSec - lastDamageTime;
            let txt = "❤️ REGEN: ";
            if(since >= REGEN_DELAY && player.health < player.maxHealth){
                let heal = REGEN_RATE * dt;
                player.health = Math.min(player.maxHealth, player.health + heal);
                txt += `ACTIVE +${Math.floor(heal)}`;
            } else if(since < REGEN_DELAY) txt += `WAIT ${(REGEN_DELAY-since).toFixed(1)}s`;
            else txt += "FULL";
            document.getElementById('regenStatus').innerText = txt;
        }

        // spawn enemy with cap
        function spawnEnemy(type, wx, wy){
            if(enemies.length >= MAX_ENEMIES) return;
            let e = { type, worldX:wx, worldY:wy, radius:16, speed:120, drop:type };
            if(type==='pistol') e = {...e, radius:18, health:40, speed:120, fireRate:0.6, lastFire:0, dmg:10};
            else if(type==='sword') e = {...e, radius:14, health:60, speed:160, meleeDmg:25, meleeCd:0.5, lastMelee:0};
            else if(type==='spray') e = {...e, radius:16, health:50, speed:140, burstCd:0.7, lastBurst:0, burstCount:3, burstDmg:4};
            else if(type==='gang') e = {...e, radius:12, health:20, speed:130, meleeDmg:15, meleeCd:0.6, lastMelee:0};
            else if(type==='shotgun') e = {...e, radius:16, health:50, speed:140, fireCd:0.9, lastFire:0, pellets:5, dmg:6, spreadAngle:0.3};
            else if(type==='sniper') e = {...e, radius:16, health:30, speed:100, fireCd:1.2, lastFire:0, bulletSpeed:800, dmg:25};
            applyEasyHealth(e);
            enemies.push(e);
            updateUI();
        }

        function spawnWave(){
            if(enemies.length >= MAX_ENEMIES) return;
            waveNum++;
            let add = Math.min(1 + Math.floor((waveNum-1)/2), 5);
            let slots = MAX_ENEMIES - enemies.length;
            let toSpawn = Math.min(add, slots);
            for(let i=0;i<toSpawn;i++){
                let type = enemyTypes[Math.floor(Math.random()*enemyTypes.length)];
                let ang = Math.random()*Math.PI*2;
                let dist = 400 + Math.random()*280;
                let wx = player.worldX + Math.cos(ang)*dist;
                let wy = player.worldY + Math.sin(ang)*dist;
                spawnEnemy(type, wx, wy);
            }
        }

        // inventory: full -> replace current weapon (drop old)
        function pickupWeapon(item){
            let full = inventory.every(s => s !== null);
            if(full){
                if(currentWeapon) floorItems.push({ worldX:player.worldX, worldY:player.worldY, radius:15, active:true, type:currentWeapon });
                let idx = inventory.findIndex(s => s && s.name === currentWeapon);
                if(idx !== -1){
                    let icons = { pistol:'🔫', shotgun:'🖖', sniper:'🔭', dagger:'🗡️', spray:'💥' };
                    inventory[idx] = { name:item.type, icon:icons[item.type] };
                    equipWeapon(item.type);
                }
                item.active = false;
                updateUI();
                return;
            }
            let slot = inventory.findIndex(s => !s);
            if(slot === -1) return;
            let icons = { pistol:'🔫', shotgun:'🖖', sniper:'🔭', dagger:'🗡️', spray:'💥' };
            inventory[slot] = { name:item.type, icon:icons[item.type] };
            item.active = false;
            if(currentWeapon !== item.type) equipWeapon(item.type);
            updateUI();
        }

        function equipWeapon(type){
            currentWeapon = type;
            isReloading = false;
            daggerDashActive = false; daggerSkillActive = false; spraySkillActive = false;
            if(type === 'shotgun' || type === 'sniper' || type === 'dagger' || type === 'spray'){
                document.getElementById('skillBase').style.display = 'block';
                document.getElementById('skillThumb').style.display = 'block';
                skillDur = type==='shotgun'?1.0 : (type==='sniper'?8.0 : (type==='dagger'?7.0:6.0));
                skillCD = 0;
            } else {
                document.getElementById('skillBase').style.display = 'none';
                document.getElementById('skillThumb').style.display = 'none';
            }
            document.getElementById('shootBase').style.display = 'block';
            document.getElementById('shootThumb').style.display = 'block';
        }

        // house generation & collision
        function generateHouses(){
            for(let i=0;i<18;i++){
                let x = (Math.random()-0.5)*1800, y = (Math.random()-0.5)*1800;
                if(Math.hypot(x-player.worldX, y-player.worldY) < 180) continue;
                let w = 45+Math.random()*55, h = 45+Math.random()*55;
                houses.push([{ x:x-w/2, y:y-h/2, w, h }]);
            }
        }
        generateHouses();

        function collideWithHouses(entity){
            for(let group of houses){
                for(let rect of group){
                    let cx = Math.max(rect.x, Math.min(entity.worldX, rect.x+rect.w));
                    let cy = Math.max(rect.y, Math.min(entity.worldY, rect.y+rect.h));
                    let dx = entity.worldX-cx, dy = entity.worldY-cy;
                    let dist = Math.hypot(dx,dy);
                    if(dist < entity.radius){
                        let ang = Math.atan2(dy,dx);
                        let overlap = entity.radius - dist;
                        entity.worldX += Math.cos(ang)*overlap;
                        entity.worldY += Math.sin(ang)*overlap;
                    }
                }
            }
        }

        // shooting
        function firePistol(dirX, dirY, now){
            if(isReloading || pistol.ammo <= 0){ if(pistol.ammo===0 && !isReloading){ isReloading=true; reloadTimer=pistol.reload; } return false; }
            if(now - lastFire < pistol.fireRate*1000) return false;
            let mag = Math.hypot(dirX,dirY);
            let vx = (dirX/mag)*pistol.speed, vy = (dirY/mag)*pistol.speed;
            playerBullets.push({ worldX:player.worldX, worldY:player.worldY, vx, vy, radius:5, dmg:pistol.dmg, isBeam:false });
            pistol.ammo--;
            lastFire = now;
            screenShake=3; shakeTimer=0.07;
            if(pistol.ammo===0 && !isReloading){ isReloading=true; reloadTimer=pistol.reload; }
            return true;
        }

        function fireShotgun(dirX, dirY){
            if(isReloading || shotgun.ammo <= 0){ if(shotgun.ammo===0 && !isReloading){ isReloading=true; reloadTimer=shotgun.reload; } return; }
            let mag = Math.hypot(dirX,dirY);
            let baseX = dirX/mag, baseY = dirY/mag;
            for(let i=0;i<shotgun.pellets;i++){
                let angle = Math.atan2(baseY, baseX) + (Math.random()*2-1)*shotgun.spread;
                let spd = shotgun.speed + (Math.random()*100-50);
                playerBullets.push({ worldX:player.worldX, worldY:player.worldY, vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd, radius:3, dmg:shotgun.dmg, isBeam:false });
            }
            shotgun.ammo--;
            recoil.x -= baseX * shotgun.recoilForce;
            recoil.y -= baseY * shotgun.recoilForce;
            screenShake=6; shakeTimer=0.12;
            if(shotgun.ammo===0 && !isReloading){ isReloading=true; reloadTimer=shotgun.reload; }
        }

        // ----- JOYSTICKS (full working) -----
        let moveId=null, moveCenter={x:0,y:0}, moveMax=0;
        let shootId=null, shootCenter={x:0,y:0}, shootMax=0, shootActive=false, shootDir={x:0,y:0};
        let skillId=null, skillCenter={x:0,y:0}, skillMax=0, skillActive=false, skillDir={x:0,y:0};

        const moveBase=document.getElementById('moveBase'), moveThumb=document.getElementById('moveThumb');
        const shootBase=document.getElementById('shootBase'), shootThumb=document.getElementById('shootThumb');
        const skillBase=document.getElementById('skillBase'), skillThumb=document.getElementById('skillThumb');

        function updateMoveRect(){ let r=moveBase.getBoundingClientRect(); moveCenter={x:r.left+r.width/2, y:r.top+r.height/2}; moveMax=(r.width/2)-(moveThumb.offsetWidth/2); }
        function updateShootRect(){ let r=shootBase.getBoundingClientRect(); shootCenter={x:r.left+r.width/2, y:r.top+r.height/2}; shootMax=(r.width/2)-(shootThumb.offsetWidth/2); }
        function updateSkillRect(){ let r=skillBase.getBoundingClientRect(); skillCenter={x:r.left+r.width/2, y:r.top+r.height/2}; skillMax=(r.width/2)-(skillThumb.offsetWidth/2); }

        function setMoveThumb(cx,cy){ let dx=cx-moveCenter.x, dy=cy-moveCenter.y; let d=Math.hypot(dx,dy); if(d>moveMax){dx=(dx/d)*moveMax; dy=(dy/d)*moveMax;} moveThumb.style.left=(moveCenter.x+dx)+'px'; moveThumb.style.top=(moveCenter.y+dy)+'px'; moveVec.x=d>1?dx/moveMax:0; moveVec.y=d>1?dy/moveMax:0; }
        function resetMove(){ moveThumb.style.left=moveCenter.x+'px'; moveThumb.style.top=moveCenter.y+'px'; moveVec={x:0,y:0}; moveId=null; }
        function setShootThumb(cx,cy){ let dx=cx-shootCenter.x, dy=cy-shootCenter.y; let d=Math.hypot(dx,dy); if(d>shootMax){dx=(dx/d)*shootMax; dy=(dy/d)*shootMax;} shootThumb.style.left=(shootCenter.x+dx)+'px'; shootThumb.style.top=(shootCenter.y+dy)+'px'; shootDir.x=d>1?dx/shootMax:0; shootDir.y=d>1?dy/shootMax:0; }
        function resetShoot(){ shootThumb.style.left=shootCenter.x+'px'; shootThumb.style.top=shootCenter.y+'px'; shootDir={x:0,y:0}; shootId=null; shootActive=false; }
        function setSkillThumb(cx,cy){ let dx=cx-skillCenter.x, dy=cy-skillCenter.y; let d=Math.hypot(dx,dy); if(d>skillMax){dx=(dx/d)*skillMax; dy=(dy/d)*skillMax;} skillThumb.style.left=(skillCenter.x+dx)+'px'; skillThumb.style.top=(skillCenter.y+dy)+'px'; skillDir.x=d>1?dx/skillMax:0; skillDir.y=d>1?dy/skillMax:0; if(d>0){ let range= currentWeapon==='shotgun'?120:(currentWeapon==='dagger'?380:200); let mag=Math.hypot(skillDir.x,skillDir.y); skillTarget.x=player.worldX+(skillDir.x/mag)*range; skillTarget.y=player.worldY+(skillDir.y/mag)*range; } }
        function resetSkill(){ skillThumb.style.left=skillCenter.x+'px'; skillThumb.style.top=skillCenter.y+'px'; skillDir={x:0,y:0}; skillId=null; skillActive=false; }

        updateMoveRect(); updateShootRect(); updateSkillRect();
        window.addEventListener('resize',()=>{ updateMoveRect(); updateShootRect(); updateSkillRect(); });

        moveBase.addEventListener('pointerdown',(e)=>{ if(moveId===null && !player.isDead){ e.preventDefault(); moveId=e.pointerId; moveBase.setPointerCapture(e.pointerId); updateMoveRect(); setMoveThumb(e.clientX,e.clientY); } });
        moveBase.addEventListener('pointermove',(e)=>{ if(moveId===e.pointerId){ e.preventDefault(); setMoveThumb(e.clientX,e.clientY); } });
        moveBase.addEventListener('pointerup',(e)=>{ if(moveId===e.pointerId){ resetMove(); moveBase.releasePointerCapture(e.pointerId); } });
        window.addEventListener('pointermove',(e)=>{ if(moveId===e.pointerId) setMoveThumb(e.clientX,e.clientY); });

        shootBase.addEventListener('pointerdown',(e)=>{ if(shootId===null && currentWeapon && !player.isDead){ e.preventDefault(); shootId=e.pointerId; shootBase.setPointerCapture(e.pointerId); updateShootRect(); setShootThumb(e.clientX,e.clientY); shootActive=true; } });
        shootBase.addEventListener('pointermove',(e)=>{ if(shootId===e.pointerId){ e.preventDefault(); setShootThumb(e.clientX,e.clientY); } });
        shootBase.addEventListener('pointerup',(e)=>{ if(shootId===e.pointerId){ if(shootActive && (shootDir.x!==0||shootDir.y!==0) && !player.isDead){ if(currentWeapon==='pistol') firePistol(shootDir.x, shootDir.y, performance.now()); else if(currentWeapon==='shotgun') fireShotgun(shootDir.x, shootDir.y); } resetShoot(); shootBase.releasePointerCapture(e.pointerId); } });
        window.addEventListener('pointerup',(e)=>{ if(shootId===e.pointerId) resetShoot(); });

        // dash trigger
        function triggerDash(){ if(dashCooldown>0 || dashActive || player.isDead) return; if(moveVec.x===0 && moveVec.y===0) return; let mag=Math.hypot(moveVec.x,moveVec.y); dashDir.x=moveVec.x/mag; dashDir.y=moveVec.y/mag; dashActive=true; dashTimer=0; }
        document.getElementById('dashBtn').addEventListener('click', triggerDash);

        // pickup
        function checkPickup(){
            let near = false;
            for(let it of floorItems) if(it.active && Math.hypot(player.worldX-it.worldX, player.worldY-it.worldY)<55) near=true;
            document.getElementById('pickupBtn').style.display = near ? 'block' : 'none';
        }
        document.getElementById('pickupBtn').addEventListener('click', ()=>{
            let best=null, bestD=Infinity;
            for(let it of floorItems) if(it.active){ let d=Math.hypot(player.worldX-it.worldX, player.worldY-it.worldY); if(d<bestD){ bestD=d; best=it; } }
            if(best && bestD<55) pickupWeapon(best);
        });

        // enemy AI (simple)
        function updateEnemies(dt, now){
            for(let i=0;i<enemies.length;i++){
                let e = enemies[i];
                let dx = player.worldX - e.worldX, dy = player.worldY - e.worldY;
                let dist = Math.hypot(dx,dy);
                if(e.type === 'pistol'){
                    if(dist>120){ let ang=Math.atan2(dy,dx); e.worldX+=Math.cos(ang)*e.speed*dt; e.worldY+=Math.sin(ang)*e.speed*dt; }
                    collideWithHouses(e);
                    if(dist<400 && now - (e.lastFire||0) > e.fireRate*1000){
                        let ang=Math.atan2(dy,dx);
                        enemyBullets.push({ worldX:e.worldX, worldY:e.worldY, vx:Math.cos(ang)*550, vy:Math.sin(ang)*550, radius:4, dmg:e.dmg });
                        e.lastFire=now;
                    }
                }
                if(e.type === 'sword' || e.type === 'gang'){
                    let sp = e.speed;
                    if(dist>25){ let ang=Math.atan2(dy,dx); e.worldX+=Math.cos(ang)*sp*dt; e.worldY+=Math.sin(ang)*sp*dt; }
                    collideWithHouses(e);
                    let invul = dashActive || daggerDashActive || daggerSkillActive || spraySkillBack;
                    if(dist < player.radius+e.radius && now - (e.lastMelee||0) > (e.meleeCd||0.5)*1000 && !invul){
                        damagePlayer(e.meleeDmg||15);
                        e.lastMelee = now;
                    }
                }
                // other types stub (keep it simple but functional)
            }
        }

        function updateBullets(dt){
            for(let i=0;i<playerBullets.length;i++){
                let b=playerBullets[i];
                b.worldX+=b.vx*dt; b.worldY+=b.vy*dt;
                let hit=false;
                for(let j=0;j<enemies.length;j++){
                    let e=enemies[j];
                    if(Math.hypot(b.worldX-e.worldX, b.worldY-e.worldY) < e.radius+5){
                        e.health -= b.dmg;
                        if(e.health<=0){
                            floorItems.push({ worldX:e.worldX, worldY:e.worldY, radius:15, active:true, type:e.drop });
                            enemies.splice(j,1);
                            updateUI();
                        }
                        hit=true; break;
                    }
                }
                if(hit){ playerBullets.splice(i,1); i--; continue; }
            }
            for(let i=0;i<enemyBullets.length;i++){
                let b=enemyBullets[i];
                b.worldX+=b.vx*dt; b.worldY+=b.vy*dt;
                let invul = dashActive || daggerDashActive || daggerSkillActive || spraySkillBack;
                if(Math.hypot(b.worldX-player.worldX, b.worldY-player.worldY) < player.radius+5 && !invul){
                    damagePlayer(b.dmg||8);
                    enemyBullets.splice(i,1); i--;
                }
            }
        }

        // drawing
        function draw(){
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.save();
            if(shakeTimer>0){ let s=screenShake; ctx.translate((Math.random()-0.5)*s,(Math.random()-0.5)*s); shakeTimer-=1/60; if(shakeTimer<=0) screenShake=0; }
            let toScreen=(x,y)=>({ x:x+camX, y:y+camY });
            for(let g of houses) for(let r of g){ let s=toScreen(r.x,r.y); ctx.fillStyle='#8B5A2B'; ctx.fillRect(s.x,s.y,r.w,r.h); ctx.strokeStyle='#5c3e1f'; ctx.strokeRect(s.x,s.y,r.w,r.h); }
            for(let it of floorItems) if(it.active){ let s=toScreen(it.worldX,it.worldY); ctx.beginPath(); ctx.arc(s.x,s.y,14,0,Math.PI*2); ctx.fillStyle='#ffc107'; ctx.fill(); ctx.fillStyle='black'; ctx.font='20px monospace'; ctx.fillText(it.type==='pistol'?'🔫':(it.type==='shotgun'?'🖖':(it.type==='sniper'?'🔭':(it.type==='dagger'?'🗡️':'💥'))), s.x-8, s.y+6); }
            for(let e of enemies){ let s=toScreen(e.worldX,e.worldY); ctx.fillStyle='#c22d2d'; ctx.beginPath(); ctx.arc(s.x,s.y,e.radius-2,0,Math.PI*2); ctx.fill(); ctx.fillStyle='white'; ctx.font='bold 9px monospace'; ctx.fillText(e.type, s.x-12, s.y-10); let maxHp = easyMode ? Math.floor((baseHealth[e.type]||30)*EASY_HP_FACTOR) : (baseHealth[e.type]||30); let hpPct = e.health/maxHp; ctx.fillStyle='#0f0'; ctx.fillRect(s.x-12, s.y-14, 24*hpPct, 4); }
            for(let b of playerBullets){ let s=toScreen(b.worldX,b.worldY); ctx.fillStyle='#ffcc44'; ctx.beginPath(); ctx.arc(s.x,s.y,4,0,Math.PI*2); ctx.fill(); }
            for(let b of enemyBullets){ let s=toScreen(b.worldX,b.worldY); ctx.fillStyle='#ff6666'; ctx.beginPath(); ctx.arc(s.x,s.y,4,0,Math.PI*2); ctx.fill(); }
            let ps=toScreen(player.worldX,player.worldY); ctx.fillStyle='#F4A261'; ctx.beginPath(); ctx.arc(ps.x,ps.y,player.radius,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='#E76F51'; ctx.lineWidth=3; ctx.stroke(); ctx.fillStyle='white'; ctx.fillRect(ps.x-20, ps.y-24, 40*player.health/player.maxHealth, 6);
            if(skillFlash>0){ ctx.fillStyle=`rgba(255,240,150,${skillFlash})`; ctx.fillRect(0,0,canvas.width,canvas.height); skillFlash-=0.03; }
            ctx.restore();
        }

        // main loop
        let lastTime = performance.now();
        function gameLoop(now){
            let dt = Math.min(0.033, (now - lastTime)/1000);
            if(dt<=0){ requestAnimationFrame(gameLoop); lastTime=now; return; }
            lastTime = now;
            if(player.isDead){ draw(); requestAnimationFrame(gameLoop); return; }
            updateRegen(dt);
            waveTimer += dt;
            if(waveTimer >= WAVE_INTERVAL && enemies.length < MAX_ENEMIES){ waveTimer=0; spawnWave(); }
            if(dashActive){ dashTimer+=dt; if(dashTimer>=DASH_DUR){ dashActive=false; dashCooldown=DASH_CD; } }
            if(dashCooldown>0){ dashCooldown-=dt; if(dashCooldown<0) dashCooldown=0; }
            let dashBtn = document.getElementById('dashBtn');
            if(dashCooldown>0 || dashActive) dashBtn.classList.add('disabled'); else dashBtn.classList.remove('disabled');

            let moveSpeed = dashActive ? DASH_SPEED * Math.exp(-18*dashTimer) : player.baseSpeed;
            let moveX = moveVec.x * moveSpeed + recoil.x;
            let moveY = moveVec.y * moveSpeed + recoil.y;
            if(!daggerDashActive && !daggerSkillActive && !spraySkillBack){
                player.worldX += moveX * dt;
                player.worldY += moveY * dt;
            }
            collideWithHouses(player);
            recoil.x *= 0.92; recoil.y *= 0.92;

            camX += (canvas.width/2 - player.worldX - camX) * 0.1;
            camY += (canvas.height/2 - player.worldY - camY) * 0.1;

            if(isReloading){ reloadTimer-=dt; if(reloadTimer<=0){ isReloading=false; if(currentWeapon==='pistol') pistol.ammo = pistol.maxAmmo; else if(currentWeapon==='shotgun') shotgun.ammo = shotgun.maxAmmo; } }

            updateEnemies(dt, now/1000);
            updateBullets(dt);
            checkPickup();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // initial pistol drop
        floorItems.push({ worldX:player.worldX, worldY:player.worldY, radius:15, active:true, type:'pistol' });
        setEasyMode(false);
        updateUI();
        requestAnimationFrame(gameLoop);
    })();
</script>
