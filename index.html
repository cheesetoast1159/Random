<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Top‑Down Circle with Dash & Joystick</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #2b2b2b;
            touch-action: none;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            background: #3a5a40;
        }

        /* --- Joystick (now clearly visible on the left) --- */
        .joystick-base {
            position: fixed;
            bottom: 40px;
            left: 100px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.15);
            border: 3px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: auto;
            z-index: 10;
        }
        .joystick-thumb {
            position: fixed;
            bottom: 40px;
            left: 100px;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 11;
            box-shadow: 0 0 8px rgba(0,0,0,0.5);
        }

        /* --- Dash Button – now top‑right, impossible to miss --- */
        #dashButton {
            position: fixed;
            top: 30px;                 /* clearly in view */
            right: 30px;
            padding: 22px 36px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            background: #e63946;
            border: 4px solid white;   /* white border for contrast */
            border-radius: 50px;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            cursor: pointer;
            z-index: 100;              /* very high, above everything */
            transition: background 0.2s, transform 0.1s;
            user-select: none;
            touch-action: manipulation;
        }
        #dashButton:active {
            transform: scale(0.95);
        }
        #dashButton.disabled {
            background: #555;
            border-color: #aaa;
            pointer-events: none;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="joystick-base" id="joystickBase"></div>
    <div class="joystick-thumb" id="joystickThumb"></div>
    <button id="dashButton">DASH</button>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            // Confirm the button exists (check console)
            const dashButton = document.getElementById('dashButton');
            console.log('Dash button found:', dashButton);

            // --- Canvas resize ---
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // --- Player ---
            const player = {
                x: canvas.width / 2,
                y: canvas.height / 2,
                radius: 20,
                speed: 200
            };

            // --- Dash mechanics ---
            const dashDuration = 0.3;
            const dashMultiplier = 3.5;
            const dashCooldown = 1.0;
            let dashTimer = 0;
            let cooldownTimer = 0;
            let currentSpeed = player.speed;

            function updateDashButtonVisual() {
                if (cooldownTimer > 0) {
                    dashButton.textContent = 'COOLING...';
                    dashButton.classList.add('disabled');
                } else if (dashTimer > 0) {
                    dashButton.textContent = 'DASHING!';
                    dashButton.classList.add('disabled');
                } else {
                    dashButton.textContent = 'DASH';
                    dashButton.classList.remove('disabled');
                }
            }

            function triggerDash() {
                if (cooldownTimer > 0 || dashTimer > 0) return;
                // Only dash if joystick is giving input (optional, you can remove this check)
                if (joystickVec.x === 0 && joystickVec.y === 0) return;

                dashTimer = dashDuration;
                currentSpeed = player.speed * dashMultiplier;
                updateDashButtonVisual();
            }

            // Dash button listeners
            dashButton.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                triggerDash();
            });
            dashButton.addEventListener('touchstart', (e) => {
                e.preventDefault();
                triggerDash();
            });

            // --- Joystick setup ---
            const baseEl = document.getElementById('joystickBase');
            const thumbEl = document.getElementById('joystickThumb');

            let activePointerId = null;
            let baseCenter = { x: 0, y: 0 };
            let maxDist = 0;
            let joystickVec = { x: 0, y: 0 };

            function updateBaseDimensions() {
                const rect = baseEl.getBoundingClientRect();
                baseCenter.x = rect.left + rect.width / 2;
                baseCenter.y = rect.top + rect.height / 2;
                maxDist = (rect.width / 2) - (thumbEl.offsetWidth / 2);
                if (maxDist < 0) maxDist = 0;
            }
            window.addEventListener('resize', updateBaseDimensions);
            updateBaseDimensions();

            function moveThumb(clientX, clientY) {
                let dx = clientX - baseCenter.x;
                let dy = clientY - baseCenter.y;
                let dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > maxDist) {
                    dx = (dx / dist) * maxDist;
                    dy = (dy / dist) * maxDist;
                    dist = maxDist;
                }

                thumbEl.style.left = (baseCenter.x + dx) + 'px';
                thumbEl.style.top = (baseCenter.y + dy) + 'px';

                if (dist > 1) {
                    joystickVec.x = dx / maxDist;
                    joystickVec.y = dy / maxDist;
                } else {
                    joystickVec.x = 0;
                    joystickVec.y = 0;
                }
            }

            function resetThumb() {
                thumbEl.style.left = baseCenter.x + 'px';
                thumbEl.style.top = baseCenter.y + 'px';
                joystickVec.x = 0;
                joystickVec.y = 0;
                activePointerId = null;
            }

            function onPointerDown(e) {
                if (e.target === baseEl && activePointerId === null) {
                    e.preventDefault();
                    activePointerId = e.pointerId;
                    baseEl.setPointerCapture(e.pointerId);
                    updateBaseDimensions();
                    moveThumb(e.clientX, e.clientY);
                }
            }

            function onPointerMove(e) {
                if (activePointerId === e.pointerId) {
                    e.preventDefault();
                    moveThumb(e.clientX, e.clientY);
                }
            }

            function onPointerUp(e) {
                if (activePointerId === e.pointerId) {
                    e.preventDefault();
                    resetThumb();
                    baseEl.releasePointerCapture(e.pointerId);
                }
            }

            baseEl.addEventListener('pointerdown', onPointerDown);
            baseEl.addEventListener('pointermove', onPointerMove);
            baseEl.addEventListener('pointerup', onPointerUp);
            baseEl.addEventListener('pointercancel', onPointerUp);

            window.addEventListener('pointermove', (e) => {
                if (activePointerId === e.pointerId) moveThumb(e.clientX, e.clientY);
            });
            window.addEventListener('pointerup', (e) => {
                if (activePointerId === e.pointerId) resetThumb();
            });

            // --- Game loop ---
            let lastTime = performance.now();

            function gameLoop(now) {
                let dt = (now - lastTime) / 1000;
                if (dt > 0.1) dt = 0.1;
                lastTime = now;

                // Update dash timers
                if (dashTimer > 0) {
                    dashTimer -= dt;
                    if (dashTimer <= 0) {
                        dashTimer = 0;
                        currentSpeed = player.speed;
                        cooldownTimer = dashCooldown;
                    }
                    updateDashButtonVisual();
                }
                if (cooldownTimer > 0) {
                    cooldownTimer -= dt;
                    if (cooldownTimer <= 0) {
                        cooldownTimer = 0;
                        updateDashButtonVisual();
                    }
                }

                // Movement
                if (joystickVec.x !== 0 || joystickVec.y !== 0) {
                    const moveX = joystickVec.x * currentSpeed * dt;
                    const moveY = joystickVec.y * currentSpeed * dt;
                    player.x += moveX;
                    player.y += moveY;

                    const margin = player.radius;
                    player.x = Math.max(margin, Math.min(canvas.width - margin, player.x));
                    player.y = Math.max(margin, Math.min(canvas.height - margin, player.y));
                }

                drawBackground();
                drawPlayer();
                drawVelocity();

                requestAnimationFrame(gameLoop);
            }

            function drawBackground() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
                ctx.lineWidth = 1;
                const gridSize = 50;
                for (let x = 0; x < canvas.width; x += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, canvas.height);
                    ctx.stroke();
                }
                for (let y = 0; y < canvas.height; y += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(canvas.width, y);
                    ctx.stroke();
                }
            }

            function drawPlayer() {
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
                ctx.fillStyle = dashTimer > 0 ? '#e63946' : '#F4A261';
                ctx.fill();
                ctx.strokeStyle = dashTimer > 0 ? '#ffffff' : '#E76F51';
                ctx.lineWidth = 3;
                ctx.stroke();

                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 8;
                ctx.fill();
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
            }

            function drawVelocity() {
                const speedText = Math.round(currentSpeed);
                const dashStatus = dashTimer > 0 ? ' (DASH!)' : '';
                const display = `Speed: ${speedText} px/s${dashStatus}`;

                ctx.font = 'bold 18px monospace';
                ctx.fillStyle = 'white';
                ctx.shadowColor = 'black';
                ctx.shadowBlur = 4;
                ctx.fillText(display, 20, 40);
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
            }

            updateDashButtonVisual();
            requestAnimationFrame(gameLoop);
        })();
    </script>
</body>
</html>
