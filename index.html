<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Infinite Plane | Gentle First Wave, Dash Buff & More</title>
    <style>
        body {
            margin: 0; overflow: hidden; background: #1a1a1a; touch-action: none; font-family: sans-serif;
        }
        canvas { display: block; background: #3a5a40; }
        .move-joystick-base {
            position: fixed; bottom: 40px; left: 100px; width: 120px; height: 120px;
            background: rgba(255,255,255,0.15); border: 3px solid rgba(255,255,255,0.6);
            border-radius: 50%; transform: translate(-50%,-50%); pointer-events: auto; z-index: 10;
        }
        .move-joystick-thumb {
            position: fixed; bottom: 40px; left: 100px; width: 50px; height: 50px;
            background: rgba(255,255,255,0.9); border-radius: 50%; transform: translate(-50%,-50%);
            pointer-events: none; z-index: 11; box-shadow: 0 0 8px rgba(0,0,0,0.5);
        }
        #shootBase {
            position: fixed; bottom: 230px; left: calc(100vw - 140px); width: 120px; height: 120px;
            background: rgba(255,200,100,0.15); border: 3px solid rgba(255,200,100,0.6);
            border-radius: 50%; transform: translate(-50%,-50%); pointer-events: auto; z-index: 10; display: none;
        }
        #shootThumb {
            position: fixed; bottom: 230px; left: calc(100vw - 140px); width: 50px; height: 50px;
            background: rgba(255,200,100,0.9); border-radius: 50%; transform: translate(-50%,-50%);
            pointer-events: none; z-index: 11; box-shadow: 0 0 8px rgba(0,0,0,0.5); display: none;
        }
        #skillBase {
            position: fixed; bottom: 370px; left: calc(100vw - 140px); width: 120px; height: 120px;
            background: rgba(100,150,255,0.15); border: 3px solid rgba(100,150,255,0.6);
            border-radius: 50%; transform: translate(-50%,-50%); pointer-events: auto; z-index: 10; display: none;
        }
        #skillThumb {
            position: fixed; bottom: 370px; left: calc(100vw - 140px); width: 50px; height: 50px;
            background: rgba(100,150,255,0.9); border-radius: 50%; transform: translate(-50%,-50%);
            pointer-events: none; z-index: 11; box-shadow: 0 0 8px rgba(0,0,0,0.5); display: none;
        }
        #dashButton {
            position: fixed; bottom: 30px; right: 30px; padding: 18px 28px; font-size: 1.2rem; font-weight: bold;
            color: white; background: #e63946; border: 4px solid white; border-radius: 50px;
            box-shadow: 0 0 20px rgba(0,0,0,0.6); cursor: pointer; z-index: 100;
            transition: background 0.2s, transform 0.1s; user-select: none; touch-action: manipulation;
        }
        #dashButton:active { transform: scale(0.95); }
        #dashButton.disabled { background: #555; border-color: #aaa; pointer-events: none; cursor: not-allowed; }
        #pickupButton {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 14px 28px;
            font-size: 1rem; font-weight: bold; color: white; background: #2a9d8f; border: 3px solid white;
            border-radius: 30px; cursor: pointer; z-index: 100; display: none; touch-action: manipulation;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        #deathScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center;
            flex-direction: column; z-index: 200; color: white; font-size: 2rem; font-weight: bold;
        }
        #deathScreen button {
            margin-top: 20px; padding: 12px 24px; font-size: 1.2rem; cursor: pointer;
        }
        .easy-toggle {
            position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.6); color: #ffd966;
            padding: 8px 18px; border-radius: 40px; font-weight: bold; font-family: monospace;
            cursor: pointer; z-index: 150; border: 2px solid #ffb347; backdrop-filter: blur(4px);
            font-size: 0.9rem;
        }
        .easy-toggle.active { background: #4caf50; color: white; border-color: white; }
        .regen-status {
            position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.5);
            padding: 4px 12px; border-radius: 20px; color: #aaffdd; font-size: 0.8rem;
            font-family: monospace; pointer-events: none; z-index: 99;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="move-joystick-base" id="moveBase"></div>
    <div class="move-joystick-thumb" id="moveThumb"></div>
    <div id="shootBase"></div>
    <div id="shootThumb"></div>
    <div id="skillBase"></div>
    <div id="skillThumb"></div>
    <button id="dashButton">DASH</button>
    <button id="pickupButton">PICK UP</button>
    <div id="deathScreen">
        <div>YOU DIED</div>
        <button id="restartButton">RESTART</button>
    </div>
    <div id="easyToggle" class="easy-toggle">🔘 EASY MODE: OFF</div>
    <div id="regenStatus" class="regen-status">❤️ REGEN: --</div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const dashButton = document.getElementById('dashButton');
            const pickupButton = document.getElementById('pickupButton');
            const deathScreen = document.getElementById('deathScreen');
            const restartButton = document.getElementById('restartButton');
            const moveBaseEl = document.getElementById('moveBase');
            const moveThumbEl = document.getElementById('moveThumb');
            const shootBaseEl = document.getElementById('shootBase');
            const shootThumbEl = document.getElementById('shootThumb');
            const skillBaseEl = document.getElementById('skillBase');
            const skillThumbEl = document.getElementById('skillThumb');
            const easyToggle = document.getElementById('easyToggle');
            const regenSpan = document.getElementById('regenStatus');

            // --- Canvas resize ---
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // --- Infinite world camera ---
            let cameraOffsetX = 0, cameraOffsetY = 0;
            const CAMERA_FOLLOW_SPEED = 1.5;

            // --- Player ---
            const player = {
                worldX: canvas.width / 2,
                worldY: canvas.height / 2,
                radius: 18,
                baseSpeed: 280,
                health: 100,
                maxHealth: 100,
                isDead: false
            };

            // --- HEALTH REGEN (5 sec no damage) ---
            let lastDamageTime = performance.now() / 1000;
            const REGEN_DELAY = 5.0;
            const REGEN_RATE = 12; // HP per second

            // --- Dash (movement ability) – buffed speed + invulnerability ---
            const dashDuration = 0.25;
            const maxDashSpeed = 1200;
            const dashDecayRate = 18;
            const dashCooldown = 1.0;
            let dashActive = false, dashTimer = 0;
            let dashDirection = { x: 0, y: 0 };
            let cooldownTimer = 0;

            // --- Inventory & Weapons ---
            const inventory = [null, null, null, null];
            let currentWeapon = null;

            const pistolState = { ammo: 12, maxAmmo: 12, spare: 20, reloadTime: 1.2, fireRate: 0.45, bulletSpeed: 600, damage: 10 };
            const shotgunState = { ammo: 8, maxAmmo: 8, spare: 20, reloadTime: 1.8, pellets: 8, spreadAngle: Math.PI / 9, bulletSpeed: 500, damage: 8, recoilForce: 400 };
            const sniperState = { ammo: 5, maxAmmo: 5, spare: 10, reloadTime: 2.0, fireRate: 1.5, bulletSpeed: 6000, damage: 70, recoilForce: 600 };
            const daggerState = { damage: 25, dashDistance: 120, dashDuration: 0.12, cooldown: 0.7 };
            const sprayState = { ammo: 30, maxAmmo: 30, spare: 5, reloadTime: 1.5, burstCount: 3, burstFireRate: 0.06, burstCooldown: 0.25, bulletSpeed: 550, damage: 6, spread: 0.15 };

            let isReloading = false, reloadTimer = 0;
            let lastFireTime = 0;

            let sprayBurstBulletsLeft = 0, sprayBurstTimer = 0, sprayNextBurstTime = 0;

            let skillCooldown = 0, skillCooldownDuration = 0;

            let daggerDashing = false, daggerDashTimer = 0;
            let daggerDashDirection = { x: 0, y: 0 }, daggerDashSpeed = 0, daggerCooldown = 0;

            let daggerSkillDashActive = false, daggerSkillDashTimer = 0;
            let daggerSkillDashDuration = 0.35, daggerSkillDashDistance = 380;
            let daggerSkillDashDirection = { x: 0, y: 0 }, daggerSkillDashSpeed = 0;
            let daggerSkillExplosionQueue = [], daggerSkillExplosions = [], daggerSkillIndicators = [];

            let spraySkillActive = false, spraySkillDashBackward = false, spraySkillDashTimer = 0;
            let spraySkillDashDuration = 0.25, spraySkillDashDistance = 120, spraySkillBulletCount = 40;
            let spraySkillSpread = 1.2, spraySkillBulletsLeft = 0, spraySkillFireRate = 0.03;
            let spraySkillNextFireTime = 0, spraySkillAimDirX = 0, spraySkillAimDirY = 0;

            let recoilVelX = 0, recoilVelY = 0;

            // --- Floor items (drops + initial pistol) ---
            let floorItems = [];
            floorItems.push({
                worldX: player.worldX,
                worldY: player.worldY,
                radius: 15,
                active: true,
                type: 'pistol'
            });

            const playerBullets = [], enemyBullets = [], enemies = [];
            const smokeClouds = [], grenades = [];

            // --- Houses ---
            const houses = [];
            function generateHouses() {
                const numHouses = 20;
                for (let i = 0; i < numHouses; i++) {
                    let x, y, valid;
                    do {
                        x = (Math.random() - 0.5) * 2000;
                        y = (Math.random() - 0.5) * 2000;
                        valid = true;
                        if (Math.hypot(x - player.worldX, y - player.worldY) < 200) valid = false;
                    } while (!valid);
                    const shape = Math.random() < 0.5 ? 'single' : 'L';
                    const rects = [];
                    const baseW = 60 + Math.random() * 40;
                    const baseH = 60 + Math.random() * 40;
                    if (shape === 'single') {
                        rects.push({ x: x - baseW/2, y: y - baseH/2, w: baseW, h: baseH });
                    } else {
                        const secondW = 40 + Math.random() * 30, secondH = 40 + Math.random() * 30;
                        rects.push({ x: x - baseW/2, y: y - baseH/2, w: baseW, h: baseH });
                        const side = Math.floor(Math.random() * 4);
                        if (side === 0) rects.push({ x: x - secondW/2, y: y - baseH/2 - secondH, w: secondW, h: secondH });
                        else if (side === 1) rects.push({ x: x + baseW/2, y: y - secondH/2, w: secondW, h: secondH });
                        else if (side === 2) rects.push({ x: x - secondW/2, y: y + baseH/2, w: secondW, h: secondH });
                        else rects.push({ x: x - baseW/2 - secondW, y: y - secondH/2, w: secondW, h: secondH });
                    }
                    houses.push(rects);
                }
            }
            generateHouses();

            let sniperSpread = 0.3;
            const SNIPER_MAX_SPREAD = 0.3, SNIPER_MIN_SPREAD = 0.0, SNIPER_SPREAD_RECOVERY = 0.3;
            let sniperAimAngle = 0;
            const SNIPER_OSCILLATION_SPEED = 2.5;
            let screenShake = 0, shakeDuration = 0, skillFlashAlpha = 0;

            // --- Spawn control (gentle first wave) with global enemy cap = 8 ---
            let spawnTimer = 0;
            const SPAWN_INTERVAL = 4.0;
            let waveNumber = 0;
            const ENEMY_TYPES = ['pistol', 'sword', 'spray', 'gang', 'shotgun', 'sniper'];
            const MAX_ENEMIES_ALIVE = 8;  // NEW: hard cap

            // --- Easy Mode: reduce enemy HP to 40% ---
            let easyMode = false;
            const BASE_ENEMY_HEALTH = {
                pistol: 40, sword: 60, spray: 50, gang: 20, shotgun: 50, sniper: 30
            };
            function applyEasyModeHealth(enemy) {
                if (!enemy.type) return;
                let base = BASE_ENEMY_HEALTH[enemy.type] || 30;
                if (easyMode) enemy.health = Math.max(1, Math.floor(base * 0.4));
                else enemy.health = base;
            }
            function setEasyMode(val) {
                easyMode = val;
                if (easyMode) {
                    easyToggle.innerText = '🌟 EASY MODE: ON';
                    easyToggle.classList.add('active');
                } else {
                    easyToggle.innerText = '🔘 EASY MODE: OFF';
                    easyToggle.classList.remove('active');
                }
                for (let e of enemies) applyEasyModeHealth(e);
            }
            easyToggle.addEventListener('click', () => setEasyMode(!easyMode));

            // ========== Joystick helpers (same as original) ==========
            let movePointerId = null, moveBaseCenter = { x:0, y:0 }, moveMaxDist = 0;
            let moveVec = { x:0, y:0 };
            let shootPointerId = null, shootBaseCenter = { x:0, y:0 }, shootMaxDist = 0;
            let shootVec = { x:0, y:0 }, shootActive = false;
            let skillPointerId = null, skillBaseCenter = { x:0, y:0 }, skillMaxDist = 0;
            let skillVec = { x:0, y:0 }, skillActive = false;
            let skillTargetWorld = { x:0, y:0 };

            function updateMoveBase() {
                const rect = moveBaseEl.getBoundingClientRect();
                moveBaseCenter.x = rect.left + rect.width/2;
                moveBaseCenter.y = rect.top + rect.height/2;
                moveMaxDist = (rect.width/2) - (moveThumbEl.offsetWidth/2);
                if (moveMaxDist < 0) moveMaxDist = 0;
            }
            function updateShootBase() {
                const rect = shootBaseEl.getBoundingClientRect();
                shootBaseCenter.x = rect.left + rect.width/2;
                shootBaseCenter.y = rect.top + rect.height/2;
                shootMaxDist = (rect.width/2) - (shootThumbEl.offsetWidth/2);
                if (shootMaxDist < 0) shootMaxDist = 0;
            }
            function updateSkillBase() {
                const rect = skillBaseEl.getBoundingClientRect();
                skillBaseCenter.x = rect.left + rect.width/2;
                skillBaseCenter.y = rect.top + rect.height/2;
                skillMaxDist = (rect.width/2) - (skillThumbEl.offsetWidth/2);
                if (skillMaxDist < 0) skillMaxDist = 0;
            }
            function moveMoveThumb(cx, cy) {
                let dx = cx - moveBaseCenter.x, dy = cy - moveBaseCenter.y;
                let dist = Math.hypot(dx, dy);
                if (dist > moveMaxDist) { dx = (dx/dist)*moveMaxDist; dy = (dy/dist)*moveMaxDist; dist = moveMaxDist; }
                moveThumbEl.style.left = (moveBaseCenter.x + dx) + 'px';
                moveThumbEl.style.top = (moveBaseCenter.y + dy) + 'px';
                moveVec.x = dist > 1 ? dx / moveMaxDist : 0;
                moveVec.y = dist > 1 ? dy / moveMaxDist : 0;
            }
            function resetMoveThumb() {
                moveThumbEl.style.left = moveBaseCenter.x + 'px';
                moveThumbEl.style.top = moveBaseCenter.y + 'px';
                moveVec.x = 0; moveVec.y = 0; movePointerId = null;
            }
            function moveShootThumb(cx, cy) {
                let dx = cx - shootBaseCenter.x, dy = cy - shootBaseCenter.y;
                let dist = Math.hypot(dx, dy);
                if (dist > shootMaxDist) { dx = (dx/dist)*shootMaxDist; dy = (dy/dist)*shootMaxDist; dist = shootMaxDist; }
                shootThumbEl.style.left = (shootBaseCenter.x + dx) + 'px';
                shootThumbEl.style.top = (shootBaseCenter.y + dy) + 'px';
                shootVec.x = dist > 1 ? dx / shootMaxDist : 0;
                shootVec.y = dist > 1 ? dy / shootMaxDist : 0;
            }
            function resetShootThumb() {
                shootThumbEl.style.left = shootBaseCenter.x + 'px';
                shootThumbEl.style.top = shootBaseCenter.y + 'px';
                shootVec.x = 0; shootVec.y = 0; shootPointerId = null; shootActive = false;
            }
            function moveSkillThumb(cx, cy) {
                let dx = cx - skillBaseCenter.x, dy = cy - skillBaseCenter.y;
                let dist = Math.hypot(dx, dy);
                if (dist > skillMaxDist) { dx = (dx/dist)*skillMaxDist; dy = (dy/dist)*skillMaxDist; dist = skillMaxDist; }
                skillThumbEl.style.left = (skillBaseCenter.x + dx) + 'px';
                skillThumbEl.style.top = (skillBaseCenter.y + dy) + 'px';
                skillVec.x = dist > 1 ? dx / skillMaxDist : 0;
                skillVec.y = dist > 1 ? dy / skillMaxDist : 0;
                if (dist > 0) {
                    const range = currentWeapon === 'shotgun' ? 120 : (currentWeapon === 'dagger' ? daggerSkillDashDistance : 200);
                    const mag = Math.hypot(skillVec.x, skillVec.y);
                    skillTargetWorld.x = player.worldX + (skillVec.x / mag) * range;
                    skillTargetWorld.y = player.worldY + (skillVec.y / mag) * range;
                }
            }
            function resetSkillThumb() {
                skillThumbEl.style.left = skillBaseCenter.x + 'px';
                skillThumbEl.style.top = skillBaseCenter.y + 'px';
                skillVec.x = 0; skillVec.y = 0; skillPointerId = null; skillActive = false;
            }

            updateMoveBase(); updateShootBase(); updateSkillBase();
            window.addEventListener('resize', () => { updateMoveBase(); updateShootBase(); updateSkillBase(); });

            // Joystick events (same as original)
            moveBaseEl.addEventListener('pointerdown', (e) => {
                if (e.target === moveBaseEl && movePointerId === null && !player.isDead) {
                    e.preventDefault();
                    movePointerId = e.pointerId;
                    moveBaseEl.setPointerCapture(e.pointerId);
                    updateMoveBase();
                    moveMoveThumb(e.clientX, e.clientY);
                }
            });
            moveBaseEl.addEventListener('pointermove', (e) => {
                if (movePointerId === e.pointerId) { e.preventDefault(); moveMoveThumb(e.clientX, e.clientY); }
            });
            const moveUp = (e) => {
                if (movePointerId === e.pointerId) { e.preventDefault(); resetMoveThumb(); moveBaseEl.releasePointerCapture(e.pointerId); }
            };
            moveBaseEl.addEventListener('pointerup', moveUp);
            moveBaseEl.addEventListener('pointercancel', moveUp);
            window.addEventListener('pointermove', (e) => { if (movePointerId === e.pointerId) moveMoveThumb(e.clientX, e.clientY); });
            window.addEventListener('pointerup', (e) => { if (movePointerId === e.pointerId) resetMoveThumb(); });

            shootBaseEl.addEventListener('pointerdown', (e) => {
                if (e.target === shootBaseEl && shootPointerId === null && currentWeapon && !player.isDead) {
                    e.preventDefault();
                    shootPointerId = e.pointerId;
                    shootBaseEl.setPointerCapture(e.pointerId);
                    updateShootBase();
                    moveShootThumb(e.clientX, e.clientY);
                    shootActive = true;
                }
            });
            shootBaseEl.addEventListener('pointermove', (e) => {
                if (shootPointerId === e.pointerId) { e.preventDefault(); moveShootThumb(e.clientX, e.clientY); }
            });
            const shootUp = (e) => {
                if (shootPointerId === e.pointerId) {
                    e.preventDefault();
                    if (shootActive && !player.isDead) {
                        if (currentWeapon === 'dagger' && (shootVec.x !== 0 || shootVec.y !== 0)) {
                            triggerDaggerBasicDash();
                        } else if (shootVec.x !== 0 || shootVec.y !== 0) {
                            if (currentWeapon === 'shotgun') fireShotgun();
                            else if (currentWeapon === 'sniper') fireSniper();
                        }
                    }
                    resetShootThumb();
                    shootBaseEl.releasePointerCapture(e.pointerId);
                }
            };
            shootBaseEl.addEventListener('pointerup', shootUp);
            shootBaseEl.addEventListener('pointercancel', shootUp);
            window.addEventListener('pointermove', (e) => { if (shootPointerId === e.pointerId) moveShootThumb(e.clientX, e.clientY); });
            window.addEventListener('pointerup', (e) => {
                if (shootPointerId === e.pointerId) {
                    if (shootActive && !player.isDead && (shootVec.x !== 0 || shootVec.y !== 0)) {
                        if (currentWeapon === 'dagger') triggerDaggerBasicDash();
                        else if (currentWeapon === 'shotgun') fireShotgun();
                        else if (currentWeapon === 'sniper') fireSniper();
                    }
                    resetShootThumb();
                }
            });

            skillBaseEl.addEventListener('pointerdown', (e) => {
                if (e.target === skillBaseEl && skillPointerId === null && (currentWeapon === 'shotgun' || currentWeapon === 'sniper' || currentWeapon === 'dagger' || currentWeapon === 'spray') && skillCooldown <= 0 && !player.isDead) {
                    e.preventDefault();
                    skillPointerId = e.pointerId;
                    skillBaseEl.setPointerCapture(e.pointerId);
                    updateSkillBase();
                    moveSkillThumb(e.clientX, e.clientY);
                    skillActive = true;
                }
            });
            skillBaseEl.addEventListener('pointermove', (e) => {
                if (skillPointerId === e.pointerId) { e.preventDefault(); moveSkillThumb(e.clientX, e.clientY); }
            });
            const skillUp = (e) => {
                if (skillPointerId === e.pointerId) {
                    e.preventDefault();
                    if (skillActive && (skillVec.x !== 0 || skillVec.y !== 0) && !player.isDead) {
                        if (currentWeapon === 'shotgun') executeShotgunSkill();
                        else if (currentWeapon === 'sniper') executeSniperSkill();
                        else if (currentWeapon === 'dagger') executeDaggerLongDashSkill();
                        else if (currentWeapon === 'spray') executeSpraySkill();
                    }
                    resetSkillThumb();
                    skillBaseEl.releasePointerCapture(e.pointerId);
                }
            };
            skillBaseEl.addEventListener('pointerup', skillUp);
            skillBaseEl.addEventListener('pointercancel', skillUp);
            window.addEventListener('pointermove', (e) => { if (skillPointerId === e.pointerId) moveSkillThumb(e.clientX, e.clientY); });
            window.addEventListener('pointerup', (e) => {
                if (skillPointerId === e.pointerId) {
                    if (skillActive && (skillVec.x !== 0 || skillVec.y !== 0) && !player.isDead) {
                        if (currentWeapon === 'shotgun') executeShotgunSkill();
                        else if (currentWeapon === 'sniper') executeSniperSkill();
                        else if (currentWeapon === 'dagger') executeDaggerLongDashSkill();
                        else if (currentWeapon === 'spray') executeSpraySkill();
                    }
                    resetSkillThumb();
                }
            });

            // ========== Dash (movement ability) ==========
            function updateDashUI() {
                if (cooldownTimer > 0) { dashButton.textContent = 'COOLING...'; dashButton.classList.add('disabled'); }
                else if (dashActive) { dashButton.textContent = 'DASHING!'; dashButton.classList.add('disabled'); }
                else { dashButton.textContent = 'DASH'; dashButton.classList.remove('disabled'); }
            }
            function triggerDash() {
                if (cooldownTimer > 0 || dashActive || player.isDead) return;
                if (moveVec.x === 0 && moveVec.y === 0) return;
                const mag = Math.hypot(moveVec.x, moveVec.y);
                dashDirection.x = moveVec.x / mag;
                dashDirection.y = moveVec.y / mag;
                dashActive = true; dashTimer = 0;
                updateDashUI();
            }
            dashButton.addEventListener('pointerdown', (e) => { e.preventDefault(); triggerDash(); });
            dashButton.addEventListener('touchstart', (e) => { e.preventDefault(); triggerDash(); });

            // ========== Pickup with full inventory replacement ==========
            pickupButton.addEventListener('pointerdown', (e) => { e.preventDefault(); handlePickup(); });
            pickupButton.addEventListener('touchstart', (e) => { e.preventDefault(); handlePickup(); });

            function handlePickup() {
                let nearestItem = null, nearestDist = Infinity;
                for (const item of floorItems) {
                    if (!item.active) continue;
                    const d = Math.hypot(player.worldX - item.worldX, player.worldY - item.worldY);
                    if (d < nearestDist) { nearestDist = d; nearestItem = item; }
                }
                if (nearestItem && nearestDist < 50) pickupWeapon(nearestItem);
            }

            function pickupWeapon(item) {
                // If inventory full, drop current weapon at feet
                const allFilled = inventory.every(slot => slot !== null);
                if (allFilled && currentWeapon) {
                    floorItems.push({ worldX: player.worldX, worldY: player.worldY, radius: 15, active: true, type: currentWeapon });
                    // replace the slot that holds current weapon
                    const slotIndex = inventory.findIndex(slot => slot && slot.name === currentWeapon);
                    if (slotIndex !== -1) {
                        const iconMap = { pistol:'🔫', shotgun:'🖖', sniper:'🔭', dagger:'🗡️', spray:'💥' };
                        inventory[slotIndex] = { name: item.type, icon: iconMap[item.type] };
                        equipWeapon(item.type);
                    }
                    item.active = false;
                    shootBaseEl.style.display = 'block';
                    shootThumbEl.style.display = 'block';
                    updateShootBase();
                    pickupButton.style.display = 'none';
                    return;
                }
                // normal pickup
                const slot = inventory.findIndex(s => !s);
                if (slot === -1) return;
                const iconMap = { pistol:'🔫', shotgun:'🖖', sniper:'🔭', dagger:'🗡️', spray:'💥' };
                inventory[slot] = { name: item.type, icon: iconMap[item.type] };
                item.active = false;
                if (currentWeapon !== item.type) equipWeapon(item.type);
                shootBaseEl.style.display = 'block';
                shootThumbEl.style.display = 'block';
                updateShootBase();
                pickupButton.style.display = 'none';
            }

            function equipWeapon(type) {
                currentWeapon = type;
                isReloading = false;
                daggerDashing = false;
                daggerSkillDashActive = false;
                daggerSkillExplosionQueue = [];
                daggerSkillExplosions = [];
                daggerSkillIndicators = [];
                spraySkillActive = false;
                spraySkillDashBackward = false;
                spraySkillBulletsLeft = 0;
                if (type === 'shotgun' || type === 'sniper' || type === 'dagger' || type === 'spray') {
                    skillBaseEl.style.display = 'block';
                    skillThumbEl.style.display = 'block';
                    updateSkillBase();
                    skillCooldownDuration = type === 'shotgun' ? 1.0 : (type === 'sniper' ? 8.0 : (type === 'dagger' ? 7.0 : 6.0));
                    skillCooldown = 0;
                } else {
                    skillBaseEl.style.display = 'none';
                    skillThumbEl.style.display = 'none';
                }
                if (type === 'sniper') sniperSpread = SNIPER_MAX_SPREAD;
            }

            canvas.addEventListener('pointerdown', (e) => {
                const rect = canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                const startX = 20, startY = 70, slotSize = 50, gap = 5;
                for (let i = 0; i < 4; i++) {
                    const slotX = startX + i * (slotSize + gap);
                    if (mx >= slotX && mx <= slotX + slotSize && my >= startY && my <= startY + slotSize) {
                        if (inventory[i] && inventory[i].name !== currentWeapon) equipWeapon(inventory[i].name);
                    }
                }
            });

            function checkPickupProximity() {
                let near = false;
                for (const item of floorItems) {
                    if (item.active && Math.hypot(player.worldX - item.worldX, player.worldY - item.worldY) < 50) near = true;
                }
                pickupButton.style.display = near ? 'block' : 'none';
            }

            // ========== Reload ==========
            function startReload() {
                if (isReloading || currentWeapon === 'dagger') return;
                let state;
                if (currentWeapon === 'spray') state = sprayState;
                else state = currentWeapon === 'pistol' ? pistolState : (currentWeapon === 'shotgun' ? shotgunState : sniperState);
                if (state.ammo >= state.maxAmmo || state.spare <= 0) return;
                isReloading = true;
                reloadTimer = state.reloadTime;
            }
            function finishReload() {
                if (currentWeapon === 'spray') {
                    const state = sprayState;
                    if (state.spare > 0) {
                        state.ammo = state.maxAmmo;
                        state.spare--;
                    }
                } else {
                    const state = currentWeapon === 'pistol' ? pistolState : (currentWeapon === 'shotgun' ? shotgunState : sniperState);
                    const needed = state.maxAmmo - state.ammo;
                    const take = Math.min(needed, state.spare);
                    state.ammo += take;
                    state.spare -= take;
                }
                isReloading = false;
            }

            // --- Collision with houses ---
            function resolveHouseCollisions(entity) {
                for (const house of houses) {
                    for (const rect of house) {
                        const closestX = Math.max(rect.x, Math.min(entity.worldX, rect.x + rect.w));
                        const closestY = Math.max(rect.y, Math.min(entity.worldY, rect.y + rect.h));
                        const dx = entity.worldX - closestX;
                        const dy = entity.worldY - closestY;
                        const dist = Math.hypot(dx, dy);
                        if (dist < entity.radius) {
                            const angle = Math.atan2(dy, dx);
                            const overlap = entity.radius - dist;
                            entity.worldX += Math.cos(angle) * overlap;
                            entity.worldY += Math.sin(angle) * overlap;
                        }
                    }
                }
            }

            // --- Dagger basic dash ---
            function triggerDaggerBasicDash() {
                if (daggerDashing || daggerCooldown > 0 || currentWeapon !== 'dagger' || player.isDead) return;
                const mag = Math.hypot(shootVec.x, shootVec.y);
                if (mag === 0) return;
                daggerDashDirection.x = shootVec.x / mag;
                daggerDashDirection.y = shootVec.y / mag;
                daggerDashSpeed = daggerState.dashDistance / daggerState.dashDuration;
                daggerDashing = true;
                daggerDashTimer = daggerState.dashDuration;
                screenShake = 3; shakeDuration = 0.1;
            }

            // --- Dagger long dash skill ---
            function executeDaggerLongDashSkill() {
                if (skillCooldown > 0 || daggerSkillDashActive || currentWeapon !== 'dagger' || player.isDead) return;
                const dirX = skillVec.x, dirY = skillVec.y;
                const mag = Math.hypot(dirX, dirY);
                if (mag === 0) return;
                daggerSkillDashDirection.x = dirX / mag;
                daggerSkillDashDirection.y = dirY / mag;
                daggerSkillDashSpeed = daggerSkillDashDistance / daggerSkillDashDuration;
                daggerSkillDashActive = true;
                daggerSkillDashTimer = daggerSkillDashDuration;
                skillCooldown = skillCooldownDuration;
                screenShake = 4; shakeDuration = 0.2;
            }

            // --- Spray skill ---
            function executeSpraySkill() {
                if (skillCooldown > 0 || spraySkillActive || currentWeapon !== 'spray' || player.isDead) return;
                if (skillVec.x === 0 && skillVec.y === 0) return;
                const aimDirX = skillVec.x, aimDirY = skillVec.y;
                const mag = Math.hypot(aimDirX, aimDirY);
                spraySkillAimDirX = aimDirX / mag;
                spraySkillAimDirY = aimDirY / mag;
                spraySkillDashBackward = true;
                spraySkillDashTimer = spraySkillDashDuration;
                spraySkillActive = true;
                spraySkillBulletsLeft = spraySkillBulletCount;
                spraySkillNextFireTime = performance.now() + 0.2;
                skillCooldown = skillCooldownDuration;
                screenShake = 8; shakeDuration = 0.3;
                skillFlashAlpha = 0.5;
            }

            // ========== Firing ==========
            function firePistol(now, dirX, dirY) {
                const state = pistolState;
                if (isReloading || state.ammo <= 0 || player.isDead) { if (state.ammo === 0) startReload(); return false; }
                if (now - lastFireTime < state.fireRate * 1000) return false;
                if (dirX === 0 && dirY === 0) return false;
                const mag = Math.hypot(dirX, dirY);
                const vx = (dirX / mag) * state.bulletSpeed;
                const vy = (dirY / mag) * state.bulletSpeed;
                playerBullets.push({ worldX: player.worldX, worldY: player.worldY, vx, vy, radius: 5, damage: state.damage, isBeam: false, sourceWeapon: 'pistol' });
                state.ammo--;
                lastFireTime = now;
                screenShake = 2; shakeDuration = 0.05;
                if (state.ammo === 0) startReload();
                return true;
            }
            function fireShotgun() {
                const state = shotgunState;
                if (isReloading || state.ammo <= 0 || player.isDead) { if (state.ammo === 0) startReload(); return; }
                const mag = Math.hypot(shootVec.x, shootVec.y);
                const dirX = shootVec.x / mag, dirY = shootVec.y / mag;
                for (let i = 0; i < state.pellets; i++) {
                    const angle = Math.atan2(dirY, dirX) + (Math.random()*2-1)*state.spreadAngle;
                    const speed = state.bulletSpeed + (Math.random()*100-50);
                    playerBullets.push({ worldX: player.worldX, worldY: player.worldY, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, radius: 3, damage: state.damage, isBeam: false, sourceWeapon: 'shotgun' });
                }
                state.ammo--;
                recoilVelX = -dirX * state.recoilForce;
                recoilVelY = -dirY * state.recoilForce;
                screenShake = 5; shakeDuration = 0.1;
                if (state.ammo === 0) startReload();
            }
            function fireSniper() {
                const state = sniperState;
                if (isReloading || state.ammo <= 0 || player.isDead) { if (state.ammo === 0) startReload(); return; }
                const mag = Math.hypot(shootVec.x, shootVec.y);
                const baseAngle = Math.atan2(shootVec.y, shootVec.x);
                const fireAngle = baseAngle + sniperAimAngle;
                const vx = Math.cos(fireAngle) * state.bulletSpeed;
                const vy = Math.sin(fireAngle) * state.bulletSpeed;
                playerBullets.push({ worldX: player.worldX, worldY: player.worldY, vx, vy, radius: 4, damage: state.damage, isBeam: true, sourceWeapon: 'sniper' });
                state.ammo--;
                recoilVelX = -Math.cos(fireAngle) * state.recoilForce;
                recoilVelY = -Math.sin(fireAngle) * state.recoilForce;
                screenShake = 18; shakeDuration = 0.3;
                skillFlashAlpha = 0.4;
                lastFireTime = performance.now();
                if (state.ammo === 0) startReload();
            }

            function executeShotgunSkill() {
                if (skillCooldown > 0 || player.isDead) return;
                player.worldX = skillTargetWorld.x;
                player.worldY = skillTargetWorld.y;
                resolveHouseCollisions(player);
                const bulletCount = 32;
                for (let i = 0; i < bulletCount; i++) {
                    const angle = (i / bulletCount) * Math.PI * 2;
                    const speed = shotgunState.bulletSpeed;
                    playerBullets.push({ worldX: player.worldX, worldY: player.worldY, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, radius: 4, damage: shotgunState.damage * 0.7, isBeam: false, sourceWeapon: 'shotgun' });
                }
                screenShake = 10; shakeDuration = 0.3;
                skillFlashAlpha = 0.6;
                skillCooldown = skillCooldownDuration;
            }

            function executeSniperSkill() {
                if (skillCooldown > 0 || player.isDead) return;
                const angle = Math.atan2(skillTargetWorld.y - player.worldY, skillTargetWorld.x - player.worldX);
                const speed = 500;
                grenades.push({
                    worldX: player.worldX, worldY: player.worldY,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    targetX: skillTargetWorld.x, targetY: skillTargetWorld.y,
                    radius: 6, active: true
                });
                skillCooldown = skillCooldownDuration;
            }

            // ========== Enemy spawning with global cap (max 8) ==========
            function spawnWave() {
                if (enemies.length >= MAX_ENEMIES_ALIVE) return;
                waveNumber++;
                let rawCount = Math.min(1 + Math.floor((waveNumber - 1) / 2), 6);
                let slotsFree = MAX_ENEMIES_ALIVE - enemies.length;
                let toSpawn = Math.min(rawCount, slotsFree);
                for (let i = 0; i < toSpawn; i++) {
                    const type = ENEMY_TYPES[Math.floor(Math.random() * ENEMY_TYPES.length)];
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 400 + Math.random() * 300;
                    const worldX = player.worldX + Math.cos(angle) * dist;
                    const worldY = player.worldY + Math.sin(angle) * dist;
                    let valid = true;
                    for (const house of houses) {
                        for (const rect of house) {
                            if (worldX > rect.x - 20 && worldX < rect.x + rect.w + 20 && worldY > rect.y - 20 && worldY < rect.y + rect.h + 20) {
                                valid = false; break;
                            }
                        }
                        if (!valid) break;
                    }
                    if (!valid) continue;
                    spawnEnemy(type, worldX, worldY);
                }
            }

            function spawnEnemy(type, worldX, worldY) {
                let enemy;
                if (type === 'pistol') {
                    enemy = {
                        type: 'pistol', worldX, worldY, radius: 18, health: 40, speed: 120,
                        fireRate: 0.6, lastFire: performance.now(), damage: pistolState.damage,
                        visionRange: 400, drop: 'pistol'
                    };
                } else if (type === 'sword') {
                    enemy = {
                        type: 'sword', worldX, worldY, radius: 14, health: 60, speed: 160,
                        meleeDamage: 25, meleeCooldown: 0.5, lastMelee: 0,
                        dodging: false, dodgeTimer: 0, dodgeCooldown: 0, dodgeSpeed: 350,
                        dodgeDirection: { x:0, y:0 }, hitFlash: 0,
                        drop: 'dagger'
                    };
                } else if (type === 'spray') {
                    enemy = {
                        type: 'spray', worldX, worldY, radius: 16, health: 50, speed: 140,
                        burstCooldown: 0.7, lastBurstTime: 0, burstCount: 3, burstFireRate: 0.07,
                        burstBulletSpeed: 550, burstDamage: 4, dashAfterBurst: false, dashSpeed: 300, dashCooldown: 0,
                        panicThreshold: 15, panicActive: false, panicMagRemaining: 30, panicFireRate: 0.04,
                        panicSpread: 0.6, panicTriggerDist: 200, normalDist: 250,
                        visionRange: 500, drop: 'spray'
                    };
                } else if (type === 'gang') {
                    enemy = {
                        type: 'gang', worldX, worldY, radius: 12, health: 20, speed: 130,
                        meleeDamage: 15, meleeCooldown: 0.6, lastMelee: 0,
                        drop: 'dagger'
                    };
                } else if (type === 'shotgun') {
                    enemy = {
                        type: 'shotgun', worldX, worldY, radius: 16, health: 50, speed: 140,
                        fireCooldown: 0.9, lastFire: 0,
                        bulletSpeed: 500, damage: 6, pellets: 5, spreadAngle: 0.3,
                        preferredDist: 150,
                        visionRange: 400, drop: 'shotgun'
                    };
                } else if (type === 'sniper') {
                    enemy = {
                        type: 'sniper', worldX, worldY, radius: 16, health: 30, speed: 100,
                        fireCooldown: 1.2, lastFire: 0,
                        bulletSpeed: 800, damage: 25,
                        preferredDist: 350,
                        visionRange: 600, drop: 'sniper'
                    };
                }
                applyEasyModeHealth(enemy);
                enemies.push(enemy);
            }

            function dropWeapon(type, worldX, worldY) {
                floorItems.push({ worldX, worldY, radius: 15, active: true, type: type });
            }

            // --- Helper: line in smoke ---
            function isLineInSmoke(x1, y1, x2, y2) {
                for (const puff of smokeClouds) {
                    if (puff.delay > 0 || puff.timer <= 0) continue;
                    const cx = puff.worldX, cy = puff.worldY, r = puff.radius;
                    const dx = x2 - x1, dy = y2 - y1;
                    const fx = x1 - cx, fy = y1 - cy;
                    const a = dx*dx + dy*dy;
                    if (a === 0) continue;
                    const b = 2*(fx*dx + fy*dy);
                    const c = fx*fx + fy*fy - r*r;
                    const discriminant = b*b - 4*a*c;
                    if (discriminant >= 0) {
                        const t1 = (-b - Math.sqrt(discriminant))/(2*a);
                        const t2 = (-b + Math.sqrt(discriminant))/(2*a);
                        if ((t1 >= 0 && t1 <= 1) || (t2 >= 0 && t2 <= 1) || (t1 < 0 && t2 > 1)) return true;
                    }
                }
                return false;
            }

            // ========== Enemy AI (original, but updated to use easy mode health) ==========
            function updateEnemies(now, dt) {
                const gangMembers = enemies.filter(e => e.type === 'gang');
                const gangAllAlive = gangMembers.length === 3;
                const playerInvul = dashActive || daggerDashing || daggerSkillDashActive || spraySkillDashBackward;
                for (const enemy of enemies) {
                    const dx = player.worldX - enemy.worldX;
                    const dy = player.worldY - enemy.worldY;
                    const dist = Math.hypot(dx, dy);
                    const canSeePlayer = !isLineInSmoke(enemy.worldX, enemy.worldY, player.worldX, player.worldY);

                    if (enemy.type === 'pistol') {
                        if (canSeePlayer) {
                            const minDist = 150;
                            if (dist > minDist + 5) {
                                const angle = Math.atan2(dy, dx);
                                enemy.worldX += Math.cos(angle) * enemy.speed * dt;
                                enemy.worldY += Math.sin(angle) * enemy.speed * dt;
                            }
                            resolveHouseCollisions(enemy);
                            if (dist < enemy.visionRange && now - enemy.lastFire > enemy.fireRate * 1000) {
                                const a = Math.atan2(player.worldY - enemy.worldY, player.worldX - enemy.worldX);
                                enemyBullets.push({
                                    worldX: enemy.worldX, worldY: enemy.worldY,
                                    vx: Math.cos(a) * pistolState.bulletSpeed,
                                    vy: Math.sin(a) * pistolState.bulletSpeed,
                                    radius: 4, damage: enemy.damage
                                });
                                enemy.lastFire = now;
                            }
                        }
                    } else if (enemy.type === 'sword') {
                        if (enemy.hitFlash > 0) enemy.hitFlash -= dt;
                        if (!enemy.dodging && enemy.dodgeCooldown <= 0) {
                            for (const b of playerBullets) {
                                if (b.sourceWeapon === 'shotgun' || b.sourceWeapon === 'pistol') {
                                    const bDist = Math.hypot(enemy.worldX - b.worldX, enemy.worldY - b.worldY);
                                    if (bDist < enemy.radius * 4.5) {
                                        enemy.dodging = true;
                                        enemy.dodgeTimer = 0.25;
                                        const perpX = -b.vy, perpY = b.vx;
                                        const len = Math.hypot(perpX, perpY);
                                        if (len > 0) {
                                            const sign = Math.random() < 0.5 ? 1 : -1;
                                            enemy.dodgeDirection.x = (perpX / len) * sign;
                                            enemy.dodgeDirection.y = (perpY / len) * sign;
                                        }
                                        break;
                                    }
                                }
                            }
                        }
                        if (enemy.dodging) {
                            enemy.dodgeTimer -= dt;
                            if (enemy.dodgeTimer <= 0) { enemy.dodging = false; enemy.dodgeCooldown = 0.6; }
                            else {
                                enemy.worldX += enemy.dodgeDirection.x * enemy.dodgeSpeed * dt;
                                enemy.worldY += enemy.dodgeDirection.y * enemy.dodgeSpeed * dt;
                            }
                        } else if (canSeePlayer) {
                            if (dist > 10) {
                                const angle = Math.atan2(dy, dx);
                                enemy.worldX += Math.cos(angle) * enemy.speed * dt;
                                enemy.worldY += Math.sin(angle) * enemy.speed * dt;
                            }
                        }
                        if (enemy.dodgeCooldown > 0) enemy.dodgeCooldown -= dt;
                        resolveHouseCollisions(enemy);
                        if (!playerInvul && canSeePlayer && dist < player.radius + enemy.radius && !player.isDead && 
                            now - (enemy.lastMelee || 0) > enemy.meleeCooldown * 1000) {
                            player.health -= enemy.meleeDamage;
                            enemy.lastMelee = now;
                            enemy.hitFlash = 0.15;
                            const angle = Math.atan2(dy, dx);
                            recoilVelX -= Math.cos(angle) * 200;
                            recoilVelY -= Math.sin(angle) * 200;
                            lastDamageTime = performance.now() / 1000; // regen reset
                            if (player.health <= 0) {
                                player.health = 0;
                                player.isDead = true;
                                deathScreen.style.display = 'flex';
                            }
                        }
                    } else if (enemy.type === 'spray') {
                        if (enemy.panicActive) {
                            if (enemy.panicMagRemaining > 0 && now - (enemy.lastBurstTime || 0) > enemy.panicFireRate * 1000) {
                                const angle = Math.atan2(player.worldY - enemy.worldY, player.worldX - enemy.worldX);
                                const spread = enemy.panicSpread;
                                const a = angle + (Math.random()*2-1) * spread;
                                enemyBullets.push({
                                    worldX: enemy.worldX, worldY: enemy.worldY,
                                    vx: Math.cos(a) * enemy.burstBulletSpeed,
                                    vy: Math.sin(a) * enemy.burstBulletSpeed,
                                    radius: 3, damage: enemy.burstDamage
                                });
                                enemy.panicMagRemaining--;
                                enemy.lastBurstTime = now;
                            }
                            if (enemy.panicMagRemaining <= 0) {
                                enemy.panicActive = false;
                                enemy.lastBurstTime = now;
                            }
                        } else {
                            if (canSeePlayer) {
                                const preferredDist = enemy.normalDist;
                                if (enemy.health <= enemy.panicThreshold && dist < enemy.panicTriggerDist) {
                                    enemy.panicActive = true;
                                    enemy.panicMagRemaining = 30;
                                    enemy.lastBurstTime = 0;
                                } else {
                                    if (dist > preferredDist + 20) {
                                        const angle = Math.atan2(dy, dx);
                                        enemy.worldX += Math.cos(angle) * enemy.speed * dt;
                                        enemy.worldY += Math.sin(angle) * enemy.speed * dt;
                                    } else if (dist < preferredDist - 20) {
                                        const angle = Math.atan2(-dy, -dx);
                                        enemy.worldX += Math.cos(angle) * enemy.speed * dt;
                                        enemy.worldY += Math.sin(angle) * enemy.speed * dt;
                                    }
                                    resolveHouseCollisions(enemy);
                                    if (dist < enemy.visionRange && now - (enemy.lastBurstTime || 0) > enemy.burstCooldown * 1000) {
                                        enemy.burstTimer = enemy.burstCount;
                                        enemy.burstBulletsLeft = enemy.burstCount;
                                        enemy.lastBurstTime = now;
                                    }
                                    if (enemy.burstBulletsLeft > 0 && now - enemy.lastBurstTime >= (enemy.burstCount - enemy.burstBulletsLeft) * enemy.burstFireRate * 1000) {
                                        const angle = Math.atan2(player.worldY - enemy.worldY, player.worldX - enemy.worldX);
                                        const spread = 0.1;
                                        const a = angle + (Math.random()*2-1) * spread;
                                        enemyBullets.push({
                                            worldX: enemy.worldX, worldY: enemy.worldY,
                                            vx: Math.cos(a) * enemy.burstBulletSpeed,
                                            vy: Math.sin(a) * enemy.burstBulletSpeed,
                                            radius: 3, damage: enemy.burstDamage
                                        });
                                        enemy.burstBulletsLeft--;
                                    }
                                }
                            }
                        }
                    } else if (enemy.type === 'gang') {
                        if (canSeePlayer) {
                            if (dist > player.radius + enemy.radius + 5) {
                                const angle = Math.atan2(dy, dx);
                                enemy.worldX += Math.cos(angle) * enemy.speed * dt;
                                enemy.worldY += Math.sin(angle) * enemy.speed * dt;
                            }
                            resolveHouseCollisions(enemy);
                            if (!playerInvul && dist < player.radius + enemy.radius && !player.isDead &&
                                now - (enemy.lastMelee || 0) > enemy.meleeCooldown * 1000) {
                                const damage = gangAllAlive ? enemy.meleeDamage * 2 : enemy.meleeDamage;
                                player.health -= damage;
                                enemy.lastMelee = now;
                                const angle = Math.atan2(dy, dx);
                                recoilVelX -= Math.cos(angle) * 150;
                                recoilVelY -= Math.sin(angle) * 150;
                                lastDamageTime = performance.now() / 1000; // reset regen
                                if (player.health <= 0) {
                                    player.health = 0;
                                    player.isDead = true;
                                    deathScreen.style.display = 'flex';
                                }
                            }
                        }
                    } else if (enemy.type === 'shotgun') {
                        if (canSeePlayer) {
                            const preferredDist = enemy.preferredDist;
                            if (dist > preferredDist + 20) {
                                const angle = Math.atan2(dy, dx);
                                enemy.worldX += Math.cos(angle) * enemy.speed * dt;
                                enemy.worldY += Math.sin(angle) * enemy.speed * dt;
                            } else if (dist < preferredDist - 20) {
                                const angle = Math.atan2(-dy, -dx);
                                enemy.worldX += Math.cos(angle) * enemy.speed * dt;
                                enemy.worldY += Math.sin(angle) * enemy.speed * dt;
                            }
                            resolveHouseCollisions(enemy);
                            if (dist < enemy.visionRange && now - (enemy.lastFire || 0) > enemy.fireCooldown * 1000) {
                                const a = Math.atan2(player.worldY - enemy.worldY, player.worldX - enemy.worldX);
                                for (let i = 0; i < enemy.pellets; i++) {
                                    const angle = a + (Math.random()*2-1) * enemy.spreadAngle;
                                    enemyBullets.push({
                                        worldX: enemy.worldX, worldY: enemy.worldY,
                                        vx: Math.cos(angle) * enemy.bulletSpeed,
                                        vy: Math.sin(angle) * enemy.bulletSpeed,
                                        radius: 3, damage: enemy.damage
                                    });
                                }
                                enemy.lastFire = now;
                            }
                        }
                    } else if (enemy.type === 'sniper') {
                        if (canSeePlayer) {
                            const preferredDist = enemy.preferredDist;
                            if (dist < preferredDist - 30) {
                                const angle = Math.atan2(-dy, -dx);
                                enemy.worldX += Math.cos(angle) * enemy.speed * dt;
                                enemy.worldY += Math.sin(angle) * enemy.speed * dt;
                            } else if (dist > preferredDist + 30) {
                                const angle = Math.atan2(dy, dx);
                                enemy.worldX += Math.cos(angle) * enemy.speed * dt;
                                enemy.worldY += Math.sin(angle) * enemy.speed * dt;
                            }
                            resolveHouseCollisions(enemy);
                            if (dist < enemy.visionRange && now - (enemy.lastFire || 0) > enemy.fireCooldown * 1000) {
                                const a = Math.atan2(player.worldY - enemy.worldY, player.worldX - enemy.worldX);
                                enemyBullets.push({
                                    worldX: enemy.worldX, worldY: enemy.worldY,
                                    vx: Math.cos(a) * enemy.bulletSpeed,
                                    vy: Math.sin(a) * enemy.bulletSpeed,
                                    radius: 4, damage: enemy.damage
                                });
                                enemy.lastFire = now;
                            }
                        }
                    }
                }
            }

            // ========== Game loop with health regen integration ==========
            let lastTime = performance.now();
            function gameLoop(now) {
                let dt = (now - lastTime) / 1000;
                if (dt > 0.1) dt = 0.1;
                lastTime = now;

                if (player.isDead) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    requestAnimationFrame(gameLoop);
                    return;
                }

                // Health regen
                const nowSec = now / 1000;
                const timeSinceDamage = nowSec - lastDamageTime;
                if (timeSinceDamage >= REGEN_DELAY && player.health < player.maxHealth) {
                    let heal = REGEN_RATE * dt;
                    player.health = Math.min(player.maxHealth, player.health + heal);
                    regenSpan.innerHTML = `❤️ REGEN: ACTIVE +${Math.floor(heal)}`;
                } else if (timeSinceDamage < REGEN_DELAY) {
                    regenSpan.innerHTML = `❤️ REGEN: WAIT ${(REGEN_DELAY - timeSinceDamage).toFixed(1)}s`;
                } else {
                    regenSpan.innerHTML = `❤️ REGEN: FULL`;
                }

                // Auto-spawn with cap
                spawnTimer += dt;
                if (spawnTimer >= SPAWN_INTERVAL) {
                    spawnTimer = 0;
                    spawnWave();
                }

                // Dash timers
                if (dashActive) {
                    dashTimer += dt;
                    if (dashTimer >= dashDuration) { dashActive = false; cooldownTimer = dashCooldown; }
                    updateDashUI();
                }
                if (cooldownTimer > 0) { cooldownTimer -= dt; if (cooldownTimer <= 0) { cooldownTimer = 0; updateDashUI(); } }
                if (skillCooldown > 0) skillCooldown -= dt;
                if (daggerCooldown > 0) daggerCooldown -= dt;

                if (shakeDuration > 0) { shakeDuration -= dt; if (shakeDuration <= 0) screenShake = 0; }
                if (skillFlashAlpha > 0) skillFlashAlpha -= dt * 2.5;

                if (isReloading) { reloadTimer -= dt; if (reloadTimer <= 0) finishReload(); }

                const moveActive = moveVec.x !== 0 || moveVec.y !== 0;
                const decayRate = moveActive ? 0.8 : 3.0;
                recoilVelX *= Math.exp(-decayRate * dt); recoilVelY *= Math.exp(-decayRate * dt);
                if (Math.abs(recoilVelX) < 0.1) recoilVelX = 0;
                if (Math.abs(recoilVelY) < 0.1) recoilVelY = 0;

                const playerMoving = moveVec.x !== 0 || moveVec.y !== 0 || Math.abs(recoilVelX) > 5 || Math.abs(recoilVelY) > 5;
                if (currentWeapon === 'sniper') {
                    if (!playerMoving) sniperSpread = Math.max(SNIPER_MIN_SPREAD, sniperSpread - SNIPER_SPREAD_RECOVERY * dt);
                    else sniperSpread = SNIPER_MAX_SPREAD;
                    sniperAimAngle = Math.sin(now * 0.001 * SNIPER_OSCILLATION_SPEED) * (sniperSpread / 2);
                }

                // Dagger basic dash
                if (daggerDashing) {
                    daggerDashTimer -= dt;
                    if (daggerDashTimer <= 0) {
                        daggerDashing = false;
                        daggerDashTimer = 0;
                        daggerCooldown = daggerState.cooldown;
                    } else {
                        const moveX = daggerDashDirection.x * daggerDashSpeed * dt;
                        const moveY = daggerDashDirection.y * daggerDashSpeed * dt;
                        player.worldX += moveX;
                        player.worldY += moveY;
                        resolveHouseCollisions(player);
                        for (let j = enemies.length - 1; j >= 0; j--) {
                            const e = enemies[j];
                            if (Math.hypot(player.worldX - e.worldX, player.worldY - e.worldY) < player.radius + e.radius) {
                                e.health -= daggerState.damage;
                                if (e.health <= 0) { dropWeapon(e.drop, e.worldX, e.worldY); enemies.splice(j, 1); }
                            }
                        }
                    }
                }

                // Dagger long dash skill
                if (daggerSkillDashActive) {
                    daggerSkillDashTimer -= dt;
                    if (daggerSkillDashTimer <= 0) {
                        daggerSkillDashActive = false;
                        daggerSkillDashTimer = 0;
                        const dirX = daggerSkillDashDirection.x, dirY = daggerSkillDashDirection.y;
                        const startDashX = player.worldX - dirX * daggerSkillDashDistance;
                        const startDashY = player.worldY - dirY * daggerSkillDashDistance;
                        const segmentDist = daggerSkillDashDistance / 4;
                        daggerSkillExplosionQueue = [];
                        for (let i = 0; i < 5; i++) {
                            const distFromStart = i * segmentDist;
                            const worldX = startDashX + dirX * distFromStart;
                            const worldY = startDashY + dirY * distFromStart;
                            const delay = 1.0 + i * 0.15;
                            daggerSkillExplosionQueue.push({ worldX, worldY, delay, indicatorCreated: false });
                        }
                    } else {
                        const moveX = daggerSkillDashDirection.x * daggerSkillDashSpeed * dt;
                        const moveY = daggerSkillDashDirection.y * daggerSkillDashSpeed * dt;
                        player.worldX += moveX;
                        player.worldY += moveY;
                        resolveHouseCollisions(player);
                    }
                }

                // Process explosion queue
                for (let i = daggerSkillExplosionQueue.length - 1; i >= 0; i--) {
                    const exp = daggerSkillExplosionQueue[i];
                    exp.delay -= dt;
                    if (!exp.indicatorCreated && exp.delay <= 0.35 && exp.delay > 0) {
                        exp.indicatorCreated = true;
                        daggerSkillIndicators.push({ worldX: exp.worldX, worldY: exp.worldY, timer: exp.delay + 0.3 });
                    }
                    if (exp.delay <= 0) {
                        daggerSkillExplosions.push({ worldX: exp.worldX, worldY: exp.worldY, radius: 10, maxRadius: 70, timer: 0.4 });
                        for (let j = enemies.length - 1; j >= 0; j--) {
                            const e = enemies[j];
                            if (Math.hypot(exp.worldX - e.worldX, exp.worldY - e.worldY) < 70 + e.radius) {
                                e.health -= 30;
                                if (e.health <= 0) { dropWeapon(e.drop, e.worldX, e.worldY); enemies.splice(j, 1); }
                            }
                        }
                        screenShake = 5; shakeDuration = 0.1;
                        daggerSkillExplosionQueue.splice(i, 1);
                    }
                }
                for (let i = daggerSkillIndicators.length - 1; i >= 0; i--) {
                    daggerSkillIndicators[i].timer -= dt;
                    if (daggerSkillIndicators[i].timer <= 0) daggerSkillIndicators.splice(i, 1);
                }
                for (let i = daggerSkillExplosions.length - 1; i >= 0; i--) {
                    daggerSkillExplosions[i].timer -= dt;
                    if (daggerSkillExplosions[i].timer <= 0) daggerSkillExplosions.splice(i, 1);
                    else { const p = 1 - (daggerSkillExplosions[i].timer / 0.4); daggerSkillExplosions[i].radius = 10 + 60 * p; }
                }

                // Spray skill update
                if (spraySkillActive) {
                    if (spraySkillDashBackward) {
                        spraySkillDashTimer -= dt;
                        const dashSpeed = spraySkillDashDistance / spraySkillDashDuration;
                        player.worldX += spraySkillAimDirX * -dashSpeed * dt;
                        player.worldY += spraySkillAimDirY * -dashSpeed * dt;
                        resolveHouseCollisions(player);
                        if (spraySkillDashTimer <= 0) {
                            spraySkillDashBackward = false;
                            spraySkillDashTimer = 0;
                            spraySkillNextFireTime = performance.now() + 0.1;
                        }
                    } else {
                        if (spraySkillBulletsLeft > 0 && now >= spraySkillNextFireTime) {
                            const spread = spraySkillSpread;
                            const baseAngle = Math.atan2(spraySkillAimDirY, spraySkillAimDirX);
                            const angle = baseAngle + (Math.random()*2-1) * spread;
                            const speed = sprayState.bulletSpeed;
                            playerBullets.push({
                                worldX: player.worldX, worldY: player.worldY,
                                vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                                radius: 3, damage: sprayState.damage, isBeam: false, sourceWeapon: 'spray'
                            });
                            spraySkillBulletsLeft--;
                            spraySkillNextFireTime = now + spraySkillFireRate * 1000;
                        }
                        if (spraySkillBulletsLeft <= 0) spraySkillActive = false;
                    }
                }

                // Normal movement (skip if dashing)
                if (!daggerDashing && !daggerSkillDashActive && !spraySkillDashBackward) {
                    let worldMoveVelX = moveVec.x * player.baseSpeed + recoilVelX;
                    let worldMoveVelY = moveVec.y * player.baseSpeed + recoilVelY;
                    if (dashActive) {
                        const dashMag = maxDashSpeed * Math.exp(-dashDecayRate * dashTimer);
                        worldMoveVelX += dashDirection.x * dashMag;
                        worldMoveVelY += dashDirection.y * dashMag;
                    }
                    player.worldX += worldMoveVelX * dt;
                    player.worldY += worldMoveVelY * dt;
                    resolveHouseCollisions(player);
                }

                // Camera centering
                const centerX = canvas.width / 2, centerY = canvas.height / 2;
                const screenX = player.worldX + cameraOffsetX;
                const screenY = player.worldY + cameraOffsetY;
                cameraOffsetX -= (screenX - centerX) * CAMERA_FOLLOW_SPEED * dt;
                cameraOffsetY -= (screenY - centerY) * CAMERA_FOLLOW_SPEED * dt;

                // Grenades (smoke)
                for (let i = grenades.length - 1; i >= 0; i--) {
                    const g = grenades[i];
                    g.worldX += g.vx * dt; g.worldY += g.vy * dt;
                    const toTargetX = g.targetX - g.worldX, toTargetY = g.targetY - g.worldY;
                    const dist = Math.hypot(toTargetX, toTargetY);
                    const moveX = g.vx, moveY = g.vy;
                    if (dist < 25 || (moveX * toTargetX + moveY * toTargetY) <= 0) {
                        const puffCount = 18, maxSpread = 50;
                        for (let j = 0; j < puffCount; j++) {
                            const angle = Math.random() * Math.PI * 2, offset = Math.random() * maxSpread;
                            smokeClouds.push({
                                worldX: g.targetX + Math.cos(angle) * offset,
                                worldY: g.targetY + Math.sin(angle) * offset,
                                radius: 65 + Math.random() * 40, timer: 5.0, delay: Math.random() * 0.2
                            });
                        }
                        skillFlashAlpha = 0.3;
                        screenShake = 3; shakeDuration = 0.1;
                        grenades.splice(i, 1);
                    }
                }
                for (const puff of smokeClouds) {
                    if (puff.delay > 0) { puff.delay -= dt; continue; }
                    puff.timer -= dt;
                }
                for (let i = smokeClouds.length - 1; i >= 0; i--) {
                    if (smokeClouds[i].delay <= 0 && smokeClouds[i].timer <= 0) smokeClouds.splice(i, 1);
                }

                // Spray regular burst fire
                if (currentWeapon === 'spray' && shootActive && !spraySkillActive && !isReloading) {
                    const state = sprayState;
                    if (sprayBurstBulletsLeft > 0) {
                        if (now - sprayBurstTimer >= (state.burstCount - sprayBurstBulletsLeft) * state.burstFireRate * 1000) {
                            const mag = Math.hypot(shootVec.x, shootVec.y);
                            if (mag > 0) {
                                const baseAngle = Math.atan2(shootVec.y, shootVec.x);
                                const angle = baseAngle + (Math.random()*2-1) * state.spread;
                                playerBullets.push({
                                    worldX: player.worldX, worldY: player.worldY,
                                    vx: Math.cos(angle) * state.bulletSpeed, vy: Math.sin(angle) * state.bulletSpeed,
                                    radius: 3, damage: state.damage, isBeam: false, sourceWeapon: 'spray'
                                });
                                state.ammo--;
                                screenShake = 1; shakeDuration = 0.03;
                                if (state.ammo <= 0) startReload();
                            }
                            sprayBurstBulletsLeft--;
                            if (sprayBurstBulletsLeft === 0) sprayNextBurstTime = now + state.burstCooldown * 1000;
                        }
                    } else if (now >= sprayNextBurstTime && state.ammo > 0) {
                        fireSprayBurst(now);
                    }
                }
                function fireSprayBurst(now) {
                    const state = sprayState;
                    if (isReloading || state.ammo <= 0 || player.isDead) return;
                    if (now < sprayNextBurstTime) return;
                    if (shootVec.x === 0 && shootVec.y === 0) return;
                    sprayBurstBulletsLeft = state.burstCount;
                    sprayBurstTimer = now;
                    sprayNextBurstTime = now + state.burstCooldown * 1000;
                }

                // Pistol auto-fire with aim assist
                if (currentWeapon === 'pistol' && shootActive && !daggerDashing && !daggerSkillDashActive && !spraySkillDashBackward) {
                    let aimDirX = shootVec.x, aimDirY = shootVec.y;
                    if (aimDirX !== 0 || aimDirY !== 0) {
                        const rawAngle = Math.atan2(aimDirY, aimDirX);
                        let bestEnemy = null;
                        let bestAngleDiff = Infinity;
                        const aimAssistAngle = Math.PI / 12;
                        const aimAssistRange = 350;
                        for (const enemy of enemies) {
                            const dx = enemy.worldX - player.worldX;
                            const dy = enemy.worldY - player.worldY;
                            const dist = Math.hypot(dx, dy);
                            if (dist > aimAssistRange) continue;
                            const angleToEnemy = Math.atan2(dy, dx);
                            let angleDiff = Math.abs(angleToEnemy - rawAngle);
                            if (angleDiff > Math.PI) angleDiff = 2 * Math.PI - angleDiff;
                            if (angleDiff < aimAssistAngle && angleDiff < bestAngleDiff) {
                                bestAngleDiff = angleDiff;
                                bestEnemy = enemy;
                            }
                        }
                        if (bestEnemy) {
                            aimDirX = bestEnemy.worldX - player.worldX;
                            aimDirY = bestEnemy.worldY - player.worldY;
                            const mag = Math.hypot(aimDirX, aimDirY);
                            aimDirX /= mag;
                            aimDirY /= mag;
                        }
                    }
                    firePistol(now, aimDirX, aimDirY);
                }

                updateEnemies(now, dt);

                // Player bullets collisions
                for (let i = playerBullets.length - 1; i >= 0; i--) {
                    const b = playerBullets[i];
                    b.worldX += b.vx * dt; b.worldY += b.vy * dt;
                    let remove = false;
                    for (const house of houses) {
                        for (const rect of house) {
                            if (b.worldX > rect.x - b.radius && b.worldX < rect.x + rect.w + b.radius &&
                                b.worldY > rect.y - b.radius && b.worldY < rect.y + rect.h + b.radius) { remove = true; break; }
                        }
                        if (remove) break;
                    }
                    if (remove) { playerBullets.splice(i, 1); continue; }
                    let hit = false;
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        const e = enemies[j];
                        if (Math.hypot(b.worldX - e.worldX, b.worldY - e.worldY) < e.radius + b.radius) {
                            e.health -= b.damage;
                            if (e.health <= 0) {
                                dropWeapon(e.drop, e.worldX, e.worldY);
                                enemies.splice(j, 1);
                            }
                            hit = true; break;
                        }
                    }
                    if (hit) { playerBullets.splice(i, 1); continue; }
                }

                // Enemy bullets vs player (invulnerable check)
                const playerInvul = dashActive || daggerDashing || daggerSkillDashActive || spraySkillDashBackward;
                if (!playerInvul) {
                    for (let i = enemyBullets.length - 1; i >= 0; i--) {
                        const b = enemyBullets[i];
                        b.worldX += b.vx * dt; b.worldY += b.vy * dt;
                        let remove = false;
                        for (const house of houses) {
                            for (const rect of house) {
                                if (b.worldX > rect.x - b.radius && b.worldX < rect.x + rect.w + b.radius &&
                                    b.worldY > rect.y - b.radius && b.worldY < rect.y + rect.h + b.radius) { remove = true; break; }
                            }
                            if (remove) break;
                        }
                        if (remove) { enemyBullets.splice(i, 1); continue; }
                        if (Math.hypot(b.worldX - player.worldX, b.worldY - player.worldY) < player.radius + b.radius) {
                            player.health -= b.damage;
                            enemyBullets.splice(i, 1);
                            lastDamageTime = now / 1000; // reset regen timer
                            if (player.health <= 0) { player.health = 0; player.isDead = true; deathScreen.style.display = 'flex'; }
                        }
                    }
                } else {
                    for (let i = enemyBullets.length - 1; i >= 0; i--) {
                        const b = enemyBullets[i];
                        b.worldX += b.vx * dt; b.worldY += b.vy * dt;
                        let remove = false;
                        for (const house of houses) {
                            for (const rect of house) {
                                if (b.worldX > rect.x - b.radius && b.worldX < rect.x + rect.w + b.radius &&
                                    b.worldY > rect.y - b.radius && b.worldY < rect.y + rect.h + b.radius) { remove = true; break; }
                            }
                            if (remove) break;
                        }
                        if (remove) enemyBullets.splice(i, 1);
                    }
                }

                checkPickupProximity();

                // --- Draw (exact same as original) ---
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.save();

                if (currentWeapon === 'sniper' && shootActive && (shootVec.x !== 0 || shootVec.y !== 0)) {
                    const playerScreen = { x: player.worldX + cameraOffsetX, y: player.worldY + cameraOffsetY };
                    ctx.translate(playerScreen.x, playerScreen.y);
                    ctx.scale(0.65, 0.65);
