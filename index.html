<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Infinite Plane | Houses, Plain Floor, Soft Camera</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a1a;
            touch-action: none;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            background: #3a5a40;
        }

        .move-joystick-base {
            position: fixed;
            bottom: 40px;
            left: 100px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.15);
            border: 3px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: auto;
            z-index: 10;
        }
        .move-joystick-thumb {
            position: fixed;
            bottom: 40px;
            left: 100px;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 11;
            box-shadow: 0 0 8px rgba(0,0,0,0.5);
        }

        #shootBase {
            position: fixed;
            bottom: 230px;
            left: calc(100vw - 140px);
            width: 120px;
            height: 120px;
            background: rgba(255, 200, 100, 0.15);
            border: 3px solid rgba(255, 200, 100, 0.6);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: auto;
            z-index: 10;
            display: none;
        }
        #shootThumb {
            position: fixed;
            bottom: 230px;
            left: calc(100vw - 140px);
            width: 50px;
            height: 50px;
            background: rgba(255, 200, 100, 0.9);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 11;
            box-shadow: 0 0 8px rgba(0,0,0,0.5);
            display: none;
        }

        #skillBase {
            position: fixed;
            bottom: 370px;
            left: calc(100vw - 140px);
            width: 120px;
            height: 120px;
            background: rgba(100, 150, 255, 0.15);
            border: 3px solid rgba(100, 150, 255, 0.6);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: auto;
            z-index: 10;
            display: none;
        }
        #skillThumb {
            position: fixed;
            bottom: 370px;
            left: calc(100vw - 140px);
            width: 50px;
            height: 50px;
            background: rgba(100, 150, 255, 0.9);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 11;
            box-shadow: 0 0 8px rgba(0,0,0,0.5);
            display: none;
        }

        #dashButton {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 18px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background: #e63946;
            border: 4px solid white;
            border-radius: 50px;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            cursor: pointer;
            z-index: 100;
            transition: background 0.2s, transform 0.1s;
            user-select: none;
            touch-action: manipulation;
        }
        #dashButton:active { transform: scale(0.95); }
        #dashButton.disabled {
            background: #555;
            border-color: #aaa;
            pointer-events: none;
            cursor: not-allowed;
        }

        #pickupButton {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            background: #2a9d8f;
            border: 3px solid white;
            border-radius: 30px;
            cursor: pointer;
            z-index: 100;
            display: none;
            touch-action: manipulation;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        #spawnButton {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            background: #9c27b0;
            border: 3px solid white;
            border-radius: 30px;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            touch-action: manipulation;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="move-joystick-base" id="moveBase"></div>
    <div class="move-joystick-thumb" id="moveThumb"></div>
    <div id="shootBase"></div>
    <div id="shootThumb"></div>
    <div id="skillBase"></div>
    <div id="skillThumb"></div>
    <button id="dashButton">DASH</button>
    <button id="pickupButton">PICK UP</button>
    <button id="spawnButton">SPAWN ENEMY</button>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const dashButton = document.getElementById('dashButton');
            const pickupButton = document.getElementById('pickupButton');
            const spawnButton = document.getElementById('spawnButton');
            const moveBaseEl = document.getElementById('moveBase');
            const moveThumbEl = document.getElementById('moveThumb');
            const shootBaseEl = document.getElementById('shootBase');
            const shootThumbEl = document.getElementById('shootThumb');
            const skillBaseEl = document.getElementById('skillBase');
            const skillThumbEl = document.getElementById('skillThumb');

            // --- Canvas resize ---
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // --- Infinite world: camera offsets ---
            let cameraOffsetX = 0;
            let cameraOffsetY = 0;
            const CAMERA_FOLLOW_SPEED = 1.5;   // reduced pull strength

            // --- Player (world coordinates) ---
            const player = {
                worldX: canvas.width / 2,
                worldY: canvas.height / 2,
                radius: 18,
                baseSpeed: 280,
                health: 100,
                maxHealth: 100
            };

            // --- Dash ---
            const dashDuration = 0.2;
            const maxDashSpeed = 800;
            const dashDecayRate = 18;
            const dashCooldown = 1.0;
            let dashActive = false, dashTimer = 0;
            let dashDirection = { x: 0, y: 0 };
            let cooldownTimer = 0;

            // --- Inventory & Weapons ---
            const inventory = [null, null, null, null];
            let currentWeapon = null;

            const pistolState = { ammo: 12, maxAmmo: 12, spare: 20, reloadTime: 1.2, fireRate: 0.45, bulletSpeed: 600, damage: 10 };
            const shotgunState = { ammo: 8, maxAmmo: 8, spare: 20, reloadTime: 1.8, pellets: 8, spreadAngle: Math.PI / 9, bulletSpeed: 500, damage: 8, recoilForce: 400 };

            let isReloading = false, reloadTimer = 0;
            let lastFireTime = 0;

            let skillCooldown = 0;
            const skillCooldownDuration = 1.0;

            // --- Recoil ---
            let recoilVelX = 0, recoilVelY = 0;

            // --- Floor items (world coordinates) ---
            let pistolOnFloor = { worldX: canvas.width/2 - 200, worldY: canvas.height/2 + 80, radius: 15, active: true, type: 'pistol' };
            let shotgunOnFloor = { worldX: canvas.width/2 + 200, worldY: canvas.height/2 + 80, radius: 15, active: true, type: 'shotgun' };

            // --- Dummy (world coordinates) ---
            const dummy = {
                worldX: canvas.width / 2 + 50,
                worldY: canvas.height / 2,
                radius: 30,
                health: 100,
                maxHealth: 100
            };

            // --- Bullets & enemies ---
            const playerBullets = [];
            const enemyBullets = [];
            const enemies = [];

            // --- Random houses (static obstacles) ---
            const houses = [];
            function generateHouses() {
                const numHouses = 30;
                for (let i = 0; i < numHouses; i++) {
                    let x, y, valid;
                    do {
                        x = (Math.random() - 0.5) * 2000;
                        y = (Math.random() - 0.5) * 2000;
                        valid = true;
                        // avoid spawning too close to player start
                        if (Math.hypot(x - player.worldX, y - player.worldY) < 150) valid = false;
                        // avoid dummy
                        if (Math.hypot(x - dummy.worldX, y - dummy.worldY) < 100) valid = false;
                        // avoid pickups
                        if (pistolOnFloor.active && Math.hypot(x - pistolOnFloor.worldX, y - pistolOnFloor.worldY) < 100) valid = false;
                        if (shotgunOnFloor.active && Math.hypot(x - shotgunOnFloor.worldX, y - shotgunOnFloor.worldY) < 100) valid = false;
                        // avoid too close to other houses (optional)
                    } while (!valid);
                    houses.push({ worldX: x, worldY: y, radius: 40 });
                }
            }
            generateHouses();

            // --- Effects ---
            let screenShake = 0, shakeDuration = 0;
            let skillFlashAlpha = 0;

            // ========== Joystick states ==========
            let movePointerId = null;
            let moveBaseCenter = { x: 0, y: 0 }, moveMaxDist = 0;
            let moveVec = { x: 0, y: 0 };

            let shootPointerId = null;
            let shootBaseCenter = { x: 0, y: 0 }, shootMaxDist = 0;
            let shootVec = { x: 0, y: 0 };
            let shootActive = false;

            let skillPointerId = null;
            let skillBaseCenter = { x: 0, y: 0 }, skillMaxDist = 0;
            let skillVec = { x: 0, y: 0 };
            let skillActive = false;
            let skillTargetWorld = { x: 0, y: 0 };

            // ========== Joystick helpers ==========
            function updateMoveBase() {
                const rect = moveBaseEl.getBoundingClientRect();
                moveBaseCenter.x = rect.left + rect.width / 2;
                moveBaseCenter.y = rect.top + rect.height / 2;
                moveMaxDist = (rect.width / 2) - (moveThumbEl.offsetWidth / 2);
                if (moveMaxDist < 0) moveMaxDist = 0;
            }
            function updateShootBase() {
                const rect = shootBaseEl.getBoundingClientRect();
                shootBaseCenter.x = rect.left + rect.width / 2;
                shootBaseCenter.y = rect.top + rect.height / 2;
                shootMaxDist = (rect.width / 2) - (shootThumbEl.offsetWidth / 2);
                if (shootMaxDist < 0) shootMaxDist = 0;
            }
            function updateSkillBase() {
                const rect = skillBaseEl.getBoundingClientRect();
                skillBaseCenter.x = rect.left + rect.width / 2;
                skillBaseCenter.y = rect.top + rect.height / 2;
                skillMaxDist = (rect.width / 2) - (skillThumbEl.offsetWidth / 2);
                if (skillMaxDist < 0) skillMaxDist = 0;
            }
            function moveMoveThumb(cx, cy) {
                let dx = cx - moveBaseCenter.x, dy = cy - moveBaseCenter.y;
                let dist = Math.hypot(dx, dy);
                if (dist > moveMaxDist) { dx = (dx/dist)*moveMaxDist; dy = (dy/dist)*moveMaxDist; dist = moveMaxDist; }
                moveThumbEl.style.left = (moveBaseCenter.x + dx) + 'px';
                moveThumbEl.style.top = (moveBaseCenter.y + dy) + 'px';
                moveVec.x = dist > 1 ? dx / moveMaxDist : 0;
                moveVec.y = dist > 1 ? dy / moveMaxDist : 0;
            }
            function resetMoveThumb() {
                moveThumbEl.style.left = moveBaseCenter.x + 'px';
                moveThumbEl.style.top = moveBaseCenter.y + 'px';
                moveVec.x = 0; moveVec.y = 0;
                movePointerId = null;
            }
            function moveShootThumb(cx, cy) {
                let dx = cx - shootBaseCenter.x, dy = cy - shootBaseCenter.y;
                let dist = Math.hypot(dx, dy);
                if (dist > shootMaxDist) { dx = (dx/dist)*shootMaxDist; dy = (dy/dist)*shootMaxDist; dist = shootMaxDist; }
                shootThumbEl.style.left = (shootBaseCenter.x + dx) + 'px';
                shootThumbEl.style.top = (shootBaseCenter.y + dy) + 'px';
                shootVec.x = dist > 1 ? dx / shootMaxDist : 0;
                shootVec.y = dist > 1 ? dy / shootMaxDist : 0;
            }
            function resetShootThumb() {
                shootThumbEl.style.left = shootBaseCenter.x + 'px';
                shootThumbEl.style.top = shootBaseCenter.y + 'px';
                shootVec.x = 0; shootVec.y = 0;
                shootPointerId = null;
                shootActive = false;
            }
            function moveSkillThumb(cx, cy) {
                let dx = cx - skillBaseCenter.x, dy = cy - skillBaseCenter.y;
                let dist = Math.hypot(dx, dy);
                if (dist > skillMaxDist) { dx = (dx/dist)*skillMaxDist; dy = (dy/dist)*skillMaxDist; dist = skillMaxDist; }
                skillThumbEl.style.left = (skillBaseCenter.x + dx) + 'px';
                skillThumbEl.style.top = (skillBaseCenter.y + dy) + 'px';
                skillVec.x = dist > 1 ? dx / skillMaxDist : 0;
                skillVec.y = dist > 1 ? dy / skillMaxDist : 0;
                if (dist > 0) {
                    const dashDist = 120;
                    const mag = Math.hypot(skillVec.x, skillVec.y);
                    skillTargetWorld.x = player.worldX + (skillVec.x / mag) * dashDist;
                    skillTargetWorld.y = player.worldY + (skillVec.y / mag) * dashDist;
                }
            }
            function resetSkillThumb() {
                skillThumbEl.style.left = skillBaseCenter.x + 'px';
                skillThumbEl.style.top = skillBaseCenter.y + 'px';
                skillVec.x = 0; skillVec.y = 0;
                skillPointerId = null;
                skillActive = false;
            }

            updateMoveBase(); updateShootBase(); updateSkillBase();
            window.addEventListener('resize', () => { updateMoveBase(); updateShootBase(); updateSkillBase(); });

            // ========== Movement joystick events ==========
            moveBaseEl.addEventListener('pointerdown', (e) => {
                if (e.target === moveBaseEl && movePointerId === null) {
                    e.preventDefault();
                    movePointerId = e.pointerId;
                    moveBaseEl.setPointerCapture(e.pointerId);
                    updateMoveBase();
                    moveMoveThumb(e.clientX, e.clientY);
                }
            });
            moveBaseEl.addEventListener('pointermove', (e) => {
                if (movePointerId === e.pointerId) { e.preventDefault(); moveMoveThumb(e.clientX, e.clientY); }
            });
            const moveUp = (e) => {
                if (movePointerId === e.pointerId) { e.preventDefault(); resetMoveThumb(); moveBaseEl.releasePointerCapture(e.pointerId); }
            };
            moveBaseEl.addEventListener('pointerup', moveUp);
            moveBaseEl.addEventListener('pointercancel', moveUp);
            window.addEventListener('pointermove', (e) => {
                if (movePointerId === e.pointerId) moveMoveThumb(e.clientX, e.clientY);
            });
            window.addEventListener('pointerup', (e) => {
                if (movePointerId === e.pointerId) resetMoveThumb();
            });

            // ========== Shooting & Skill joystick events ==========
            shootBaseEl.addEventListener('pointerdown', (e) => {
                if (e.target === shootBaseEl && shootPointerId === null && currentWeapon) {
                    e.preventDefault();
                    shootPointerId = e.pointerId;
                    shootBaseEl.setPointerCapture(e.pointerId);
                    updateShootBase();
                    moveShootThumb(e.clientX, e.clientY);
                    shootActive = true;
                }
            });
            shootBaseEl.addEventListener('pointermove', (e) => {
                if (shootPointerId === e.pointerId) { e.preventDefault(); moveShootThumb(e.clientX, e.clientY); }
            });
            const shootUp = (e) => {
                if (shootPointerId === e.pointerId) {
                    e.preventDefault();
                    if (currentWeapon === 'shotgun' && shootActive && (shootVec.x !== 0 || shootVec.y !== 0)) {
                        fireShotgun();
                    }
                    resetShootThumb();
                    shootBaseEl.releasePointerCapture(e.pointerId);
                }
            };
            shootBaseEl.addEventListener('pointerup', shootUp);
            shootBaseEl.addEventListener('pointercancel', shootUp);
            window.addEventListener('pointermove', (e) => {
                if (shootPointerId === e.pointerId) moveShootThumb(e.clientX, e.clientY);
            });
            window.addEventListener('pointerup', (e) => {
                if (shootPointerId === e.pointerId) {
                    if (currentWeapon === 'shotgun' && shootActive && (shootVec.x !== 0 || shootVec.y !== 0)) fireShotgun();
                    resetShootThumb();
                }
            });

            skillBaseEl.addEventListener('pointerdown', (e) => {
                if (e.target === skillBaseEl && skillPointerId === null && currentWeapon === 'shotgun' && skillCooldown <= 0) {
                    e.preventDefault();
                    skillPointerId = e.pointerId;
                    skillBaseEl.setPointerCapture(e.pointerId);
                    updateSkillBase();
                    moveSkillThumb(e.clientX, e.clientY);
                    skillActive = true;
                }
            });
            skillBaseEl.addEventListener('pointermove', (e) => {
                if (skillPointerId === e.pointerId) { e.preventDefault(); moveSkillThumb(e.clientX, e.clientY); }
            });
            const skillUp = (e) => {
                if (skillPointerId === e.pointerId) {
                    e.preventDefault();
                    if (skillActive && (skillVec.x !== 0 || skillVec.y !== 0)) {
                        executeShotgunSkill();
                    }
                    resetSkillThumb();
                    skillBaseEl.releasePointerCapture(e.pointerId);
                }
            };
            skillBaseEl.addEventListener('pointerup', skillUp);
            skillBaseEl.addEventListener('pointercancel', skillUp);
            window.addEventListener('pointermove', (e) => {
                if (skillPointerId === e.pointerId) moveSkillThumb(e.clientX, e.clientY);
            });
            window.addEventListener('pointerup', (e) => {
                if (skillPointerId === e.pointerId) {
                    if (skillActive && (skillVec.x !== 0 || skillVec.y !== 0)) executeShotgunSkill();
                    resetSkillThumb();
                }
            });

            // ========== Dash ==========
            function updateDashUI() {
                if (cooldownTimer > 0) { dashButton.textContent = 'COOLING...'; dashButton.classList.add('disabled'); }
                else if (dashActive) { dashButton.textContent = 'DASHING!'; dashButton.classList.add('disabled'); }
                else { dashButton.textContent = 'DASH'; dashButton.classList.remove('disabled'); }
            }
            function triggerDash() {
                if (cooldownTimer > 0 || dashActive) return;
                if (moveVec.x === 0 && moveVec.y === 0) return;
                const mag = Math.hypot(moveVec.x, moveVec.y);
                dashDirection.x = moveVec.x / mag;
                dashDirection.y = moveVec.y / mag;
                dashActive = true; dashTimer = 0;
                updateDashUI();
            }
            dashButton.addEventListener('pointerdown', (e) => { e.preventDefault(); triggerDash(); });
            dashButton.addEventListener('touchstart', (e) => { e.preventDefault(); triggerDash(); });

            // ========== Pickup ==========
            pickupButton.addEventListener('pointerdown', (e) => { e.preventDefault(); handlePickup(); });
            pickupButton.addEventListener('touchstart', (e) => { e.preventDefault(); handlePickup(); });

            function handlePickup() {
                let nearestItem = null, nearestDist = Infinity;
                if (pistolOnFloor.active) {
                    const d = Math.hypot(player.worldX - pistolOnFloor.worldX, player.worldY - pistolOnFloor.worldY);
                    if (d < nearestDist) { nearestDist = d; nearestItem = pistolOnFloor; }
                }
                if (shotgunOnFloor.active) {
                    const d = Math.hypot(player.worldX - shotgunOnFloor.worldX, player.worldY - shotgunOnFloor.worldY);
                    if (d < nearestDist) { nearestDist = d; nearestItem = shotgunOnFloor; }
                }
                if (nearestItem && nearestDist < 50) pickupWeapon(nearestItem);
            }

            function pickupWeapon(item) {
                const slot = inventory.findIndex(s => !s);
                if (slot === -1) return;
                inventory[slot] = { name: item.type, icon: item.type === 'pistol' ? '🔫' : '🖖' };
                item.active = false;
                if (!currentWeapon) equipWeapon(item.type);
                shootBaseEl.style.display = 'block';
                shootThumbEl.style.display = 'block';
                updateShootBase();
                pickupButton.style.display = 'none';
            }

            function equipWeapon(type) {
                currentWeapon = type;
                isReloading = false;
                if (type === 'shotgun') {
                    skillBaseEl.style.display = 'block';
                    skillThumbEl.style.display = 'block';
                    updateSkillBase();
                } else {
                    skillBaseEl.style.display = 'none';
                    skillThumbEl.style.display = 'none';
                }
            }

            canvas.addEventListener('pointerdown', (e) => {
                const rect = canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                const startX = 20, startY = 70, slotSize = 50, gap = 5;
                for (let i = 0; i < 4; i++) {
                    const slotX = startX + i * (slotSize + gap);
                    if (mx >= slotX && mx <= slotX + slotSize && my >= startY && my <= startY + slotSize) {
                        if (inventory[i] && inventory[i].name !== currentWeapon) {
                            equipWeapon(inventory[i].name);
                        }
                    }
                }
            });

            function checkPickupProximity() {
                let near = false;
                if (pistolOnFloor.active && Math.hypot(player.worldX - pistolOnFloor.worldX, player.worldY - pistolOnFloor.worldY) < 50) near = true;
                if (shotgunOnFloor.active && Math.hypot(player.worldX - shotgunOnFloor.worldX, player.worldY - shotgunOnFloor.worldY) < 50) near = true;
                pickupButton.style.display = near ? 'block' : 'none';
            }

            // ========== Reload ==========
            function startReload() {
                if (isReloading) return;
                const state = currentWeapon === 'pistol' ? pistolState : shotgunState;
                if (state.ammo >= state.maxAmmo || state.spare <= 0) return;
                isReloading = true;
                reloadTimer = state.reloadTime;
            }
            function finishReload() {
                const state = currentWeapon === 'pistol' ? pistolState : shotgunState;
                const needed = state.maxAmmo - state.ammo;
                const take = Math.min(needed, state.spare);
                state.ammo += take;
                state.spare -= take;
                isReloading = false;
            }

            // ========== Collision resolution with houses ==========
            function resolveHouseCollisions(entity) {
                for (const house of houses) {
                    const dx = entity.worldX - house.worldX;
                    const dy = entity.worldY - house.worldY;
                    const dist = Math.hypot(dx, dy);
                    const minDist = entity.radius + house.radius;
                    if (dist < minDist) {
                        const angle = Math.atan2(dy, dx);
                        const overlap = minDist - dist;
                        entity.worldX += Math.cos(angle) * overlap;
                        entity.worldY += Math.sin(angle) * overlap;
                    }
                }
            }

            // ========== Firing (world space) ==========
            function firePistol(now) {
                const state = pistolState;
                if (isReloading || state.ammo <= 0) { if (state.ammo === 0) startReload(); return false; }
                if (now - lastFireTime < state.fireRate * 1000) return false;
                if (shootVec.x === 0 && shootVec.y === 0) return false;
                const mag = Math.hypot(shootVec.x, shootVec.y);
                const vx = (shootVec.x / mag) * state.bulletSpeed;
                const vy = (shootVec.y / mag) * state.bulletSpeed;
                playerBullets.push({ worldX: player.worldX, worldY: player.worldY, vx, vy, radius: 5, damage: state.damage });
                state.ammo--;
                lastFireTime = now;
                if (state.ammo === 0) startReload();
                return true;
            }

            function fireShotgun() {
                const state = shotgunState;
                if (isReloading || state.ammo <= 0) { if (state.ammo === 0) startReload(); return; }
                const mag = Math.hypot(shootVec.x, shootVec.y);
                const dirX = shootVec.x / mag, dirY = shootVec.y / mag;
                for (let i = 0; i < state.pellets; i++) {
                    const angle = Math.atan2(dirY, dirX) + (Math.random()*2-1)*state.spreadAngle;
                    const speed = state.bulletSpeed + (Math.random()*100-50);
                    playerBullets.push({ worldX: player.worldX, worldY: player.worldY, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, radius: 3, damage: state.damage });
                }
                state.ammo--;
                recoilVelX = -dirX * state.recoilForce;
                recoilVelY = -dirY * state.recoilForce;
                if (state.ammo === 0) startReload();
            }

            function executeShotgunSkill() {
                if (skillCooldown > 0) return;
                player.worldX = skillTargetWorld.x;
                player.worldY = skillTargetWorld.y;
                resolveHouseCollisions(player); // prevent teleporting into a house
                const bulletCount = 32;
                for (let i = 0; i < bulletCount; i++) {
                    const angle = (i / bulletCount) * Math.PI * 2;
                    const speed = shotgunState.bulletSpeed;
                    playerBullets.push({ worldX: player.worldX, worldY: player.worldY, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, radius: 4, damage: shotgunState.damage * 0.7 });
                }
                screenShake = 10;
                shakeDuration = 0.3;
                skillFlashAlpha = 0.6;
                skillCooldown = skillCooldownDuration;
            }

            // ========== Enemy logic ==========
            function spawnEnemy() {
                let worldX, worldY, valid;
                do {
                    worldX = player.worldX + (Math.random() - 0.5) * 800;
                    worldY = player.worldY + (Math.random() - 0.5) * 800;
                    valid = true;
                    if (Math.hypot(worldX - player.worldX, worldY - player.worldY) < 200) valid = false;
                    for (const house of houses) {
                        if (Math.hypot(worldX - house.worldX, worldY - house.worldY) < 100) valid = false;
                    }
                } while (!valid);
                enemies.push({
                    worldX, worldY,
                    radius: 18,
                    health: 50,
                    speed: 120,
                    fireRate: 0.6,
                    lastFire: performance.now(),
                    damage: pistolState.damage
                });
            }

            spawnButton.addEventListener('pointerdown', (e) => { e.preventDefault(); spawnEnemy(); });
            spawnButton.addEventListener('touchstart', (e) => { e.preventDefault(); spawnEnemy(); });

            function updateEnemies(now, dt) {
                for (const enemy of enemies) {
                    const dx = player.worldX - enemy.worldX;
                    const dy = player.worldY - enemy.worldY;
                    const dist = Math.hypot(dx, dy);
                    const minDist = 150;
                    if (dist > minDist + 5) {
                        const angle = Math.atan2(dy, dx);
                        enemy.worldX += Math.cos(angle) * enemy.speed * dt;
                        enemy.worldY += Math.sin(angle) * enemy.speed * dt;
                    }
                    resolveHouseCollisions(enemy); // enemies also respect houses
                    if (now - enemy.lastFire > enemy.fireRate * 1000) {
                        const a = Math.atan2(player.worldY - enemy.worldY, player.worldX - enemy.worldX);
                        enemyBullets.push({
                            worldX: enemy.worldX, worldY: enemy.worldY,
                            vx: Math.cos(a) * pistolState.bulletSpeed,
                            vy: Math.sin(a) * pistolState.bulletSpeed,
                            radius: 4, damage: enemy.damage
                        });
                        enemy.lastFire = now;
                    }
                }
            }

            // ========== Game loop ==========
            let lastTime = performance.now();
            function gameLoop(now) {
                let dt = (now - lastTime) / 1000;
                if (dt > 0.1) dt = 0.1;
                lastTime = now;

                // Dash timers
                if (dashActive) {
                    dashTimer += dt;
                    if (dashTimer >= dashDuration) { dashActive = false; cooldownTimer = dashCooldown; }
                    updateDashUI();
                }
                if (cooldownTimer > 0) {
                    cooldownTimer -= dt;
                    if (cooldownTimer <= 0) { cooldownTimer = 0; updateDashUI(); }
                }

                if (skillCooldown > 0) skillCooldown -= dt;

                if (shakeDuration > 0) {
                    shakeDuration -= dt;
                    if (shakeDuration <= 0) screenShake = 0;
                }
                if (skillFlashAlpha > 0) skillFlashAlpha -= dt * 2.5;

                if (isReloading) {
                    reloadTimer -= dt;
                    if (reloadTimer <= 0) finishReload();
                }

                // Recoil decay
                const moveActive = moveVec.x !== 0 || moveVec.y !== 0;
                const decayRate = moveActive ? 0.8 : 3.0;
                recoilVelX *= Math.exp(-decayRate * dt);
                recoilVelY *= Math.exp(-decayRate * dt);
                if (Math.abs(recoilVelX) < 0.1) recoilVelX = 0;
                if (Math.abs(recoilVelY) < 0.1) recoilVelY = 0;

                // World movement velocity
                let worldMoveVelX = moveVec.x * player.baseSpeed + recoilVelX;
                let worldMoveVelY = moveVec.y * player.baseSpeed + recoilVelY;
                if (dashActive) {
                    const dashMag = maxDashSpeed * Math.exp(-dashDecayRate * dashTimer);
                    worldMoveVelX += dashDirection.x * dashMag;
                    worldMoveVelY += dashDirection.y * dashMag;
                }

                // Update player world position
                player.worldX += worldMoveVelX * dt;
                player.worldY += worldMoveVelY * dt;

                // Collide with houses
                resolveHouseCollisions(player);

                // Camera centering (soft pull)
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                const screenX = player.worldX + cameraOffsetX;
                const screenY = player.worldY + cameraOffsetY;
                const dx = screenX - centerX;
                const dy = screenY - centerY;
                cameraOffsetX -= dx * CAMERA_FOLLOW_SPEED * dt;
                cameraOffsetY -= dy * CAMERA_FOLLOW_SPEED * dt;

                // Shooting
                if (currentWeapon === 'pistol' && (shootVec.x !== 0 || shootVec.y !== 0)) {
                    firePistol(now);
                }

                // Enemies
                updateEnemies(now, dt);

                // Player bullets collisions
                for (let i = playerBullets.length - 1; i >= 0; i--) {
                    const b = playerBullets[i];
                    b.worldX += b.vx * dt;
                    b.worldY += b.vy * dt;
                    // Check house collisions? Bullets can pass through or collide? We'll make them collide with houses and disappear.
                    let remove = false;
                    for (const house of houses) {
                        if (Math.hypot(b.worldX - house.worldX, b.worldY - house.worldY) < b.radius + house.radius) {
                            remove = true;
                            break;
                        }
                    }
                    if (remove) { playerBullets.splice(i, 1); continue; }

                    let hit = false;
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        const e = enemies[j];
                        if (Math.hypot(b.worldX - e.worldX, b.worldY - e.worldY) < e.radius + b.radius) {
                            e.health -= b.damage;
                            if (e.health <= 0) enemies.splice(j, 1);
                            hit = true;
                            break;
                        }
                    }
                    if (hit) { playerBullets.splice(i, 1); continue; }
                    if (Math.hypot(b.worldX - dummy.worldX, b.worldY - dummy.worldY) < dummy.radius + b.radius) {
                        dummy.health = Math.max(1, dummy.health - b.damage);
                        playerBullets.splice(i, 1);
                    }
                }

                // Enemy bullets vs player
                for (let i = enemyBullets.length - 1; i >= 0; i--) {
                    const b = enemyBullets[i];
                    b.worldX += b.vx * dt;
                    b.worldY += b.vy * dt;
                    // Collide with houses
                    let remove = false;
                    for (const house of houses) {
                        if (Math.hypot(b.worldX - house.worldX, b.worldY - house.worldY) < b.radius + house.radius) {
                            remove = true;
                            break;
                        }
                    }
                    if (remove) { enemyBullets.splice(i, 1); continue; }
                    if (Math.hypot(b.worldX - player.worldX, b.worldY - player.worldY) < player.radius + b.radius) {
                        player.health -= b.damage;
                        enemyBullets.splice(i, 1);
                        if (player.health <= 0) {
                            player.health = player.maxHealth;
                            player.worldX = canvas.width/2;
                            player.worldY = canvas.height/2;
                            cameraOffsetX = 0;
                            cameraOffsetY = 0;
                            recoilVelX = 0; recoilVelY = 0;
                            dashActive = false;
                        }
                    }
                }

                checkPickupProximity();

                // --- Draw (plain floor, no grid) ---
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                // Background already solid #3a5a40 via canvas style

                ctx.save();
                if (screenShake > 0) {
                    const shakeX = (Math.random()*2-1)*screenShake;
                    const shakeY = (Math.random()*2-1)*screenShake;
                    ctx.translate(shakeX, shakeY);
                }

                // Draw houses
                function toScreen(wx, wy) { return { x: wx + cameraOffsetX, y: wy + cameraOffsetY }; }

                for (const house of houses) {
                    const s = toScreen(house.worldX, house.worldY);
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, house.radius, 0, Math.PI*2);
                    ctx.fillStyle = '#8B5A2B'; // brown
                    ctx.fill();
                    ctx.strokeStyle = '#5C4033';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                // Shotgun aim fan
                if (currentWeapon === 'shotgun' && shootActive && (shootVec.x !== 0 || shootVec.y !== 0) && !isReloading) {
                    const aimAngle = Math.atan2(shootVec.y, shootVec.x);
                    const halfSpread = shotgunState.spreadAngle;
                    const pScreen = toScreen(player.worldX, player.worldY);
                    ctx.save(); ctx.globalAlpha = 0.25; ctx.fillStyle = '#ffaa00';
                    ctx.beginPath(); ctx.moveTo(pScreen.x, pScreen.y);
                    ctx.arc(pScreen.x, pScreen.y, 80, aimAngle - halfSpread, aimAngle + halfSpread);
                    ctx.closePath(); ctx.fill(); ctx.globalAlpha = 1; ctx.restore();
                }

                // Skill aim preview
                if (skillActive && (skillVec.x !== 0 || skillVec.y !== 0)) {
                    const targetScreen = toScreen(skillTargetWorld.x, skillTargetWorld.y);
                    const playerScreen = toScreen(player.worldX, player.worldY);
                    ctx.beginPath();
                    ctx.arc(targetScreen.x, targetScreen.y, 10, 0, Math.PI*2);
                    ctx.fillStyle = '#00bfff'; ctx.fill();
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(playerScreen.x, playerScreen.y);
                    ctx.lineTo(targetScreen.x, targetScreen.y);
                    ctx.strokeStyle = '#00bfff';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([5, 5]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                // Dummy
                const dummyScreen = toScreen(dummy.worldX, dummy.worldY);
                ctx.beginPath(); ctx.arc(dummyScreen.x, dummyScreen.y, dummy.radius, 0, Math.PI*2);
                ctx.fillStyle = '#6c757d'; ctx.fill();
                ctx.strokeStyle = '#343a40'; ctx.lineWidth = 3; ctx.stroke();
                const barW = dummy.radius*2, barH = 6;
                const hpPct = dummy.health / dummy.maxHealth;
                ctx.fillStyle = '#333';
                ctx.fillRect(dummyScreen.x - barW/2 -1, dummyScreen.y - dummy.radius -10 -1, barW+2, barH+2);
                ctx.fillStyle = hpPct > 0.5 ? '#2a9d8f' : '#e76f51';
                ctx.fillRect(dummyScreen.x - barW/2, dummyScreen.y - dummy.radius -10, barW * hpPct, barH);
                ctx.fillStyle = 'white'; ctx.font = '10px monospace'; ctx.textAlign = 'center';
                ctx.fillText(`${dummy.health}/${dummy.maxHealth}`, dummyScreen.x, dummyScreen.y - dummy.radius -14);
                ctx.textAlign = 'start';

                // Floor items
                [pistolOnFloor, shotgunOnFloor].forEach(item => {
                    if (item.active) {
                        const s = toScreen(item.worldX, item.worldY);
                        ctx.beginPath(); ctx.arc(s.x, s.y, item.radius, 0, Math.PI*2);
                        ctx.fillStyle = '#ffc107'; ctx.fill();
                        ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
                        ctx.fillStyle = '#000'; ctx.font = '18px monospace'; ctx.textAlign = 'center';
                        ctx.fillText(item.type === 'pistol' ? '🔫' : '🖖', s.x, s.y+6);
                        ctx.textAlign = 'start';
                    }
                });

                // Enemies
                for (const enemy of enemies) {
                    const s = toScreen(enemy.worldX, enemy.worldY);
                    ctx.beginPath(); ctx.arc(s.x, s.y, enemy.radius, 0, Math.PI*2);
                    ctx.fillStyle = '#d32f2f'; ctx.fill();
                    ctx.strokeStyle = '#b71c1c'; ctx.lineWidth = 2; ctx.stroke();
                    const eBarW = enemy.radius*2, eBarH = 4;
                    const eHpPct = enemy.health / 50;
                    ctx.fillStyle = '#333';
                    ctx.fillRect(s.x - eBarW/2 -1, s.y - enemy.radius -8 -1, eBarW+2, eBarH+2);
                    ctx.fillStyle = eHpPct > 0.5 ? '#4caf50' : '#ff7043';
                    ctx.fillRect(s.x - eBarW/2, s.y - enemy.radius -8, eBarW * eHpPct, eBarH);
                }

                // Bullets
                ctx.fillStyle = '#ffdd55';
                playerBullets.forEach(b => { const s = toScreen(b.worldX, b.worldY); ctx.beginPath(); ctx.arc(s.x, s.y, b.radius, 0, Math.PI*2); ctx.fill(); });
                ctx.fillStyle = '#ff5252';
                enemyBullets.forEach(b => { const s = toScreen(b.worldX, b.worldY); ctx.beginPath(); ctx.arc(s.x, s.y, b.radius, 0, Math.PI*2); ctx.fill(); });

                // Player
                const playerScreen = toScreen(player.worldX, player.worldY);
                ctx.beginPath(); ctx.arc(playerScreen.x, playerScreen.y, player.radius, 0, Math.PI*2);
                ctx.fillStyle = dashActive ? '#e63946' : '#F4A261'; ctx.fill();
                ctx.strokeStyle = dashActive ? '#fff' : '#E76F51'; ctx.lineWidth = 3; ctx.stroke();
                const pBarW = player.radius*2, pBarH = 5;
                const pHpPct = player.health / player.maxHealth;
                ctx.fillStyle = '#333';
                ctx.fillRect(playerScreen.x - pBarW/2 -1, playerScreen.y - player.radius -14 -1, pBarW+2, pBarH+2);
                ctx.fillStyle = '#00e676';
                ctx.fillRect(playerScreen.x - pBarW/2, playerScreen.y - player.radius -14, pBarW * pHpPct, pBarH);

                if (skillFlashAlpha > 0) {
                    ctx.fillStyle = `rgba(255,255,255,${skillFlashAlpha})`;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }

                ctx.restore();

                // UI
                const totalSpeed = Math.hypot(worldMoveVelX, worldMoveVelY);
                let speedText = `Speed: ${Math.round(totalSpeed)} px/s`;
                if (dashActive) speedText += ' (DASH!)';
                if (Math.abs(recoilVelX) > 0.5 || Math.abs(recoilVelY) > 0.5) speedText += ' (recoil)';
                ctx.font = 'bold 16px monospace'; ctx.fillStyle = 'white';
                ctx.shadowColor = 'black'; ctx.shadowBlur = 4;
                ctx.fillText(speedText, 20, 40);
                ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

                if (currentWeapon) {
                    const state = currentWeapon === 'pistol' ? pistolState : shotgunState;
                    let ammoText = `${currentWeapon}: ${state.ammo}/${state.maxAmmo} | spares: ${state.spare}`;
                    if (isReloading) ammoText += ' RELOADING...';
                    ctx.font = 'bold 16px monospace'; ctx.fillStyle = '#ffc107';
                    ctx.shadowColor = 'black'; ctx.shadowBlur = 4;
                    ctx.textAlign = 'right';
                    ctx.fillText(ammoText, canvas.width - 30, canvas.height - 80);
                    ctx.textAlign = 'start';
                    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
                }

                // Inventory
                const startX = 20, startY = 70, slotSize = 50, gap = 5;
                ctx.strokeStyle = 'white'; ctx.lineWidth = 2;
                for (let i = 0; i < 4; i++) {
                    const x = startX + i * (slotSize + gap);
                    if (inventory[i] && inventory[i].name === currentWeapon) {
                        ctx.fillStyle = 'rgba(255,255,255,0.2)';
                        ctx.fillRect(x, startY, slotSize, slotSize);
                    }
                    ctx.strokeRect(x, startY, slotSize, slotSize);
                    if (inventory[i]) {
                        ctx.font = '24px sans-serif'; ctx.fillStyle = 'white'; ctx.textAlign = 'center';
                        ctx.fillText(inventory[i].icon, x + slotSize/2, startY + slotSize/2 + 8);
                        ctx.textAlign = 'start';
                    }
                }
                ctx.font = '12px sans-serif'; ctx.fillStyle = 'white';
                ctx.fillText('INVENTORY (tap to switch)', startX, startY - 5);

                requestAnimationFrame(gameLoop);
            }

            updateDashUI();
            requestAnimationFrame(gameLoop);
        })();
    </script>
</body>
</html>
