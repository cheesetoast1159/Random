            spawnButton.addEventListener('pointerdown', (e) => { e.preventDefault(); spawnPistolEnemy(); });
            spawnButton.addEventListener('touchstart', (e) => { e.preventDefault(); spawnPistolEnemy(); });
            spawnSwordButton.addEventListener('pointerdown', (e) => { e.preventDefault(); spawnSwordEnemy(); });
            spawnSwordButton.addEventListener('touchstart', (e) => { e.preventDefault(); spawnSwordEnemy(); });
            spawnSprayButton.addEventListener('pointerdown', (e) => { e.preventDefault(); spawnSprayEnemy(); });
            spawnSprayButton.addEventListener('touchstart', (e) => { e.preventDefault(); spawnSprayEnemy(); });

            // --- Helper: line in smoke ---
            function isLineInSmoke(x1, y1, x2, y2) {
                for (const puff of smokeClouds) {
                    if (puff.delay > 0 || puff.timer <= 0) continue;
                    const cx = puff.worldX, cy = puff.worldY, r = puff.radius;
                    const dx = x2 - x1, dy = y2 - y1;
                    const fx = x1 - cx, fy = y1 - cy;
                    const a = dx*dx + dy*dy;
                    if (a === 0) continue;
                    const b = 2*(fx*dx + fy*dy);
                    const c = fx*fx + fy*fy - r*r;
                    const discriminant = b*b - 4*a*c;
                    if (discriminant >= 0) {
                        const t1 = (-b - Math.sqrt(discriminant))/(2*a);
                        const t2 = (-b + Math.sqrt(discriminant))/(2*a);
                        if ((t1 >= 0 && t1 <= 1) || (t2 >= 0 && t2 <= 1) || (t1 < 0 && t2 > 1)) return true;
                    }
                }
                return false;
            }

            // ========== Enemy AI (enemy spray dash removed) ==========
            function updateEnemies(now, dt) {
                for (const enemy of enemies) {
                    const dx = player.worldX - enemy.worldX;
                    const dy = player.worldY - enemy.worldY;
                    const dist = Math.hypot(dx, dy);
                    const canSeePlayer = !isLineInSmoke(enemy.worldX, enemy.worldY, player.worldX, player.worldY);

                    if (enemy.type === 'pistol') {
                        if (canSeePlayer) {
                            const minDist = 150;
                            if (dist > minDist + 5) {
                                const angle = Math.atan2(dy, dx);
                                enemy.worldX += Math.cos(angle) * enemy.speed * dt;
                                enemy.worldY += Math.sin(angle) * enemy.speed * dt;
                            }
                            resolveHouseCollisions(enemy);
                            if (dist < enemy.visionRange && now - enemy.lastFire > enemy.fireRate * 1000) {
                                const a = Math.atan2(player.worldY - enemy.worldY, player.worldX - enemy.worldX);
                                enemyBullets.push({
                                    worldX: enemy.worldX, worldY: enemy.worldY,
                                    vx: Math.cos(a) * pistolState.bulletSpeed,
                                    vy: Math.sin(a) * pistolState.bulletSpeed,
                                    radius: 4, damage: enemy.damage
                                });
                                enemy.lastFire = now;
                            }
                        }
                    } else if (enemy.type === 'sword') {
                        if (enemy.hitFlash > 0) enemy.hitFlash -= dt;
                        if (!enemy.dodging && enemy.dodgeCooldown <= 0) {
                            for (const b of playerBullets) {
                                if (b.sourceWeapon === 'shotgun' || b.sourceWeapon === 'pistol') {
                                    const bDist = Math.hypot(enemy.worldX - b.worldX, enemy.worldY - b.worldY);
                                    if (bDist < enemy.radius * 4.5) {
                                        enemy.dodging = true;
                                        enemy.dodgeTimer = 0.25;
                                        const perpX = -b.vy, perpY = b.vx;
                                        const len = Math.hypot(perpX, perpY);
                                        if (len > 0) {
                                            const sign = Math.random() < 0.5 ? 1 : -1;
                                            enemy.dodgeDirection.x = (perpX / len) * sign;
                                            enemy.dodgeDirection.y = (perpY / len) * sign;
                                        }
                                        break;
                                    }
                                }
                            }
                        }
                        if (enemy.dodging) {
                            enemy.dodgeTimer -= dt;
                            if (enemy.dodgeTimer <= 0) { enemy.dodging = false; enemy.dodgeCooldown = 0.6; }
                            else {
                                enemy.worldX += enemy.dodgeDirection.x * enemy.dodgeSpeed * dt;
                                enemy.worldY += enemy.dodgeDirection.y * enemy.dodgeSpeed * dt;
                            }
                        } else if (canSeePlayer) {
                            if (dist > 10) {
                                const angle = Math.atan2(dy, dx);
                                enemy.worldX += Math.cos(angle) * enemy.speed * dt;
                                enemy.worldY += Math.sin(angle) * enemy.speed * dt;
                            }
                        }
                        if (enemy.dodgeCooldown > 0) enemy.dodgeCooldown -= dt;
                        resolveHouseCollisions(enemy);
                        if (canSeePlayer && dist < player.radius + enemy.radius && !player.isDead && 
                            !(daggerDashing || daggerSkillDashActive) && 
                            now - (enemy.lastMelee || 0) > enemy.meleeCooldown * 1000) {
                            player.health -= enemy.meleeDamage;
                            enemy.lastMelee = now;
                            enemy.hitFlash = 0.15;
                            const angle = Math.atan2(dy, dx);
                            recoilVelX -= Math.cos(angle) * 200;
                            recoilVelY -= Math.sin(angle) * 200;
                            if (player.health <= 0) {
                                player.health = 0;
                                player.isDead = true;
                                deathScreen.style.display = 'flex';
                            }
                        }
                    } else if (enemy.type === 'spray') {
                        if (enemy.panicActive) {
                            if (enemy.panicMagRemaining > 0 && now - (enemy.lastBurstTime || 0) > enemy.panicFireRate * 1000) {
                                const angle = Math.atan2(player.worldY - enemy.worldY, player.worldX - enemy.worldX);
                                const spread = enemy.panicSpread;
                                const a = angle + (Math.random()*2-1) * spread;
                                enemyBullets.push({
                                    worldX: enemy.worldX, worldY: enemy.worldY,
                                    vx: Math.cos(a) * enemy.burstBulletSpeed,
                                    vy: Math.sin(a) * enemy.burstBulletSpeed,
                                    radius: 3, damage: enemy.burstDamage
                                });
                                enemy.panicMagRemaining--;
                                enemy.lastBurstTime = now;
                            }
                            if (enemy.panicMagRemaining <= 0) {
                                enemy.panicActive = false;
                                enemy.lastBurstTime = now;
                            }
                        } else {
                            if (canSeePlayer) {
                                const preferredDist = enemy.normalDist;
                                if (enemy.health <= enemy.panicThreshold && dist < enemy.panicTriggerDist) {
                                    enemy.panicActive = true;
                                    enemy.panicMagRemaining = 30;
                                    enemy.lastBurstTime = 0;
                                } else {
                                    if (dist > preferredDist + 20) {
                                        const angle = Math.atan2(dy, dx);
                                        enemy.worldX += Math.cos(angle) * enemy.speed * dt;
                                        enemy.worldY += Math.sin(angle) * enemy.speed * dt;
                                    } else if (dist < preferredDist - 20) {
                                        const angle = Math.atan2(-dy, -dx);
                                        enemy.worldX += Math.cos(angle) * enemy.speed * dt;
                                        enemy.worldY += Math.sin(angle) * enemy.speed * dt;
                                    }
                                    resolveHouseCollisions(enemy);
                                    if (now - (enemy.lastBurstTime || 0) > enemy.burstCooldown * 1000) {
                                        enemy.burstTimer = enemy.burstCount;
                                        enemy.burstBulletsLeft = enemy.burstCount;
                                        enemy.lastBurstTime = now;
                                    }
                                    if (enemy.burstBulletsLeft > 0 && now - enemy.lastBurstTime >= (enemy.burstCount - enemy.burstBulletsLeft) * enemy.burstFireRate * 1000) {
                                        const angle = Math.atan2(player.worldY - enemy.worldY, player.worldX - enemy.worldX);
                                        const spread = 0.1;
                                        const a = angle + (Math.random()*2-1) * spread;
                                        enemyBullets.push({
                                            worldX: enemy.worldX, worldY: enemy.worldY,
                                            vx: Math.cos(a) * enemy.burstBulletSpeed,
                                            vy: Math.sin(a) * enemy.burstBulletSpeed,
                                            radius: 3, damage: enemy.burstDamage
                                        });
                                        enemy.burstBulletsLeft--;
                                        // dash removed
                                    }
                                }
                            }
                        }
                    }
                }
            }

            // ========== Game loop ==========
            let lastTime = performance.now();
            function gameLoop(now) {
                let dt = (now - lastTime) / 1000;
                if (dt > 0.1) dt = 0.1;
                lastTime = now;

                if (player.isDead) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.save();
                    function toScreen(wx, wy) { return { x: wx + cameraOffsetX, y: wy + cameraOffsetY }; }
                    for (const house of houses) {
                        for (const rect of house) {
                            const s = toScreen(rect.x, rect.y);
                            ctx.fillStyle = '#8B5A2B';
                            ctx.fillRect(s.x, s.y, rect.w, rect.h);
                            ctx.strokeStyle = '#5C4033'; ctx.lineWidth = 2;
                            ctx.strokeRect(s.x, s.y, rect.w, rect.h);
                        }
                    }
                    ctx.restore();
                    requestAnimationFrame(gameLoop);
                    return;
                }

                // Dash timers
                if (dashActive) {
                    dashTimer += dt;
                    if (dashTimer >= dashDuration) { dashActive = false; cooldownTimer = dashCooldown; }
                    updateDashUI();
                }
                if (cooldownTimer > 0) { cooldownTimer -= dt; if (cooldownTimer <= 0) { cooldownTimer = 0; updateDashUI(); } }
                if (skillCooldown > 0) skillCooldown -= dt;
                if (daggerCooldown > 0) daggerCooldown -= dt;

                if (shakeDuration > 0) { shakeDuration -= dt; if (shakeDuration <= 0) screenShake = 0; }
                if (skillFlashAlpha > 0) skillFlashAlpha -= dt * 2.5;

                if (isReloading) { reloadTimer -= dt; if (reloadTimer <= 0) finishReload(); }

                const moveActive = moveVec.x !== 0 || moveVec.y !== 0;
                const decayRate = moveActive ? 0.8 : 3.0;
                recoilVelX *= Math.exp(-decayRate * dt); recoilVelY *= Math.exp(-decayRate * dt);
                if (Math.abs(recoilVelX) < 0.1) recoilVelX = 0;
                if (Math.abs(recoilVelY) < 0.1) recoilVelY = 0;

                const playerMoving = moveVec.x !== 0 || moveVec.y !== 0 || Math.abs(recoilVelX) > 5 || Math.abs(recoilVelY) > 5;
                if (currentWeapon === 'sniper') {
                    if (!playerMoving) sniperSpread = Math.max(SNIPER_MIN_SPREAD, sniperSpread - SNIPER_SPREAD_RECOVERY * dt);
                    else sniperSpread = SNIPER_MAX_SPREAD;
                    sniperAimAngle = Math.sin(now * 0.001 * SNIPER_OSCILLATION_SPEED) * (sniperSpread / 2);
                }

                // --- Dagger basic dash update ---
                if (daggerDashing) {
                    daggerDashTimer -= dt;
                    if (daggerDashTimer <= 0) {
                        daggerDashing = false;
                        daggerDashTimer = 0;
                        daggerCooldown = daggerState.cooldown;
                    } else {
                        const moveX = daggerDashDirection.x * daggerDashSpeed * dt;
                        const moveY = daggerDashDirection.y * daggerDashSpeed * dt;
                        player.worldX += moveX;
                        player.worldY += moveY;
                        resolveHouseCollisions(player);
                        for (let j = enemies.length - 1; j >= 0; j--) {
                            const e = enemies[j];
                            if (Math.hypot(player.worldX - e.worldX, player.worldY - e.worldY) < player.radius + e.radius) {
                                e.health -= daggerState.damage;
                                if (e.health <= 0) enemies.splice(j, 1);
                            }
                        }
                    }
                }

                // --- Dagger long dash skill update ---
                if (daggerSkillDashActive) {
                    daggerSkillDashTimer -= dt;
                    if (daggerSkillDashTimer <= 0) {
                        daggerSkillDashActive = false;
                        daggerSkillDashTimer = 0;
                        const dirX = daggerSkillDashDirection.x;
                        const dirY = daggerSkillDashDirection.y;
                        const startDashX = player.worldX - dirX * daggerSkillDashDistance;
                        const startDashY = player.worldY - dirY * daggerSkillDashDistance;
                        const segmentDist = daggerSkillDashDistance / 4;
                        daggerSkillExplosionQueue = [];
                        for (let i = 0; i < 5; i++) {
                            const distFromStart = i * segmentDist;
                            const worldX = startDashX + dirX * distFromStart;
                            const worldY = startDashY + dirY * distFromStart;
                            const delay = 1.0 + i * 0.15;
                            daggerSkillExplosionQueue.push({ worldX, worldY, delay, indicatorCreated: false });
                        }
                    } else {
                        const moveX = daggerSkillDashDirection.x * daggerSkillDashSpeed * dt;
                        const moveY = daggerSkillDashDirection.y * daggerSkillDashSpeed * dt;
                        player.worldX += moveX;
                        player.worldY += moveY;
                        resolveHouseCollisions(player);
                    }
                }

                // Process explosion queue
                for (let i = daggerSkillExplosionQueue.length - 1; i >= 0; i--) {
                    const exp = daggerSkillExplosionQueue[i];
                    exp.delay -= dt;
                    if (!exp.indicatorCreated && exp.delay <= 0.35 && exp.delay > 0) {
                        exp.indicatorCreated = true;
                        daggerSkillIndicators.push({
                            worldX: exp.worldX, worldY: exp.worldY,
                            timer: exp.delay + 0.3
                        });
                    }
                    if (exp.delay <= 0) {
                        daggerSkillExplosions.push({
                            worldX: exp.worldX, worldY: exp.worldY,
                            radius: 10, maxRadius: 70, timer: 0.4, damage: 30
                        });
                        for (let j = enemies.length - 1; j >= 0; j--) {
                            const e = enemies[j];
                            if (Math.hypot(exp.worldX - e.worldX, exp.worldY - e.worldY) < 70 + e.radius) {
                                e.health -= 30;
                                if (e.health <= 0) enemies.splice(j, 1);
                            }
                        }
                        if (Math.hypot(exp.worldX - dummy.worldX, exp.worldY - dummy.worldY) < 70 + dummy.radius) {
                            dummy.health = Math.max(1, dummy.health - 30);
                        }
                        screenShake = 5; shakeDuration = 0.1;
                        daggerSkillExplosionQueue.splice(i, 1);
                    }
                }

                // Update indicators
                for (let i = daggerSkillIndicators.length - 1; i >= 0; i--) {
                    const ind = daggerSkillIndicators[i];
                    ind.timer -= dt;
                    if (ind.timer <= 0) daggerSkillIndicators.splice(i, 1);
                }

                // Update explosion visuals
                for (let i = daggerSkillExplosions.length - 1; i >= 0; i--) {
                    const exp = daggerSkillExplosions[i];
                    exp.timer -= dt;
                    if (exp.timer <= 0) {
                        daggerSkillExplosions.splice(i, 1);
                    } else {
                        const progress = 1 - (exp.timer / 0.4);
                        exp.radius = 10 + (exp.maxRadius - 10) * progress;
                    }
                }

                // --- Spray skill update ---
                if (spraySkillActive) {
                    if (spraySkillDashBackward) {
                        spraySkillDashTimer -= dt;
                        const dashSpeed = spraySkillDashDistance / spraySkillDashDuration;
                        player.worldX += spraySkillAimDirX * -dashSpeed * dt;
                        player.worldY += spraySkillAimDirY * -dashSpeed * dt;
                        resolveHouseCollisions(player);
                        if (spraySkillDashTimer <= 0) {
                            spraySkillDashBackward = false;
                            spraySkillDashTimer = 0;
                            spraySkillNextFireTime = performance.now() + 0.1;
                        }
                    } else {
                        if (spraySkillBulletsLeft > 0 && now >= spraySkillNextFireTime) {
                            const spread = spraySkillSpread;
                            const baseAngle = Math.atan2(spraySkillAimDirY, spraySkillAimDirX);
                            const angle = baseAngle + (Math.random()*2-1) * spread;
                            const speed = sprayState.bulletSpeed;
                            playerBullets.push({
                                worldX: player.worldX, worldY: player.worldY,
                                vx: Math.cos(angle) * speed,
                                vy: Math.sin(angle) * speed,
                                radius: 3, damage: sprayState.damage,
                                isBeam: false, sourceWeapon: 'spray'
                            });
                            spraySkillBulletsLeft--;
                            spraySkillNextFireTime = now + spraySkillFireRate * 1000;
                        }
                        if (spraySkillBulletsLeft <= 0) {
                            spraySkillActive = false;
                        }
                    }
                }

                // Normal movement (skip if dashing)
                if (!daggerDashing && !daggerSkillDashActive && !spraySkillDashBackward) {
                    let worldMoveVelX = moveVec.x * player.baseSpeed + recoilVelX;
                    let worldMoveVelY = moveVec.y * player.baseSpeed + recoilVelY;
                    if (dashActive) {
                        const dashMag = maxDashSpeed * Math.exp(-dashDecayRate * dashTimer);
                        worldMoveVelX += dashDirection.x * dashMag;
                        worldMoveVelY += dashDirection.y * dashMag;
                    }
                    player.worldX += worldMoveVelX * dt;
                    player.worldY += worldMoveVelY * dt;
                    resolveHouseCollisions(player);
                }

                // Camera centering
                const centerX = canvas.width / 2, centerY = canvas.height / 2;
                const screenX = player.worldX + cameraOffsetX;
                const screenY = player.worldY + cameraOffsetY;
                cameraOffsetX -= (screenX - centerX) * CAMERA_FOLLOW_SPEED * dt;
                cameraOffsetY -= (screenY - centerY) * CAMERA_FOLLOW_SPEED * dt;

                // Spray regular burst fire (player, with shake)
                if (currentWeapon === 'spray' && shootActive && !spraySkillActive && !isReloading) {
                    const state = sprayState;
                    if (sprayBurstBulletsLeft > 0) {
                        if (now - sprayBurstTimer >= (state.burstCount - sprayBurstBulletsLeft) * state.burstFireRate * 1000) {
                            const mag = Math.hypot(shootVec.x, shootVec.y);
                            if (mag > 0) {
                                const baseAngle = Math.atan2(shootVec.y, shootVec.x);
                                const angle = baseAngle + (Math.random()*2-1) * state.spread;
                                playerBullets.push({
                                    worldX: player.worldX, worldY: player.worldY,
                                    vx: Math.cos(angle) * state.bulletSpeed,
                                    vy: Math.sin(angle) * state.bulletSpeed,
                                    radius: 3, damage: state.damage,
                                    isBeam: false, sourceWeapon: 'spray'
                                });
                                state.ammo--;
                                screenShake = 1; shakeDuration = 0.03;
                                if (state.ammo <= 0) startReload();
                            }
                            sprayBurstBulletsLeft--;
                            if (sprayBurstBulletsLeft === 0) {
                                sprayNextBurstTime = now + state.burstCooldown * 1000;
                            }
                        }
                    } else if (now >= sprayNextBurstTime && state.ammo > 0) {
                        fireSprayBurst(now);
                    }
                }

                function fireSprayBurst(now) {
                    const state = sprayState;
                    if (isReloading || state.ammo <= 0 || player.isDead) return;
                    if (now < sprayNextBurstTime) return;
                    if (shootVec.x === 0 && shootVec.y === 0) return;
                    sprayBurstBulletsLeft = state.burstCount;
                    sprayBurstTimer = now;
                    sprayNextBurstTime = now + state.burstCooldown * 1000;
                }

                // Pistol auto-fire
                if (currentWeapon === 'pistol' && shootActive && !daggerDashing && !daggerSkillDashActive && !spraySkillDashBackward) {
                    firePistol(now);
                }

                updateEnemies(now, dt);

                // Player bullets collisions
                for (let i = playerBullets.length - 1; i >= 0; i--) {
                    const b = playerBullets[i];
                    b.worldX += b.vx * dt;
                    b.worldY += b.vy * dt;
                    let remove = false;
                    for (const house of houses) {
                        for (const rect of house) {
                            if (b.worldX > rect.x - b.radius && b.worldX < rect.x + rect.w + b.radius &&
                                b.worldY > rect.y - b.radius && b.worldY < rect.y + rect.h + b.radius) {
                                remove = true; break;
                            }
                        }
                        if (remove) break;
                    }
                    if (remove) { playerBullets.splice(i, 1); continue; }
                    let hit = false;
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        const e = enemies[j];
                        if (Math.hypot(b.worldX - e.worldX, b.worldY - e.worldY) < e.radius + b.radius) {
                            e.health -= b.damage;
                            if (e.health <= 0) enemies.splice(j, 1);
                            hit = true; break;
                        }
                    }
                    if (hit) { playerBullets.splice(i, 1); continue; }
                    if (Math.hypot(b.worldX - dummy.worldX, b.worldY - dummy.worldY) < dummy.radius + b.radius) {
                        dummy.health = Math.max(1, dummy.health - b.damage);
                        playerBullets.splice(i, 1);
                    }
                }

                // Enemy bullets vs player
                for (let i = enemyBullets.length - 1; i >= 0; i--) {
                    const b = enemyBullets[i];
                    b.worldX += b.vx * dt;
                    b.worldY += b.vy * dt;
                    let remove = false;
                    for (const house of houses) {
                        for (const rect of house) {
                            if (b.worldX > rect.x - b.radius && b.worldX < rect.x + rect.w + b.radius &&
                                b.worldY > rect.y - b.radius && b.worldY < rect.y + rect.h + b.radius) {
                                remove = true; break;
                            }
                        }
                        if (remove) break;
                    }
                    if (remove) { enemyBullets.splice(i, 1); continue; }
                    if (Math.hypot(b.worldX - player.worldX, b.worldY - player.worldY) < player.radius + b.radius) {
                        player.health -= b.damage;
                        enemyBullets.splice(i, 1);
                        if (player.health <= 0) {
                            player.health = 0;
                            player.isDead = true;
                            deathScreen.style.display = 'flex';
                        }
                    }
                }

                checkPickupProximity();

                // --- Draw ---
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.save();

                if (currentWeapon === 'sniper' && shootActive && (shootVec.x !== 0 || shootVec.y !== 0)) {
                    const playerScreen = { x: player.worldX + cameraOffsetX, y: player.worldY + cameraOffsetY };
                    ctx.translate(playerScreen.x, playerScreen.y);
                    ctx.scale(0.65, 0.65);
                    ctx.translate(-playerScreen.x, -playerScreen.y);
                }

                if (screenShake > 0) {
                    const shakeX = (Math.random()*2-1)*screenShake;
                    const shakeY = (Math.random()*2-1)*screenShake;
                    ctx.translate(shakeX, shakeY);
                }

                function toScreen(wx, wy) { return { x: wx + cameraOffsetX, y: wy + cameraOffsetY }; }

                // Draw houses
                for (const house of houses) {
                    for (const rect of house) {
                        const s = toScreen(rect.x, rect.y);
                        ctx.fillStyle = '#8B5A2B';
                        ctx.fillRect(s.x, s.y, rect.w, rect.h);
                        ctx.strokeStyle = '#5C4033';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(s.x, s.y, rect.w, rect.h);
                    }
                }

                // Draw smoke clouds
                for (const puff of smokeClouds) {
                    if (puff.delay > 0 || puff.timer <= 0) continue;
                    const s = toScreen(puff.worldX, puff.worldY);
                    const alpha = Math.min(1.0, puff.timer / 1.0) * 0.35;
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = '#808080';
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, puff.radius, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1.0;

                // Draw grenades
                for (const g of grenades) {
                    const s = toScreen(g.worldX, g.worldY);
                    ctx.fillStyle = '#333';
                    ctx.fillRect(s.x - 4, s.y - 4, 8, 8);
                    ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
                    ctx.strokeRect(s.x - 4, s.y - 4, 8, 8);
                }

                // Draw dagger indicators
                for (const ind of daggerSkillIndicators) {
                    const s = toScreen(ind.worldX, ind.worldY);
                    const progress = 1 - (ind.timer / 0.65);
                    const radius = 10 + progress * 30;
                    const alpha = Math.max(0, ind.timer * 2);
                    ctx.globalAlpha = alpha * 0.6;
                    ctx.strokeStyle = '#ff3300';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, radius, 0, Math.PI*2);
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }

                // Draw dagger explosions
                for (const exp of daggerSkillExplosions) {
                    const s = toScreen(exp.worldX, exp.worldY);
                    const alpha = exp.timer / 0.4;
                    ctx.globalAlpha = alpha * 0.7;
                    ctx.fillStyle = '#ff6600';
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, exp.radius, 0, Math.PI*2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                    ctx.strokeStyle = '#ffaa00';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                // Spray skill fan and dash indicator
                if (currentWeapon === 'spray' && skillActive && (skillVec.x !== 0 || skillVec.y !== 0) && skillCooldown <= 0) {
                    const pScreen = toScreen(player.worldX, player.worldY);
                    const baseAngle = Math.atan2(skillVec.y, skillVec.x);
                    const halfSpread = spraySkillSpread;
                    const fanLength = 120;
                    ctx.save();
                    ctx.globalAlpha = 0.25;
                    ctx.fillStyle = '#ff00ff';
                    ctx.beginPath();
                    ctx.moveTo(pScreen.x, pScreen.y);
                    ctx.arc(pScreen.x, pScreen.y, fanLength, baseAngle - halfSpread, baseAngle + halfSpread);
                    ctx.closePath();
                    ctx.fill();
                    ctx.globalAlpha = 1;
                    ctx.strokeStyle = '#ff00ff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    const dashDirX = -Math.cos(baseAngle);
                    const dashDirY = -Math.sin(baseAngle);
                    const dashEndX = pScreen.x + dashDirX * spraySkillDashDistance;
                    const dashEndY = pScreen.y + dashDirY * spraySkillDashDistance;
                    ctx.beginPath();
                    ctx.moveTo(pScreen.x, pScreen.y);
                    ctx.lineTo(dashEndX, dashEndY);
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 3;
                    ctx.setLineDash([5, 5]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.restore();
                }

                // Sniper fan & oscillation
                if (currentWeapon === 'sniper' && shootActive && (shootVec.x !== 0 || shootVec.y !== 0) && !isReloading) {
                    const baseAngle = Math.atan2(shootVec.y, shootVec.x);
                    const fanLength = 1500;
                    const pScreen = toScreen(player.worldX, player.worldY);
                    ctx.save();
                    ctx.globalAlpha = 0.2; ctx.fillStyle = '#00ffff';
                    ctx.beginPath();
                    ctx.moveTo(pScreen.x, pScreen.y);
                    ctx.arc(pScreen.x, pScreen.y, fanLength, baseAngle - sniperSpread/2, baseAngle + sniperSpread/2);
                    ctx.closePath(); ctx.fill();
                    ctx.globalAlpha = 1;
                    ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 1; ctx.stroke();
                    const aimAngle = baseAngle + sniperAimAngle;
                    const endX = pScreen.x + Math.cos(aimAngle) * fanLength;
                    const endY = pScreen.y + Math.sin(aimAngle) * fanLength;
                    ctx.beginPath(); ctx.moveTo(pScreen.x, pScreen.y); ctx.lineTo(endX, endY);
                    ctx.strokeStyle = 'white'; ctx.lineWidth = 1.5;
                    ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]);
                    ctx.restore();
                }

                // Shotgun aim fan
                if (currentWeapon === 'shotgun' && shootActive && (shootVec.x !== 0 || shootVec.y !== 0) && !isReloading) {
                    const aimAngle = Math.atan2(shootVec.y, shootVec.x);
                    const halfSpread = shotgunState.spreadAngle;
                    const pScreen = toScreen(player.worldX, player.worldY);
                    ctx.save(); ctx.globalAlpha = 0.25; ctx.fillStyle = '#ffaa00';
                    ctx.beginPath(); ctx.moveTo(pScreen.x, pScreen.y);
                    ctx.arc(pScreen.x, pScreen.y, 80, aimAngle - halfSpread, aimAngle + halfSpread);
                    ctx.closePath(); ctx.fill(); ctx.globalAlpha = 1; ctx.restore();
                }

                // Dagger basic aim indicator
                if (currentWeapon === 'dagger' && shootActive && (shootVec.x !== 0 || shootVec.y !== 0)) {
                    const pScreen = toScreen(player.worldX, player.worldY);
                    const endX = pScreen.x + shootVec.x * daggerState.dashDistance;
                    const endY = pScreen.y + shootVec.y * daggerState.dashDistance;
                    ctx.beginPath(); ctx.moveTo(pScreen.x, pScreen.y); ctx.lineTo(endX, endY);
                    ctx.strokeStyle = '#ff9999'; ctx.lineWidth = 2;
                    ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]);
                }

                // Skill aim preview (shotgun, sniper, dagger)
                if (skillActive && (skillVec.x !== 0 || skillVec.y !== 0) && currentWeapon !== 'spray') {
                    const targetScreen = toScreen(skillTargetWorld.x, skillTargetWorld.y);
                    const playerScreen = toScreen(player.worldX, player.worldY);
                    ctx.beginPath();
                    ctx.arc(targetScreen.x, targetScreen.y, 10, 0, Math.PI*2);
                    ctx.fillStyle = currentWeapon === 'sniper' ? '#808080' : (currentWeapon === 'dagger' ? '#ff6666' : '#00bfff');
                    ctx.fill();
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(playerScreen.x, playerScreen.y); ctx.lineTo(targetScreen.x, targetScreen.y);
                    ctx.strokeStyle = currentWeapon === 'sniper' ? '#808080' : (currentWeapon === 'dagger' ? '#ff6666' : '#00bfff');
                    ctx.lineWidth = 2;
                    ctx.setLineDash([5,5]); ctx.stroke(); ctx.setLineDash([]);
                }

                // Dummy
                const dummyScreen = toScreen(dummy.worldX, dummy.worldY);
                ctx.beginPath(); ctx.arc(dummyScreen.x, dummyScreen.y, dummy.radius, 0, Math.PI*2);
                ctx.fillStyle = '#6c757d'; ctx.fill();
                ctx.strokeStyle = '#343a40'; ctx.lineWidth = 3; ctx.stroke();
                const barW = dummy.radius*2, barH = 6;
                const hpPct = dummy.health / dummy.maxHealth;
                ctx.fillStyle = '#333';
                ctx.fillRect(dummyScreen.x - barW/2 -1, dummyScreen.y - dummy.radius -10 -1, barW+2, barH+2);
                ctx.fillStyle = hpPct > 0.5 ? '#2a9d8f' : '#e76f51';
                ctx.fillRect(dummyScreen.x - barW/2, dummyScreen.y - dummy.radius -10, barW * hpPct, barH);
                ctx.fillStyle = 'white'; ctx.font = '10px monospace'; ctx.textAlign = 'center';
                ctx.fillText(`${dummy.health}/${dummy.maxHealth}`, dummyScreen.x, dummyScreen.y - dummy.radius -14);
                ctx.textAlign = 'start';

                // Floor items
                [pistolOnFloor, shotgunOnFloor, sniperOnFloor, daggerOnFloor, sprayOnFloor].forEach(item => {
                    if (item.active) {
                        const s = toScreen(item.worldX, item.worldY);
                        ctx.beginPath(); ctx.arc(s.x, s.y, item.radius, 0, Math.PI*2);
                        ctx.fillStyle = '#ffc107'; ctx.fill();
                        ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
                        ctx.fillStyle = '#000'; ctx.font = '18px monospace'; ctx.textAlign = 'center';
                        ctx.fillText(item.type === 'pistol' ? '🔫' : (item.type === 'shotgun' ? '🖖' : (item.type === 'sniper' ? '🔭' : (item.type === 'dagger' ? '🗡️' : '💥'))), s.x, s.y+6);
                        ctx.textAlign = 'start';
                    }
                });

                // Enemies
                for (const enemy of enemies) {
                    const s = toScreen(enemy.worldX, enemy.worldY);
                    ctx.beginPath(); ctx.arc(s.x, s.y, enemy.radius, 0, Math.PI*2);
                    if (enemy.type === 'pistol') { ctx.fillStyle = '#d32f2f'; ctx.strokeStyle = '#b71c1c'; }
                    else if (enemy.type === 'sword') { ctx.fillStyle = enemy.hitFlash > 0 ? '#ff0000' : '#ff9800'; ctx.strokeStyle = '#e65100'; }
                    else if (enemy.type === 'spray') { 
                        ctx.fillStyle = enemy.panicActive ? '#ff4081' : '#00bcd4'; 
                        ctx.strokeStyle = '#006064'; 
                    }
                    ctx.fill(); ctx.lineWidth = 2; ctx.stroke();
                    if (enemy.type === 'sword') {
                        const angleToPlayer = Math.atan2(player.worldY - enemy.worldY, player.worldX - enemy.worldX);
                        const swordLength = enemy.radius + 6;
                        const swordEndX = s.x + Math.cos(angleToPlayer) * swordLength;
                        const swordEndY = s.y + Math.sin(angleToPlayer) * swordLength;
                        ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(swordEndX, swordEndY);
                        ctx.strokeStyle = '#cccccc'; ctx.lineWidth = 3; ctx.stroke();
                        const perpX = -Math.sin(angleToPlayer), perpY = Math.cos(angleToPlayer);
                        ctx.beginPath();
                        ctx.moveTo(s.x + perpX*5, s.y + perpY*5);
                        ctx.lineTo(s.x - perpX*5, s.y - perpY*5);
                        ctx.strokeStyle = '#999999'; ctx.lineWidth = 2; ctx.stroke();
                        if (enemy.hitFlash > 0) {
                            ctx.save(); ctx.globalAlpha = enemy.hitFlash * 2;
                            ctx.beginPath();
                            ctx.arc(s.x, s.y, enemy.radius + 8, angleToPlayer - 0.5, angleToPlayer + 0.5);
                            ctx.strokeStyle = '#ff4444'; ctx.lineWidth = 3; ctx.stroke();
                            ctx.restore();
                        }
                    }
                    const eBarW = enemy.radius*2, eBarH = 4;
                    const maxHp = enemy.type === 'pistol' ? 50 : (enemy.type === 'sword' ? 70 : 60);
                    const eHpPct = enemy.health / maxHp;
                    ctx.fillStyle = '#333';
                    ctx.fillRect(s.x - eBarW/2 -1, s.y - enemy.radius -8 -1, eBarW+2, eBarH+2);
                    ctx.fillStyle = eHpPct > 0.5 ? '#4caf50' : '#ff7043';
                    ctx.fillRect(s.x - eBarW/2, s.y - enemy.radius -8, eBarW * eHpPct, eBarH);
                }

                // Bullets
                for (const b of playerBullets) {
                    const s = toScreen(b.worldX, b.worldY);
                    if (b.isBeam) {
                        const angle = Math.atan2(b.vy, b.vx);
                        const beamLength = 40;
                        const startX = s.x - Math.cos(angle) * beamLength;
                        const startY = s.y - Math.sin(angle) * beamLength;
                        ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(s.x, s.y);
                        ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 4;
                        ctx.shadowBlur = 8; ctx.shadowColor = '#00ffff';
                        ctx.stroke(); ctx.shadowBlur = 0;
                    } else {
                        ctx.beginPath(); ctx.arc(s.x, s.y, b.radius, 0, Math.PI*2);
                        ctx.fillStyle = b.sourceWeapon === 'shotgun' ? '#ffaa00' : (b.sourceWeapon === 'spray' ? '#ff00ff' : '#ffdd55');
                        ctx.fill();
                    }
                }

                ctx.fillStyle = '#ff5252';
                enemyBullets.forEach(b => {
                    const s = toScreen(b.worldX, b.worldY);
                    ctx.beginPath(); ctx.arc(s.x, s.y, b.radius, 0, Math.PI*2); ctx.fill();
                });

                // Player with weapon visual
                const playerScreen = toScreen(player.worldX, player.worldY);
                let weaponAngle = 0;
                if (shootActive && (shootVec.x !== 0 || shootVec.y !== 0)) weaponAngle = Math.atan2(shootVec.y, shootVec.x);
                else if (moveVec.x !== 0 || moveVec.y !== 0) weaponAngle = Math.atan2(moveVec.y, moveVec.x);
                ctx.beginPath(); ctx.arc(playerScreen.x, playerScreen.y, player.radius, 0, Math.PI*2);
                ctx.fillStyle = dashActive ? '#e63946' : '#F4A261'; ctx.fill();
                ctx.strokeStyle = dashActive ? '#fff' : '#E76F51'; ctx.lineWidth = 3; ctx.stroke();

                if (currentWeapon === 'sniper') {
                    const gunLength = 25;
                    const gunEndX = playerScreen.x + Math.cos(weaponAngle) * gunLength;
                    const gunEndY = playerScreen.y + Math.sin(weaponAngle) * gunLength;
                    ctx.beginPath(); ctx.moveTo(playerScreen.x, playerScreen.y); ctx.lineTo(gunEndX, gunEndY);
                    ctx.strokeStyle = '#444'; ctx.lineWidth = 5; ctx.stroke();
                    ctx.beginPath(); ctx.arc(gunEndX, gunEndY, 4, 0, Math.PI*2);
                    ctx.fillStyle = '#333'; ctx.fill();
                } else if (currentWeapon === 'dagger') {
                    const bladeLength = 14;
                    const endX = playerScreen.x + Math.cos(weaponAngle) * bladeLength;
                    const endY = playerScreen.y + Math.sin(weaponAngle) * bladeLength;
                    ctx.beginPath(); ctx.moveTo(playerScreen.x, playerScreen.y); ctx.lineTo(endX, endY);
                    ctx.strokeStyle = '#C0C0C0'; ctx.lineWidth = 4; ctx.stroke();
                    const perpX = -Math.sin(weaponAngle), perpY = Math.cos(weaponAngle);
                    ctx.beginPath();
                    ctx.moveTo(playerScreen.x + perpX*4, playerScreen.y + perpY*4);
                    ctx.lineTo(playerScreen.x - perpX*4, playerScreen.y - perpY*4);
                    ctx.strokeStyle = '#888'; ctx.lineWidth = 2; ctx.stroke();
                } else if (currentWeapon === 'spray') {
                    const gunLength = 20;
                    const endX = playerScreen.x + Math.cos(weaponAngle) * gunLength;
                    const endY = playerScreen.y + Math.sin(weaponAngle) * gunLength;
                    ctx.beginPath(); ctx.moveTo(playerScreen.x, playerScreen.y); ctx.lineTo(endX, endY);
                    ctx.strokeStyle = '#333'; ctx.lineWidth = 5; ctx.stroke();
                    ctx.fillStyle = '#666';
                    ctx.fillRect(endX - 4, endY - 4, 8, 8);
                }

                const pBarW = player.radius*2, pBarH = 5;
                const pHpPct = player.health / player.maxHealth;
                ctx.fillStyle = '#333';
                ctx.fillRect(playerScreen.x - pBarW/2 -1, playerScreen.y - player.radius -14 -1, pBarW+2, pBarH+2);
                ctx.fillStyle = '#00e676';
                ctx.fillRect(playerScreen.x - pBarW/2, playerScreen.y - player.radius -14, pBarW * pHpPct, pBarH);

                if (skillFlashAlpha > 0) {
                    ctx.fillStyle = `rgba(255,255,255,${skillFlashAlpha})`;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }

                ctx.restore();

                // UI
                const totalSpeed = Math.hypot(moveVec.x * player.baseSpeed + recoilVelX, moveVec.y * player.baseSpeed + recoilVelY);
                let speedText = `Speed: ${Math.round(totalSpeed)} px/s`;
                if (dashActive) speedText += ' (DASH!)';
                if (daggerDashing || daggerSkillDashActive || spraySkillDashBackward) speedText += ' (LUNGE)';
                if (Math.abs(recoilVelX) > 0.5 || Math.abs(recoilVelY) > 0.5) speedText += ' (recoil)';
                ctx.font = 'bold 16px monospace'; ctx.fillStyle = 'white';
                ctx.shadowColor = 'black'; ctx.shadowBlur = 4;
                ctx.fillText(speedText, 20, 40);
                ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

                if (currentWeapon) {
                    let ammoText = '';
                    if (currentWeapon === 'dagger') {
                        ammoText = `Dagger (basic ${daggerCooldown > 0 ? 'CD '+Math.ceil(daggerCooldown) : 'ready'}, skill ${skillCooldown > 0 ? 'CD '+Math.ceil(skillCooldown) : 'ready'})`;
                    } else if (currentWeapon === 'spray') {
                        ammoText = `Spray: ${sprayState.ammo}/${sprayState.maxAmmo} | spares: ${sprayState.spare}`;
                        if (isReloading) ammoText += ' RELOADING...';
                        ammoText += ` (skill ${skillCooldown > 0 ? 'CD '+Math.ceil(skillCooldown) : 'ready'})`;
                    } else {
                        const state = currentWeapon === 'pistol' ? pistolState : (currentWeapon === 'shotgun' ? shotgunState : sniperState);
                        ammoText = `${currentWeapon}: ${state.ammo}/${state.maxAmmo} | spares: ${state.spare}`;
                        if (isReloading) ammoText += ' RELOADING...';
                    }
                    ctx.font = 'bold 16px monospace'; ctx.fillStyle = '#ffc107';
                    ctx.shadowColor = 'black'; ctx.shadowBlur = 4;
                    ctx.textAlign = 'right';
                    ctx.fillText(ammoText, canvas.width - 30, canvas.height - 80);
                    ctx.textAlign = 'start';
                    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
                }

                // Inventory
                const startX = 20, startY = 70, slotSize = 50, gap = 5;
                ctx.strokeStyle = 'white'; ctx.lineWidth = 2;
                for (let i = 0; i < 4; i++) {
                    const x = startX + i * (slotSize + gap);
                    if (inventory[i] && inventory[i].name === currentWeapon) {
                        ctx.fillStyle = 'rgba(255,255,255,0.2)';
                        ctx.fillRect(x, startY, slotSize, slotSize);
                    }
                    ctx.strokeRect(x, startY, slotSize, slotSize);
                    if (inventory[i]) {
                        ctx.font = '24px sans-serif'; ctx.fillStyle = 'white'; ctx.textAlign = 'center';
                        ctx.fillText(inventory[i].icon, x + slotSize/2, startY + slotSize/2 + 8);
                        ctx.textAlign = 'start';
                    }
                }
                ctx.font = '12px sans-serif'; ctx.fillStyle = 'white';
                ctx.fillText('INVENTORY (tap to switch)', startX, startY - 5);

                requestAnimationFrame(gameLoop);
            }

            restartButton.addEventListener('click', () => {
                player.worldX = canvas.width / 2;
                player.worldY = canvas.height / 2;
                player.health = player.maxHealth;
                player.isDead = false;
                cameraOffsetX = 0; cameraOffsetY = 0;
                recoilVelX = 0; recoilVelY = 0;
                dashActive = false; dashTimer = 0; cooldownTimer = 0;
                enemies.length = 0;
                playerBullets.length = 0;
                enemyBullets.length = 0;
                smokeClouds.length = 0;
                grenades.length = 0;
                daggerSkillExplosionQueue.length = 0;
                daggerSkillExplosions.length = 0;
                daggerSkillIndicators.length = 0;
                daggerDashing = false;
                daggerSkillDashActive = false;
                spraySkillActive = false;
                spraySkillDashBackward = false;
                spraySkillBulletsLeft = 0;
                pistolOnFloor.active = true;
                shotgunOnFloor.active = true;
                sniperOnFloor.active = true;
                daggerOnFloor.active = true;
                sprayOnFloor.active = true;
                deathScreen.style.display = 'none';
            });

            updateDashUI();
            requestAnimationFrame(gameLoop);
        })();
    </script>
</body>
</html>
