<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Infinite Plane | Full Restore + Shake & Sniper Buff</title>
    <style>
        body {
            margin: 0; overflow: hidden; background: #1a1a1a; touch-action: none; font-family: sans-serif;
        }
        canvas { display: block; background: #3a5a40; }
        .move-joystick-base {
            position: fixed; bottom: 40px; left: 100px; width: 120px; height: 120px;
            background: rgba(255,255,255,0.15); border: 3px solid rgba(255,255,255,0.6);
            border-radius: 50%; transform: translate(-50%,-50%); pointer-events: auto; z-index: 10;
        }
        .move-joystick-thumb {
            position: fixed; bottom: 40px; left: 100px; width: 50px; height: 50px;
            background: rgba(255,255,255,0.9); border-radius: 50%; transform: translate(-50%,-50%);
            pointer-events: none; z-index: 11; box-shadow: 0 0 8px rgba(0,0,0,0.5);
        }
        #shootBase {
            position: fixed; bottom: 230px; left: calc(100vw - 140px); width: 120px; height: 120px;
            background: rgba(255,200,100,0.15); border: 3px solid rgba(255,200,100,0.6);
            border-radius: 50%; transform: translate(-50%,-50%); pointer-events: auto; z-index: 10; display: none;
        }
        #shootThumb {
            position: fixed; bottom: 230px; left: calc(100vw - 140px); width: 50px; height: 50px;
            background: rgba(255,200,100,0.9); border-radius: 50%; transform: translate(-50%,-50%);
            pointer-events: none; z-index: 11; box-shadow: 0 0 8px rgba(0,0,0,0.5); display: none;
        }
        #skillBase {
            position: fixed; bottom: 370px; left: calc(100vw - 140px); width: 120px; height: 120px;
            background: rgba(100,150,255,0.15); border: 3px solid rgba(100,150,255,0.6);
            border-radius: 50%; transform: translate(-50%,-50%); pointer-events: auto; z-index: 10; display: none;
        }
        #skillThumb {
            position: fixed; bottom: 370px; left: calc(100vw - 140px); width: 50px; height: 50px;
            background: rgba(100,150,255,0.9); border-radius: 50%; transform: translate(-50%,-50%);
            pointer-events: none; z-index: 11; box-shadow: 0 0 8px rgba(0,0,0,0.5); display: none;
        }
        #dashButton {
            position: fixed; bottom: 30px; right: 30px; padding: 18px 28px; font-size: 1.2rem; font-weight: bold;
            color: white; background: #e63946; border: 4px solid white; border-radius: 50px;
            box-shadow: 0 0 20px rgba(0,0,0,0.6); cursor: pointer; z-index: 100;
            transition: background 0.2s, transform 0.1s; user-select: none; touch-action: manipulation;
        }
        #dashButton:active { transform: scale(0.95); }
        #dashButton.disabled { background: #555; border-color: #aaa; pointer-events: none; cursor: not-allowed; }
        #pickupButton {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 14px 28px;
            font-size: 1rem; font-weight: bold; color: white; background: #2a9d8f; border: 3px solid white;
            border-radius: 30px; cursor: pointer; z-index: 100; display: none; touch-action: manipulation;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        #spawnButton {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%); padding: 14px 28px;
            font-size: 1rem; font-weight: bold; color: white; background: #9c27b0; border: 3px solid white;
            border-radius: 30px; cursor: pointer; z-index: 100; box-shadow: 0 0 15px rgba(0,0,0,0.5); touch-action: manipulation;
        }
        #spawnSwordButton {
            position: fixed; top: 100px; left: 50%; transform: translateX(-50%); padding: 14px 28px;
            font-size: 1rem; font-weight: bold; color: white; background: #ff5722; border: 3px solid white;
            border-radius: 30px; cursor: pointer; z-index: 100; box-shadow: 0 0 15px rgba(0,0,0,0.5); touch-action: manipulation;
        }
        #spawnSprayButton {
            position: fixed; top: 170px; left: 50%; transform: translateX(-50%); padding: 14px 28px;
            font-size: 1rem; font-weight: bold; color: white; background: #0097a7; border: 3px solid white;
            border-radius: 30px; cursor: pointer; z-index: 100; box-shadow: 0 0 15px rgba(0,0,0,0.5); touch-action: manipulation;
        }
        #deathScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center;
            flex-direction: column; z-index: 200; color: white; font-size: 2rem; font-weight: bold;
        }
        #deathScreen button {
            margin-top: 20px; padding: 12px 24px; font-size: 1.2rem; cursor: pointer;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="move-joystick-base" id="moveBase"></div>
    <div class="move-joystick-thumb" id="moveThumb"></div>
    <div id="shootBase"></div>
    <div id="shootThumb"></div>
    <div id="skillBase"></div>
    <div id="skillThumb"></div>
    <button id="dashButton">DASH</button>
    <button id="pickupButton">PICK UP</button>
    <button id="spawnButton">SPAWN PISTOL</button>
    <button id="spawnSwordButton">SPAWN SWORD</button>
    <button id="spawnSprayButton">SPAWN SPRAY</button>
    <div id="deathScreen">
        <div>YOU DIED</div>
        <button id="restartButton">RESTART</button>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const dashButton = document.getElementById('dashButton');
            const pickupButton = document.getElementById('pickupButton');
            const spawnButton = document.getElementById('spawnButton');
            const spawnSwordButton = document.getElementById('spawnSwordButton');
            const spawnSprayButton = document.getElementById('spawnSprayButton');
            const deathScreen = document.getElementById('deathScreen');
            const restartButton = document.getElementById('restartButton');
            const moveBaseEl = document.getElementById('moveBase');
            const moveThumbEl = document.getElementById('moveThumb');
            const shootBaseEl = document.getElementById('shootBase');
            const shootThumbEl = document.getElementById('shootThumb');
            const skillBaseEl = document.getElementById('skillBase');
            const skillThumbEl = document.getElementById('skillThumb');

            // --- Canvas resize ---
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // --- Infinite world camera ---
            let cameraOffsetX = 0, cameraOffsetY = 0;
            const CAMERA_FOLLOW_SPEED = 1.5;

            // --- Player ---
            const player = {
                worldX: canvas.width / 2,
                worldY: canvas.height / 2,
                radius: 18,
                baseSpeed: 280,
                health: 100,
                maxHealth: 100,
                isDead: false
            };

            // --- Dash (movement ability) ---
            const dashDuration = 0.2;
            const maxDashSpeed = 400;
            const dashDecayRate = 18;
            const dashCooldown = 1.0;
            let dashActive = false, dashTimer = 0;
            let dashDirection = { x: 0, y: 0 };
            let cooldownTimer = 0;

            // --- Inventory & Weapons ---
            const inventory = [null, null, null, null];
            let currentWeapon = null;

            const pistolState = { ammo: 12, maxAmmo: 12, spare: 20, reloadTime: 1.2, fireRate: 0.45, bulletSpeed: 600, damage: 10 };
            const shotgunState = { ammo: 8, maxAmmo: 8, spare: 20, reloadTime: 1.8, pellets: 8, spreadAngle: Math.PI / 9, bulletSpeed: 500, damage: 8, recoilForce: 400 };
            // Sniper greatly buffed: faster bullet, more damage, flash effect via skillFlashAlpha
            const sniperState = { ammo: 5, maxAmmo: 5, spare: 10, reloadTime: 2.0, fireRate: 1.5, bulletSpeed: 6000, damage: 70, recoilForce: 600 };
            const daggerState = { damage: 25, dashDistance: 120, dashDuration: 0.12, cooldown: 0.7 };
            const sprayState = { ammo: 30, maxAmmo: 30, spare: 5, reloadTime: 1.5, burstCount: 3, burstFireRate: 0.06, burstCooldown: 0.25, bulletSpeed: 550, damage: 6, spread: 0.15 };

            let isReloading = false, reloadTimer = 0;
            let lastFireTime = 0;

            // Spray burst control
            let sprayBurstBulletsLeft = 0;
            let sprayBurstTimer = 0;
            let sprayNextBurstTime = 0;

            let skillCooldown = 0;
            let skillCooldownDuration = 0;

            // Dagger basic dash attack state
            let daggerDashing = false;
            let daggerDashTimer = 0;
            let daggerDashDirection = { x: 0, y: 0 };
            let daggerDashSpeed = 0;
            let daggerCooldown = 0;

            // Dagger skill: long dash + explosions
            let daggerSkillDashActive = false;
            let daggerSkillDashTimer = 0;
            let daggerSkillDashDuration = 0.35;
            let daggerSkillDashDistance = 380;
            let daggerSkillDashSpeed = 0;
            let daggerSkillDashDirection = { x: 0, y: 0 };
            let daggerSkillExplosionQueue = [];
            let daggerSkillExplosions = [];
            let daggerSkillIndicators = [];

            // Spray skill: backward dash + 40 bullets
            let spraySkillActive = false;
            let spraySkillDashBackward = false;
            let spraySkillDashTimer = 0;
            let spraySkillDashDuration = 0.25;
            let spraySkillDashDistance = 120;
            let spraySkillBulletCount = 40;
            let spraySkillSpread = 1.2;
            let spraySkillBulletsLeft = 0;
            let spraySkillFireRate = 0.03;
            let spraySkillNextFireTime = 0;
            let spraySkillAimDirX = 0, spraySkillAimDirY = 0;

            // --- Recoil ---
            let recoilVelX = 0, recoilVelY = 0;

            // --- Floor items ---
            let pistolOnFloor = { worldX: canvas.width/2 - 250, worldY: canvas.height/2 + 100, radius: 15, active: true, type: 'pistol' };
            let shotgunOnFloor = { worldX: canvas.width/2 + 250, worldY: canvas.height/2 + 100, radius: 15, active: true, type: 'shotgun' };
            let sniperOnFloor = { worldX: canvas.width/2, worldY: canvas.height/2 - 180, radius: 15, active: true, type: 'sniper' };
            let daggerOnFloor = { worldX: canvas.width/2 - 100, worldY: canvas.height/2 - 80, radius: 15, active: true, type: 'dagger' };
            let sprayOnFloor = { worldX: canvas.width/2 + 100, worldY: canvas.height/2 - 80, radius: 15, active: true, type: 'spray' };

            // --- Dummy ---
            const dummy = { worldX: canvas.width/2 + 50, worldY: canvas.height/2, radius: 30, health: 100, maxHealth: 100 };

            // --- Bullets, enemies, smoke clouds, grenades ---
            const playerBullets = [];
            const enemyBullets = [];
            const enemies = [];
            const smokeClouds = [];
            const grenades = [];

            // --- Houses (rectangles, L‑shapes) ---
            const houses = [];
            function generateHouses() {
                const numHouses = 20;
                for (let i = 0; i < numHouses; i++) {
                    let x, y, valid;
                    do {
                        x = (Math.random() - 0.5) * 2000;
                        y = (Math.random() - 0.5) * 2000;
                        valid = true;
                        if (Math.hypot(x - player.worldX, y - player.worldY) < 200) valid = false;
                        if (Math.hypot(x - dummy.worldX, y - dummy.worldY) < 100) valid = false;
                    } while (!valid);
                    const shape = Math.random() < 0.5 ? 'single' : 'L';
                    const rects = [];
                    const baseW = 60 + Math.random() * 40;
                    const baseH = 60 + Math.random() * 40;
                    if (shape === 'single') {
                        rects.push({ x: x - baseW/2, y: y - baseH/2, w: baseW, h: baseH });
                    } else {
                        const secondW = 40 + Math.random() * 30;
                        const secondH = 40 + Math.random() * 30;
                        rects.push({ x: x - baseW/2, y: y - baseH/2, w: baseW, h: baseH });
                        const side = Math.floor(Math.random() * 4);
                        if (side === 0) rects.push({ x: x - secondW/2, y: y - baseH/2 - secondH, w: secondW, h: secondH });
                        else if (side === 1) rects.push({ x: x + baseW/2, y: y - secondH/2, w: secondW, h: secondH });
                        else if (side === 2) rects.push({ x: x - secondW/2, y: y + baseH/2, w: secondW, h: secondH });
                        else rects.push({ x: x - baseW/2 - secondW, y: y - secondH/2, w: secondW, h: secondH });
                    }
                    houses.push(rects);
                }
            }
            generateHouses();

            // --- Sniper accuracy state ---
            let sniperSpread = 0.3;
            const SNIPER_MAX_SPREAD = 0.3, SNIPER_MIN_SPREAD = 0.0, SNIPER_SPREAD_RECOVERY = 0.3;
            let sniperAimAngle = 0;
            const SNIPER_OSCILLATION_SPEED = 2.5;

            // --- Effects ---
            let screenShake = 0, shakeDuration = 0;
            let skillFlashAlpha = 0;

            // ========== Joystick states ==========
            let movePointerId = null, moveBaseCenter = { x:0, y:0 }, moveMaxDist = 0;
            let moveVec = { x:0, y:0 };
            let shootPointerId = null, shootBaseCenter = { x:0, y:0 }, shootMaxDist = 0;
            let shootVec = { x:0, y:0 };
            let shootActive = false;
            let skillPointerId = null, skillBaseCenter = { x:0, y:0 }, skillMaxDist = 0;
            let skillVec = { x:0, y:0 };
            let skillActive = false;
            let skillTargetWorld = { x:0, y:0 };

            // ========== Joystick helpers ==========
            function updateMoveBase() {
                const rect = moveBaseEl.getBoundingClientRect();
                moveBaseCenter.x = rect.left + rect.width/2;
                moveBaseCenter.y = rect.top + rect.height/2;
                moveMaxDist = (rect.width/2) - (moveThumbEl.offsetWidth/2);
                if (moveMaxDist < 0) moveMaxDist = 0;
            }
            function updateShootBase() {
                const rect = shootBaseEl.getBoundingClientRect();
                shootBaseCenter.x = rect.left + rect.width/2;
                shootBaseCenter.y = rect.top + rect.height/2;
                shootMaxDist = (rect.width/2) - (shootThumbEl.offsetWidth/2);
                if (shootMaxDist < 0) shootMaxDist = 0;
            }
            function updateSkillBase() {
                const rect = skillBaseEl.getBoundingClientRect();
                skillBaseCenter.x = rect.left + rect.width/2;
                skillBaseCenter.y = rect.top + rect.height/2;
                skillMaxDist = (rect.width/2) - (skillThumbEl.offsetWidth/2);
                if (skillMaxDist < 0) skillMaxDist = 0;
            }
            function moveMoveThumb(cx, cy) {
                let dx = cx - moveBaseCenter.x, dy = cy - moveBaseCenter.y;
                let dist = Math.hypot(dx, dy);
                if (dist > moveMaxDist) { dx = (dx/dist)*moveMaxDist; dy = (dy/dist)*moveMaxDist; dist = moveMaxDist; }
                moveThumbEl.style.left = (moveBaseCenter.x + dx) + 'px';
                moveThumbEl.style.top = (moveBaseCenter.y + dy) + 'px';
                moveVec.x = dist > 1 ? dx / moveMaxDist : 0;
                moveVec.y = dist > 1 ? dy / moveMaxDist : 0;
            }
            function resetMoveThumb() {
                moveThumbEl.style.left = moveBaseCenter.x + 'px';
                moveThumbEl.style.top = moveBaseCenter.y + 'px';
                moveVec.x = 0; moveVec.y = 0; movePointerId = null;
            }
            function moveShootThumb(cx, cy) {
                let dx = cx - shootBaseCenter.x, dy = cy - shootBaseCenter.y;
                let dist = Math.hypot(dx, dy);
                if (dist > shootMaxDist) { dx = (dx/dist)*shootMaxDist; dy = (dy/dist)*shootMaxDist; dist = shootMaxDist; }
                shootThumbEl.style.left = (shootBaseCenter.x + dx) + 'px';
                shootThumbEl.style.top = (shootBaseCenter.y + dy) + 'px';
                shootVec.x = dist > 1 ? dx / shootMaxDist : 0;
                shootVec.y = dist > 1 ? dy / shootMaxDist : 0;
            }
            function resetShootThumb() {
                shootThumbEl.style.left = shootBaseCenter.x + 'px';
                shootThumbEl.style.top = shootBaseCenter.y + 'px';
                shootVec.x = 0; shootVec.y = 0; shootPointerId = null; shootActive = false;
            }
            function moveSkillThumb(cx, cy) {
                let dx = cx - skillBaseCenter.x, dy = cy - skillBaseCenter.y;
                let dist = Math.hypot(dx, dy);
                if (dist > skillMaxDist) { dx = (dx/dist)*skillMaxDist; dy = (dy/dist)*skillMaxDist; dist = skillMaxDist; }
                skillThumbEl.style.left = (skillBaseCenter.x + dx) + 'px';
                skillThumbEl.style.top = (skillBaseCenter.y + dy) + 'px';
                skillVec.x = dist > 1 ? dx / skillMaxDist : 0;
                skillVec.y = dist > 1 ? dy / skillMaxDist : 0;
                if (dist > 0) {
                    const range = currentWeapon === 'shotgun' ? 120 : (currentWeapon === 'dagger' ? daggerSkillDashDistance : 200);
                    const mag = Math.hypot(skillVec.x, skillVec.y);
                    skillTargetWorld.x = player.worldX + (skillVec.x / mag) * range;
                    skillTargetWorld.y = player.worldY + (skillVec.y / mag) * range;
                }
            }
            function resetSkillThumb() {
                skillThumbEl.style.left = skillBaseCenter.x + 'px';
                skillThumbEl.style.top = skillBaseCenter.y + 'px';
                skillVec.x = 0; skillVec.y = 0; skillPointerId = null; skillActive = false;
            }

            updateMoveBase(); updateShootBase(); updateSkillBase();
            window.addEventListener('resize', () => { updateMoveBase(); updateShootBase(); updateSkillBase(); });

            // ========== Movement joystick events ==========
            moveBaseEl.addEventListener('pointerdown', (e) => {
                if (e.target === moveBaseEl && movePointerId === null && !player.isDead) {
                    e.preventDefault();
                    movePointerId = e.pointerId;
                    moveBaseEl.setPointerCapture(e.pointerId);
                    updateMoveBase();
                    moveMoveThumb(e.clientX, e.clientY);
                }
            });
            moveBaseEl.addEventListener('pointermove', (e) => {
                if (movePointerId === e.pointerId) { e.preventDefault(); moveMoveThumb(e.clientX, e.clientY); }
            });
            const moveUp = (e) => {
                if (movePointerId === e.pointerId) { e.preventDefault(); resetMoveThumb(); moveBaseEl.releasePointerCapture(e.pointerId); }
            };
            moveBaseEl.addEventListener('pointerup', moveUp);
            moveBaseEl.addEventListener('pointercancel', moveUp);
            window.addEventListener('pointermove', (e) => { if (movePointerId === e.pointerId) moveMoveThumb(e.clientX, e.clientY); });
            window.addEventListener('pointerup', (e) => { if (movePointerId === e.pointerId) resetMoveThumb(); });

            // ========== Shooting & Skill joystick events ==========
            shootBaseEl.addEventListener('pointerdown', (e) => {
                if (e.target === shootBaseEl && shootPointerId === null && currentWeapon && !player.isDead) {
                    e.preventDefault();
                    shootPointerId = e.pointerId;
                    shootBaseEl.setPointerCapture(e.pointerId);
                    updateShootBase();
                    moveShootThumb(e.clientX, e.clientY);
                    shootActive = true;
                }
            });
            shootBaseEl.addEventListener('pointermove', (e) => {
                if (shootPointerId === e.pointerId) { e.preventDefault(); moveShootThumb(e.clientX, e.clientY); }
            });
            const shootUp = (e) => {
                if (shootPointerId === e.pointerId) {
                    e.preventDefault();
                    if (shootActive && !player.isDead) {
                        if (currentWeapon === 'dagger' && (shootVec.x !== 0 || shootVec.y !== 0)) {
                            triggerDaggerBasicDash();
                        } else if (shootVec.x !== 0 || shootVec.y !== 0) {
                            if (currentWeapon === 'shotgun') fireShotgun();
                            else if (currentWeapon === 'sniper') fireSniper();
                        }
                    }
                    resetShootThumb();
                    shootBaseEl.releasePointerCapture(e.pointerId);
                }
            };
            shootBaseEl.addEventListener('pointerup', shootUp);
            shootBaseEl.addEventListener('pointercancel', shootUp);
            window.addEventListener('pointermove', (e) => { if (shootPointerId === e.pointerId) moveShootThumb(e.clientX, e.clientY); });
            window.addEventListener('pointerup', (e) => {
                if (shootPointerId === e.pointerId) {
                    if (shootActive && !player.isDead && (shootVec.x !== 0 || shootVec.y !== 0)) {
                        if (currentWeapon === 'dagger') triggerDaggerBasicDash();
                        else if (currentWeapon === 'shotgun') fireShotgun();
                        else if (currentWeapon === 'sniper') fireSniper();
                    }
                    resetShootThumb();
                }
            });

            skillBaseEl.addEventListener('pointerdown', (e) => {
                if (e.target === skillBaseEl && skillPointerId === null && (currentWeapon === 'shotgun' || currentWeapon === 'sniper' || currentWeapon === 'dagger' || currentWeapon === 'spray') && skillCooldown <= 0 && !player.isDead) {
                    e.preventDefault();
                    skillPointerId = e.pointerId;
                    skillBaseEl.setPointerCapture(e.pointerId);
                    updateSkillBase();
                    moveSkillThumb(e.clientX, e.clientY);
                    skillActive = true;
                }
            });
            skillBaseEl.addEventListener('pointermove', (e) => {
                if (skillPointerId === e.pointerId) { e.preventDefault(); moveSkillThumb(e.clientX, e.clientY); }
            });
            const skillUp = (e) => {
                if (skillPointerId === e.pointerId) {
                    e.preventDefault();
                    if (skillActive && (skillVec.x !== 0 || skillVec.y !== 0) && !player.isDead) {
                        if (currentWeapon === 'shotgun') executeShotgunSkill();
                        else if (currentWeapon === 'sniper') executeSniperSkill();
                        else if (currentWeapon === 'dagger') executeDaggerLongDashSkill();
                        else if (currentWeapon === 'spray') executeSpraySkill();
                    }
                    resetSkillThumb();
                    skillBaseEl.releasePointerCapture(e.pointerId);
                }
            };
            skillBaseEl.addEventListener('pointerup', skillUp);
            skillBaseEl.addEventListener('pointercancel', skillUp);
            window.addEventListener('pointermove', (e) => { if (skillPointerId === e.pointerId) moveSkillThumb(e.clientX, e.clientY); });
            window.addEventListener('pointerup', (e) => {
                if (skillPointerId === e.pointerId) {
                    if (skillActive && (skillVec.x !== 0 || skillVec.y !== 0) && !player.isDead) {
                        if (currentWeapon === 'shotgun') executeShotgunSkill();
                        else if (currentWeapon === 'sniper') executeSniperSkill();
                        else if (currentWeapon === 'dagger') executeDaggerLongDashSkill();
                        else if (currentWeapon === 'spray') executeSpraySkill();
                    }
                    resetSkillThumb();
                }
            });

            // ========== Dash (movement ability) ==========
            function updateDashUI() {
                if (cooldownTimer > 0) { dashButton.textContent = 'COOLING...'; dashButton.classList.add('disabled'); }
                else if (dashActive) { dashButton.textContent = 'DASHING!'; dashButton.classList.add('disabled'); }
                else { dashButton.textContent = 'DASH'; dashButton.classList.remove('disabled'); }
            }
            function triggerDash() {
                if (cooldownTimer > 0 || dashActive || player.isDead) return;
                if (moveVec.x === 0 && moveVec.y === 0) return;
                const mag = Math.hypot(moveVec.x, moveVec.y);
                dashDirection.x = moveVec.x / mag;
                dashDirection.y = moveVec.y / mag;
                dashActive = true; dashTimer = 0;
                updateDashUI();
            }
            dashButton.addEventListener('pointerdown', (e) => { e.preventDefault(); triggerDash(); });
            dashButton.addEventListener('touchstart', (e) => { e.preventDefault(); triggerDash(); });

            // ========== Pickup ==========
            pickupButton.addEventListener('pointerdown', (e) => { e.preventDefault(); handlePickup(); });
            pickupButton.addEventListener('touchstart', (e) => { e.preventDefault(); handlePickup(); });

            function handlePickup() {
                let nearestItem = null, nearestDist = Infinity;
                const items = [pistolOnFloor, shotgunOnFloor, sniperOnFloor, daggerOnFloor, sprayOnFloor].filter(i => i.active);
                for (const item of items) {
                    const d = Math.hypot(player.worldX - item.worldX, player.worldY - item.worldY);
                    if (d < nearestDist) { nearestDist = d; nearestItem = item; }
                }
                if (nearestItem && nearestDist < 50) pickupWeapon(nearestItem);
            }

            function pickupWeapon(item) {
                const slot = inventory.findIndex(s => !s);
                if (slot === -1) return;
                const iconMap = { pistol: '🔫', shotgun: '🖖', sniper: '🔭', dagger: '🗡️', spray: '💥' };
                inventory[slot] = { name: item.type, icon: iconMap[item.type] };
                item.active = false;
                if (!currentWeapon) equipWeapon(item.type);
                shootBaseEl.style.display = 'block';
                shootThumbEl.style.display = 'block';
                updateShootBase();
                pickupButton.style.display = 'none';
            }

            function equipWeapon(type) {
                currentWeapon = type;
                isReloading = false;
                daggerDashing = false;
                daggerSkillDashActive = false;
                daggerSkillExplosionQueue = [];
                daggerSkillExplosions = [];
                daggerSkillIndicators = [];
                spraySkillActive = false;
                spraySkillDashBackward = false;
                spraySkillBulletsLeft = 0;
                if (type === 'shotgun' || type === 'sniper' || type === 'dagger' || type === 'spray') {
                    skillBaseEl.style.display = 'block';
                    skillThumbEl.style.display = 'block';
                    updateSkillBase();
                    skillCooldownDuration = type === 'shotgun' ? 1.0 : (type === 'sniper' ? 8.0 : (type === 'dagger' ? 7.0 : 6.0));
                    skillCooldown = 0;
                } else {
                    skillBaseEl.style.display = 'none';
                    skillThumbEl.style.display = 'none';
                }
                if (type === 'sniper') sniperSpread = SNIPER_MAX_SPREAD;
            }

            canvas.addEventListener('pointerdown', (e) => {
                const rect = canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                const startX = 20, startY = 70, slotSize = 50, gap = 5;
                for (let i = 0; i < 4; i++) {
                    const slotX = startX + i * (slotSize + gap);
                    if (mx >= slotX && mx <= slotX + slotSize && my >= startY && my <= startY + slotSize) {
                        if (inventory[i] && inventory[i].name !== currentWeapon) equipWeapon(inventory[i].name);
                    }
                }
            });

            function checkPickupProximity() {
                let near = false;
                [pistolOnFloor, shotgunOnFloor, sniperOnFloor, daggerOnFloor, sprayOnFloor].forEach(item => {
                    if (item.active && Math.hypot(player.worldX - item.worldX, player.worldY - item.worldY) < 50) near = true;
                });
                pickupButton.style.display = near ? 'block' : 'none';
            }

            // ========== Reload ==========
            function startReload() {
                if (isReloading || currentWeapon === 'dagger') return;
                const state = currentWeapon === 'pistol' ? pistolState : (currentWeapon === 'shotgun' ? shotgunState : (currentWeapon === 'sniper' ? sniperState : sprayState));
                if (state.ammo >= state.maxAmmo || state.spare <= 0) return;
                isReloading = true;
                reloadTimer = state.reloadTime;
            }
            function finishReload() {
                const state = currentWeapon === 'pistol' ? pistolState : (currentWeapon === 'shotgun' ? shotgunState : (currentWeapon === 'sniper' ? sniperState : sprayState));
                const needed = state.maxAmmo - state.ammo;
                const take = Math.min(needed, state.spare);
                state.ammo += take;
                state.spare -= take;
                isReloading = false;
            }

            // --- Collision with houses ---
            function resolveHouseCollisions(entity) {
                for (const house of houses) {
                    for (const rect of house) {
                        const closestX = Math.max(rect.x, Math.min(entity.worldX, rect.x + rect.w));
                        const closestY = Math.max(rect.y, Math.min(entity.worldY, rect.y + rect.h));
                        const dx = entity.worldX - closestX;
                        const dy = entity.worldY - closestY;
                        const dist = Math.hypot(dx, dy);
                        if (dist < entity.radius) {
                            const angle = Math.atan2(dy, dx);
                            const overlap = entity.radius - dist;
                            entity.worldX += Math.cos(angle) * overlap;
                            entity.worldY += Math.sin(angle) * overlap;
                        }
                    }
                }
            }

            // --- Dagger basic dash ---
            function triggerDaggerBasicDash() {
                if (daggerDashing || daggerCooldown > 0 || currentWeapon !== 'dagger' || player.isDead) return;
                const mag = Math.hypot(shootVec.x, shootVec.y);
                if (mag === 0) return;
                daggerDashDirection.x = shootVec.x / mag;
                daggerDashDirection.y = shootVec.y / mag;
                daggerDashSpeed = daggerState.dashDistance / daggerState.dashDuration;
                daggerDashing = true;
                daggerDashTimer = daggerState.dashDuration;
                screenShake = 3; shakeDuration = 0.1;
            }

            // --- Dagger long dash skill ---
            function executeDaggerLongDashSkill() {
                if (skillCooldown > 0 || daggerSkillDashActive || currentWeapon !== 'dagger' || player.isDead) return;
                const dirX = skillVec.x, dirY = skillVec.y;
                const mag = Math.hypot(dirX, dirY);
                if (mag === 0) return;
                daggerSkillDashDirection.x = dirX / mag;
                daggerSkillDashDirection.y = dirY / mag;
                daggerSkillDashSpeed = daggerSkillDashDistance / daggerSkillDashDuration;
                daggerSkillDashActive = true;
                daggerSkillDashTimer = daggerSkillDashDuration;
                skillCooldown = skillCooldownDuration;
                screenShake = 4; shakeDuration = 0.2;
            }

            // --- Spray skill (backward dash + 40 bullets) ---
            function executeSpraySkill() {
                if (skillCooldown > 0 || spraySkillActive || currentWeapon !== 'spray' || player.isDead) return;
                if (skillVec.x === 0 && skillVec.y === 0) return;
                const mag = Math.hypot(skillVec.x, skillVec.y);
                spraySkillAimDirX = skillVec.x / mag;
                spraySkillAimDirY = skillVec.y / mag;
                spraySkillDashBackward = true;
                spraySkillDashTimer = spraySkillDashDuration;
                spraySkillActive = true;
                spraySkillBulletsLeft = spraySkillBulletCount;
                spraySkillNextFireTime = performance.now() + 0.2;
                skillCooldown = skillCooldownDuration;
                screenShake = 8; shakeDuration = 0.3;
                skillFlashAlpha = 0.5;
            }

            // ========== Firing functions (with added shake for all) ==========
            function firePistol(now) {
                const state = pistolState;
                if (isReloading || state.ammo <= 0 || player.isDead) { if (state.ammo === 0) startReload(); return false; }
                if (now - lastFireTime < state.fireRate * 1000) return false;
                if (shootVec.x === 0 && shootVec.y === 0) return false;
                const mag = Math.hypot(shootVec.x, shootVec.y);
                const vx = (shootVec.x / mag) * state.bulletSpeed;
                const vy = (shootVec.y / mag) * state.bulletSpeed;
                playerBullets.push({ worldX: player.worldX, worldY: player.worldY, vx, vy, radius: 5, damage: state.damage, isBeam: false, sourceWeapon: 'pistol' });
                state.ammo--;
                lastFireTime = now;
                screenShake = 2; shakeDuration = 0.05;
                if (state.ammo === 0) startReload();
                return true;
            }
            function fireShotgun() {
                const state = shotgunState;
                if (isReloading || state.ammo <= 0 || player.isDead) { if (state.ammo === 0) startReload(); return; }
                const mag = Math.hypot(shootVec.x, shootVec.y);
                const dirX = shootVec.x / mag, dirY = shootVec.y / mag;
                for (let i = 0; i < state.pellets; i++) {
                    const angle = Math.atan2(dirY, dirX) + (Math.random()*2-1)*state.spreadAngle;
                    const speed = state.bulletSpeed + (Math.random()*100-50);
                    playerBullets.push({ worldX: player.worldX, worldY: player.worldY, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, radius: 3, damage: state.damage, isBeam: false, sourceWeapon: 'shotgun' });
                }
                state.ammo--;
                recoilVelX = -dirX * state.recoilForce;
                recoilVelY = -dirY * state.recoilForce;
                screenShake = 5; shakeDuration = 0.1;
                if (state.ammo === 0) startReload();
            }
            function fireSniper() {
                const state = sniperState;
                if (isReloading || state.ammo <= 0 || player.isDead) { if (state.ammo === 0) startReload(); return; }
                const mag = Math.hypot(shootVec.x, shootVec.y);
                const baseAngle = Math.atan2(shootVec.y, shootVec.x);
                const fireAngle = baseAngle + sniperAimAngle;
                const vx = Math.cos(fireAngle) * state.bulletSpeed;
                const vy = Math.sin(fireAngle) * state.bulletSpeed;
                playerBullets.push({ worldX: player.worldX, worldY: player.worldY, vx, vy, radius: 4, damage: state.damage, isBeam: true, sourceWeapon: 'sniper' });
                state.ammo--;
                recoilVelX = -Math.cos(fireAngle) * state.recoilForce;
                recoilVelY = -Math.sin(fireAngle) * state.recoilForce;
                screenShake = 18; shakeDuration = 0.3;
                skillFlashAlpha = 0.4; // muzzle flash
                lastFireTime = performance.now();
                if (state.ammo === 0) startReload();
            }

            // Shotgun skill (unchanged)
            function executeShotgunSkill() {
                if (skillCooldown > 0 || player.isDead) return;
                player.worldX = skillTargetWorld.x;
                player.worldY = skillTargetWorld.y;
                resolveHouseCollisions(player);
                const bulletCount = 32;
                for (let i = 0; i < bulletCount; i++) {
                    const angle = (i / bulletCount) * Math.PI * 2;
                    const speed = shotgunState.bulletSpeed;
                    playerBullets.push({ worldX: player.worldX, worldY: player.worldY, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, radius: 4, damage: shotgunState.damage * 0.7, isBeam: false, sourceWeapon: 'shotgun' });
                }
                screenShake = 10; shakeDuration = 0.3;
                skillFlashAlpha = 0.6;
                skillCooldown = skillCooldownDuration;
            }

            // Sniper skill: smoke grenade (unchanged)
            function executeSniperSkill() {
                if (skillCooldown > 0 || player.isDead) return;
                const angle = Math.atan2(skillTargetWorld.y - player.worldY, skillTargetWorld.x - player.worldX);
                const speed = 500;
                grenades.push({
                    worldX: player.worldX, worldY: player.worldY,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    targetX: skillTargetWorld.x, targetY: skillTargetWorld.y,
                    radius: 6, active: true

            }

            // ========== Enemy spawning (enemy spray dash removed) ==========
            function spawnPistolEnemy() {
                let worldX, worldY, valid;
                do {
                    worldX = player.worldX + (Math.random() - 0.5) * 800;

                    for (const house of houses) {

                enemies.push({

                });

            function spawnSwordEnemy() {

                do {

                    for (const house of houses) {

                });

            function spawnSprayEnemy() {
                let worldX, worldY, valid;

                    for (const house of houses) {
