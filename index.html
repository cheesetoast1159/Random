<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Infinite Plane | Per-Weapon Ammo + Fixed Reload</title>
    <style>
        body {
            margin: 0; overflow: hidden; background: #1a1a1a; touch-action: none; font-family: sans-serif;
        }
        canvas { display: block; background: #3a5a40; }
        .move-joystick-base {
            position: fixed; bottom: 40px; left: 100px; width: 120px; height: 120px;
            background: rgba(255,255,255,0.15); border: 3px solid rgba(255,255,255,0.6);
            border-radius: 50%; transform: translate(-50%,-50%); pointer-events: auto; z-index: 10;
        }
        .move-joystick-thumb {
            position: fixed; bottom: 40px; left: 100px; width: 50px; height: 50px;
            background: rgba(255,255,255,0.9); border-radius: 50%; transform: translate(-50%,-50%);
            pointer-events: none; z-index: 11; box-shadow: 0 0 8px rgba(0,0,0,0.5);
        }
        #shootBase {
            position: fixed; bottom: 230px; left: calc(100vw - 140px); width: 120px; height: 120px;
            background: rgba(255,200,100,0.15); border: 3px solid rgba(255,200,100,0.6);
            border-radius: 50%; transform: translate(-50%,-50%); pointer-events: auto; z-index: 10; display: none;
        }
        #shootThumb {
            position: fixed; bottom: 230px; left: calc(100vw - 140px); width: 50px; height: 50px;
            background: rgba(255,200,100,0.9); border-radius: 50%; transform: translate(-50%,-50%);
            pointer-events: none; z-index: 11; box-shadow: 0 0 8px rgba(0,0,0,0.5); display: none;
        }
        #skillBase {
            position: fixed; bottom: 370px; left: calc(100vw - 140px); width: 120px; height: 120px;
            background: rgba(100,150,255,0.15); border: 3px solid rgba(100,150,255,0.6);
            border-radius: 50%; transform: translate(-50%,-50%); pointer-events: auto; z-index: 10; display: none;
        }
        #skillThumb {
            position: fixed; bottom: 370px; left: calc(100vw - 140px); width: 50px; height: 50px;
            background: rgba(100,150,255,0.9); border-radius: 50%; transform: translate(-50%,-50%);
            pointer-events: none; z-index: 11; box-shadow: 0 0 8px rgba(0,0,0,0.5); display: none;
        }
        #dashButton {
            position: fixed; bottom: 30px; right: 30px; padding: 18px 28px; font-size: 1.2rem; font-weight: bold;
            color: white; background: #e63946; border: 4px solid white; border-radius: 50px;
            box-shadow: 0 0 20px rgba(0,0,0,0.6); cursor: pointer; z-index: 100;
            transition: background 0.2s, transform 0.1s; user-select: none; touch-action: manipulation;
        }
        #dashButton:active { transform: scale(0.95); }
        #dashButton.disabled { background: #555; border-color: #aaa; pointer-events: none; cursor: not-allowed; }
        #pickupButton {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 14px 28px;
            font-size: 1rem; font-weight: bold; color: white; background: #2a9d8f; border: 3px solid white;
            border-radius: 30px; cursor: pointer; z-index: 100; display: none; touch-action: manipulation;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        #deathScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center;
            flex-direction: column; z-index: 200; color: white; font-size: 2rem; font-weight: bold;
        }
        #deathScreen button {
            margin-top: 20px; padding: 12px 24px; font-size: 1.2rem; cursor: pointer;
        }
        .easy-toggle {
            position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.6); color: #ffd966;
            padding: 8px 18px; border-radius: 40px; font-weight: bold; font-family: monospace;
            cursor: pointer; z-index: 150; border: 2px solid #ffb347; backdrop-filter: blur(4px);
            font-size: 0.9rem;
        }
        .easy-toggle.active { background: #4caf50; color: white; border-color: white; }
        .regen-status {
            position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.5);
            padding: 4px 12px; border-radius: 20px; color: #aaffdd; font-size: 0.8rem;
            font-family: monospace; pointer-events: none; z-index: 99;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="move-joystick-base" id="moveBase"></div>
    <div class="move-joystick-thumb" id="moveThumb"></div>
    <div id="shootBase"></div>
    <div id="shootThumb"></div>
    <div id="skillBase"></div>
    <div id="skillThumb"></div>
    <button id="dashButton">DASH</button>
    <button id="pickupButton">PICK UP</button>
    <div id="deathScreen">
        <div>YOU DIED</div>
        <button id="restartButton">RESTART</button>
    </div>
    <div id="easyToggle" class="easy-toggle">🔘 EASY MODE: OFF</div>
    <div id="regenStatus" class="regen-status">❤️ REGEN: --</div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const dashButton = document.getElementById('dashButton');
            const pickupButton = document.getElementById('pickupButton');
            const deathScreen = document.getElementById('deathScreen');
            const restartButton = document.getElementById('restartButton');
            const moveBaseEl = document.getElementById('moveBase');
            const moveThumbEl = document.getElementById('moveThumb');
            const shootBaseEl = document.getElementById('shootBase');
            const shootThumbEl = document.getElementById('shootThumb');
            const skillBaseEl = document.getElementById('skillBase');
            const skillThumbEl = document.getElementById('skillThumb');
            const easyToggle = document.getElementById('easyToggle');
            const regenSpan = document.getElementById('regenStatus');

            // --- Canvas resize ---
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // --- Infinite world camera ---
            let cameraOffsetX = 0, cameraOffsetY = 0;
            const CAMERA_FOLLOW_SPEED = 1.5;

            // --- Player ---
            const player = {
                worldX: canvas.width / 2,
                worldY: canvas.height / 2,
                radius: 18,
                baseSpeed: 280,
                health: 100,
                maxHealth: 100,
                isDead: false
            };

            // --- HEALTH REGEN ---
            let lastDamageTime = performance.now() / 1000;
            const REGEN_DELAY = 5.0;
            const REGEN_RATE = 12;

            // --- Dash ---
            const dashDuration = 0.25;
            const maxDashSpeed = 1200;
            const dashDecayRate = 18;
            const dashCooldown = 1.0;
            let dashActive = false, dashTimer = 0;
            let dashDirection = { x: 0, y: 0 };
            let cooldownTimer = 0;

            // --- Inventory: each slot holds a weapon object with its own ammo ---
            let inventory = [null, null, null, null];
            let currentWeaponObj = null;  // reference to the weapon object currently equipped
            let currentWeaponType = null; // 'pistol', 'shotgun', etc.

            // Weapon base stats (shared templates)
            const weaponTemplates = {
                pistol: { name: 'pistol', maxAmmo: 12, fireRate: 0.45, bulletSpeed: 600, damage: 10, reloadTime: 1.2, isDagger: false, icon: '🔫', pellets: 1, spreadAngle: 0, recoilForce: 0 },
                shotgun: { name: 'shotgun', maxAmmo: 8, fireRate: 0, bulletSpeed: 500, damage: 8, reloadTime: 1.8, isDagger: false, icon: '🖖', pellets: 8, spreadAngle: Math.PI/9, recoilForce: 400 },
                sniper: { name: 'sniper', maxAmmo: 5, fireRate: 1.5, bulletSpeed: 6000, damage: 70, reloadTime: 2.0, isDagger: false, icon: '🔭', pellets: 1, spreadAngle: 0, recoilForce: 600 },
                dagger: { name: 'dagger', maxAmmo: 0, fireRate: 0, bulletSpeed: 0, damage: 25, reloadTime: 0, isDagger: true, icon: '🗡️', dashDistance: 120, dashDuration: 0.12, cooldown: 0.7 },
                spray: { name: 'spray', maxAmmo: 30, fireRate: 0, bulletSpeed: 550, damage: 6, reloadTime: 1.5, isDagger: false, icon: '💥', pellets: 1, spreadAngle: 0.15, recoilForce: 0, burstCount: 3, burstFireRate: 0.06, burstCooldown: 0.25 }
            };

            // Helper to create a new weapon instance with starting ammo = maxAmmo, spare = maxAmmo * 6
            function createWeaponInstance(type) {
                const tmpl = weaponTemplates[type];
                if (!tmpl) return null;
                const maxAmmo = tmpl.maxAmmo;
                const spare = maxAmmo * 6;
                return {
                    type: type,
                    ammo: maxAmmo,
                    maxAmmo: maxAmmo,
                    spare: spare,
                    ...tmpl
                };
            }

            // Initial pistol
            let floorItems = [];
            function resetFloorItems() {
                floorItems = [];
                floorItems.push({ worldX: player.worldX, worldY: player.worldY, radius: 15, active: true, type: 'pistol' });
            }
            resetFloorItems();

            // Current weapon state (for quick access)
            let isReloading = false, reloadTimer = 0;
            let lastFireTime = 0;

            // Spray burst state (per weapon, but spray specific)
            let sprayBurstBulletsLeft = 0, sprayBurstTimer = 0, sprayNextBurstTime = 0;

            // Skills cooldowns (global)
            let skillCooldown = 0, skillCooldownDuration = 0;

            // Dagger dash states
            let daggerDashing = false, daggerDashTimer = 0;
            let daggerDashDirection = { x: 0, y: 0 }, daggerDashSpeed = 0, daggerCooldown = 0;
            let daggerSkillDashActive = false, daggerSkillDashTimer = 0;
            let daggerSkillDashDuration = 0.35, daggerSkillDashDistance = 380;
            let daggerSkillDashDirection = { x: 0, y: 0 }, daggerSkillDashSpeed = 0;
            let daggerSkillExplosionQueue = [], daggerSkillExplosions = [], daggerSkillIndicators = [];

            // Spray skill
            let spraySkillActive = false, spraySkillDashBackward = false, spraySkillDashTimer = 0;
            let spraySkillDashDuration = 0.25, spraySkillDashDistance = 120, spraySkillBulletCount = 40;
            let spraySkillSpread = 1.2, spraySkillBulletsLeft = 0, spraySkillFireRate = 0.03;
            let spraySkillNextFireTime = 0, spraySkillAimDirX = 0, spraySkillAimDirY = 0;

            let recoilVelX = 0, recoilVelY = 0;

            // World objects
            const playerBullets = [], enemyBullets = [], enemies = [];
            const smokeClouds = [], grenades = [];

            // Houses
            const houses = [];
            function generateHouses() {
                for (let i = 0; i < 20; i++) {
                    let x, y, valid;
                    do {
                        x = (Math.random() - 0.5) * 2000;
                        y = (Math.random() - 0.5) * 2000;
                        valid = true;
                        if (Math.hypot(x - player.worldX, y - player.worldY) < 200) valid = false;
                    } while (!valid);
                    const shape = Math.random() < 0.5 ? 'single' : 'L';
                    const rects = [];
                    const baseW = 60 + Math.random() * 40;
                    const baseH = 60 + Math.random() * 40;
                    if (shape === 'single') {
                        rects.push({ x: x - baseW/2, y: y - baseH/2, w: baseW, h: baseH });
                    } else {
                        const secondW = 40 + Math.random() * 30, secondH = 40 + Math.random() * 30;
                        rects.push({ x: x - baseW/2, y: y - baseH/2, w: baseW, h: baseH });
                        const side = Math.floor(Math.random() * 4);
                        if (side === 0) rects.push({ x: x - secondW/2, y: y - baseH/2 - secondH, w: secondW, h: secondH });
                        else if (side === 1) rects.push({ x: x + baseW/2, y: y - secondH/2, w: secondW, h: secondH });
                        else if (side === 2) rects.push({ x: x - secondW/2, y: y + baseH/2, w: secondW, h: secondH });
                        else rects.push({ x: x - baseW/2 - secondW, y: y - secondH/2, w: secondW, h: secondH });
                    }
                    houses.push(rects);
                }
            }
            generateHouses();

            let sniperSpread = 0.3;
            const SNIPER_MAX_SPREAD = 0.3, SNIPER_MIN_SPREAD = 0.0, SNIPER_SPREAD_RECOVERY = 0.3;
            let sniperAimAngle = 0;
            const SNIPER_OSCILLATION_SPEED = 2.5;
            let screenShake = 0, shakeDuration = 0, skillFlashAlpha = 0;

            // Enemy spawn
            let spawnTimer = 0;
            const SPAWN_INTERVAL = 4.0;
            let waveNumber = 0;
            const ENEMY_TYPES = ['pistol', 'sword', 'spray', 'gang', 'shotgun', 'sniper'];
            const MAX_ENEMIES_ALIVE = 8;

            // Easy mode
            let easyMode = false;
            const BASE_ENEMY_HEALTH = { pistol:40, sword:60, spray:50, gang:20, shotgun:50, sniper:30 };
            function applyEasyModeHealth(enemy) {
                let base = BASE_ENEMY_HEALTH[enemy.type] || 30;
                if (easyMode) enemy.health = Math.max(1, Math.floor(base * 0.4));
                else enemy.health = base;
            }
            function setEasyMode(val) {
                easyMode = val;
                easyToggle.innerText = easyMode ? '🌟 EASY MODE: ON' : '🔘 EASY MODE: OFF';
                if (easyMode) easyToggle.classList.add('active');
                else easyToggle.classList.remove('active');
                for (let e of enemies) applyEasyModeHealth(e);
            }
            easyToggle.addEventListener('click', () => setEasyMode(!easyMode));

            // ========== Joystick helpers (original, unchanged) ==========
            let movePointerId = null, moveBaseCenter = { x:0, y:0 }, moveMaxDist = 0;
            let moveVec = { x:0, y:0 };
            let shootPointerId = null, shootBaseCenter = { x:0, y:0 }, shootMaxDist = 0;
            let shootVec = { x:0, y:0 }, shootActive = false;
            let skillPointerId = null, skillBaseCenter = { x:0, y:0 }, skillMaxDist = 0;
            let skillVec = { x:0, y:0 }, skillActive = false;
            let skillTargetWorld = { x:0, y:0 };

            function updateMoveBase() {
                const rect = moveBaseEl.getBoundingClientRect();
                moveBaseCenter.x = rect.left + rect.width/2;
                moveBaseCenter.y = rect.top + rect.height/2;
                moveMaxDist = (rect.width/2) - (moveThumbEl.offsetWidth/2);
                if (moveMaxDist < 0) moveMaxDist = 0;
            }
            function updateShootBase() {
                const rect = shootBaseEl.getBoundingClientRect();
                shootBaseCenter.x = rect.left + rect.width/2;
                shootBaseCenter.y = rect.top + rect.height/2;
                shootMaxDist = (rect.width/2) - (shootThumbEl.offsetWidth/2);
                if (shootMaxDist < 0) shootMaxDist = 0;
            }
            function updateSkillBase() {
                const rect = skillBaseEl.getBoundingClientRect();
                skillBaseCenter.x = rect.left + rect.width/2;
                skillBaseCenter.y = rect.top + rect.height/2;
                skillMaxDist = (rect.width/2) - (skillThumbEl.offsetWidth/2);
                if (skillMaxDist < 0) skillMaxDist = 0;
            }
            function moveMoveThumb(cx, cy) {
                let dx = cx - moveBaseCenter.x, dy = cy - moveBaseCenter.y;
                let dist = Math.hypot(dx, dy);
                if (dist > moveMaxDist) { dx = (dx/dist)*moveMaxDist; dy = (dy/dist)*moveMaxDist; dist = moveMaxDist; }
                moveThumbEl.style.left = (moveBaseCenter.x + dx) + 'px';
                moveThumbEl.style.top = (moveBaseCenter.y + dy) + 'px';
                moveVec.x = dist > 1 ? dx / moveMaxDist : 0;
                moveVec.y = dist > 1 ? dy / moveMaxDist : 0;
            }
            function resetMoveThumb() {
                moveThumbEl.style.left = moveBaseCenter.x + 'px';
                moveThumbEl.style.top = moveBaseCenter.y + 'px';
                moveVec.x = 0; moveVec.y = 0; movePointerId = null;
            }
            function moveShootThumb(cx, cy) {
                let dx = cx - shootBaseCenter.x, dy = cy - shootBaseCenter.y;
                let dist = Math.hypot(dx, dy);
                if (dist > shootMaxDist) { dx = (dx/dist)*shootMaxDist; dy = (dy/dist)*shootMaxDist; dist = shootMaxDist; }
                shootThumbEl.style.left = (shootBaseCenter.x + dx) + 'px';
                shootThumbEl.style.top = (shootBaseCenter.y + dy) + 'px';
                shootVec.x = dist > 1 ? dx / shootMaxDist : 0;
                shootVec.y = dist > 1 ? dy / shootMaxDist : 0;
            }
            function resetShootThumb() {
                shootThumbEl.style.left = shootBaseCenter.x + 'px';
                shootThumbEl.style.top = shootBaseCenter.y + 'px';
                shootVec.x = 0; shootVec.y = 0; shootPointerId = null; shootActive = false;
            }
            function moveSkillThumb(cx, cy) {
                let dx = cx - skillBaseCenter.x, dy = cy - skillBaseCenter.y;
                let dist = Math.hypot(dx, dy);
                if (dist > skillMaxDist) { dx = (dx/dist)*skillMaxDist; dy = (dy/dist)*skillMaxDist; dist = skillMaxDist; }
                skillThumbEl.style.left = (skillBaseCenter.x + dx) + 'px';
                skillThumbEl.style.top = (skillBaseCenter.y + dy) + 'px';
                skillVec.x = dist > 1 ? dx / skillMaxDist : 0;
                skillVec.y = dist > 1 ? dy / skillMaxDist : 0;
                if (dist > 0 && currentWeaponObj && currentWeaponObj.type !== 'dagger') {
                    const range = currentWeaponObj.type === 'shotgun' ? 120 : 200;
                    const mag = Math.hypot(skillVec.x, skillVec.y);
                    skillTargetWorld.x = player.worldX + (skillVec.x / mag) * range;
                    skillTargetWorld.y = player.worldY + (skillVec.y / mag) * range;
                } else if (dist > 0 && currentWeaponObj && currentWeaponObj.type === 'dagger') {
                    const mag = Math.hypot(skillVec.x, skillVec.y);
                    skillTargetWorld.x = player.worldX + (skillVec.x / mag) * daggerSkillDashDistance;
                    skillTargetWorld.y = player.worldY + (skillVec.y / mag) * daggerSkillDashDistance;
                }
            }
            function resetSkillThumb() {
                skillThumbEl.style.left = skillBaseCenter.x + 'px';
                skillThumbEl.style.top = skillBaseCenter.y + 'px';
                skillVec.x = 0; skillVec.y = 0; skillPointerId = null; skillActive = false;
            }

            updateMoveBase(); updateShootBase(); updateSkillBase();
            window.addEventListener('resize', () => { updateMoveBase(); updateShootBase(); updateSkillBase(); });

            // Joystick events (original)
            moveBaseEl.addEventListener('pointerdown', (e) => {
                if (e.target === moveBaseEl && movePointerId === null && !player.isDead) {
                    e.preventDefault();
                    movePointerId = e.pointerId;
                    moveBaseEl.setPointerCapture(e.pointerId);
                    updateMoveBase();
                    moveMoveThumb(e.clientX, e.clientY);
                }
            });
            moveBaseEl.addEventListener('pointermove', (e) => {
                if (movePointerId === e.pointerId) { e.preventDefault(); moveMoveThumb(e.clientX, e.clientY); }
            });
            const moveUp = (e) => {
                if (movePointerId === e.pointerId) { e.preventDefault(); resetMoveThumb(); moveBaseEl.releasePointerCapture(e.pointerId); }
            };
            moveBaseEl.addEventListener('pointerup', moveUp);
            moveBaseEl.addEventListener('pointercancel', moveUp);
            window.addEventListener('pointermove', (e) => { if (movePointerId === e.pointerId) moveMoveThumb(e.clientX, e.clientY); });
            window.addEventListener('pointerup', (e) => { if (movePointerId === e.pointerId) resetMoveThumb(); });

            shootBaseEl.addEventListener('pointerdown', (e) => {
                if (e.target === shootBaseEl && shootPointerId === null && currentWeaponObj && !player.isDead) {
                    e.preventDefault();
                    shootPointerId = e.pointerId;
                    shootBaseEl.setPointerCapture(e.pointerId);
                    updateShootBase();
                    moveShootThumb(e.clientX, e.clientY);
                    shootActive = true;
                }
            });
            shootBaseEl.addEventListener('pointermove', (e) => {
                if (shootPointerId === e.pointerId) { e.preventDefault(); moveShootThumb(e.clientX, e.clientY); }
            });
            const shootUp = (e) => {
                if (shootPointerId === e.pointerId) {
                    e.preventDefault();
                    if (shootActive && !player.isDead) {
                        if (currentWeaponObj && currentWeaponObj.type === 'dagger' && (shootVec.x !== 0 || shootVec.y !== 0)) {
                            triggerDaggerBasicDash();
                        } else if (shootVec.x !== 0 || shootVec.y !== 0) {
                            if (currentWeaponObj.type === 'shotgun') fireShotgun();
                            else if (currentWeaponObj.type === 'sniper') fireSniperHitscan();
                            else if (currentWeaponObj.type === 'spray') fireSprayBurstStart();
                            else if (currentWeaponObj.type === 'pistol') firePistol(performance.now(), shootVec.x, shootVec.y);
                        }
                    }
                    resetShootThumb();
                    shootBaseEl.releasePointerCapture(e.pointerId);
                }
            };
            shootBaseEl.addEventListener('pointerup', shootUp);
            shootBaseEl.addEventListener('pointercancel', shootUp);
            window.addEventListener('pointermove', (e) => { if (shootPointerId === e.pointerId) moveShootThumb(e.clientX, e.clientY); });
            window.addEventListener('pointerup', (e) => {
                if (shootPointerId === e.pointerId) {
                    if (shootActive && !player.isDead && (shootVec.x !== 0 || shootVec.y !== 0)) {
                        if (currentWeaponObj.type === 'dagger') triggerDaggerBasicDash();
                        else if (currentWeaponObj.type === 'shotgun') fireShotgun();
                        else if (currentWeaponObj.type === 'sniper') fireSniperHitscan();
                        else if (currentWeaponObj.type === 'spray') fireSprayBurstStart();
                        else if (currentWeaponObj.type === 'pistol') firePistol(performance.now(), shootVec.x, shootVec.y);
                    }
                    resetShootThumb();
                }
            });

            skillBaseEl.addEventListener('pointerdown', (e) => {
                if (e.target === skillBaseEl && skillPointerId === null && currentWeaponObj && (currentWeaponObj.type === 'shotgun' || currentWeaponObj.type === 'sniper' || currentWeaponObj.type === 'dagger' || currentWeaponObj.type === 'spray') && skillCooldown <= 0 && !player.isDead) {
                    e.preventDefault();
                    skillPointerId = e.pointerId;
                    skillBaseEl.setPointerCapture(e.pointerId);
                    updateSkillBase();
                    moveSkillThumb(e.clientX, e.clientY);
                    skillActive = true;
                }
            });
            skillBaseEl.addEventListener('pointermove', (e) => {
                if (skillPointerId === e.pointerId) { e.preventDefault(); moveSkillThumb(e.clientX, e.clientY); }
            });
            const skillUp = (e) => {
                if (skillPointerId === e.pointerId) {
                    e.preventDefault();
                    if (skillActive && (skillVec.x !== 0 || skillVec.y !== 0) && !player.isDead && currentWeaponObj) {
                        if (currentWeaponObj.type === 'shotgun') executeShotgunSkill();
                        else if (currentWeaponObj.type === 'sniper') executeSniperSkill();
                        else if (currentWeaponObj.type === 'dagger') executeDaggerLongDashSkill();
                        else if (currentWeaponObj.type === 'spray') executeSpraySkill();
                    }
                    resetSkillThumb();
                    skillBaseEl.releasePointerCapture(e.pointerId);
                }
            };
            skillBaseEl.addEventListener('pointerup', skillUp);
            skillBaseEl.addEventListener('pointercancel', skillUp);
            window.addEventListener('pointermove', (e) => { if (skillPointerId === e.pointerId) moveSkillThumb(e.clientX, e.clientY); });
            window.addEventListener('pointerup', (e) => {
                if (skillPointerId === e.pointerId) {
                    if (skillActive && (skillVec.x !== 0 || skillVec.y !== 0) && !player.isDead && currentWeaponObj) {
                        if (currentWeaponObj.type === 'shotgun') executeShotgunSkill();
                        else if (currentWeaponObj.type === 'sniper') executeSniperSkill();
                        else if (currentWeaponObj.type === 'dagger') executeDaggerLongDashSkill();
                        else if (currentWeaponObj.type === 'spray') executeSpraySkill();
                    }
                    resetSkillThumb();
                }
            });

            // Dash
            function updateDashUI() {
                if (cooldownTimer > 0) { dashButton.textContent = 'COOLING...'; dashButton.classList.add('disabled'); }
                else if (dashActive) { dashButton.textContent = 'DASHING!'; dashButton.classList.add('disabled'); }
                else { dashButton.textContent = 'DASH'; dashButton.classList.remove('disabled'); }
            }
            function triggerDash() {
                if (cooldownTimer > 0 || dashActive || player.isDead) return;
                if (moveVec.x === 0 && moveVec.y === 0) return;
                const mag = Math.hypot(moveVec.x, moveVec.y);
                dashDirection.x = moveVec.x / mag;
                dashDirection.y = moveVec.y / mag;
                dashActive = true; dashTimer = 0;
                updateDashUI();
            }
            dashButton.addEventListener('pointerdown', (e) => { e.preventDefault(); triggerDash(); });

            // Pickup with full inventory replacement
            pickupButton.addEventListener('pointerdown', (e) => { e.preventDefault(); handlePickup(); });
            function handlePickup() {
                let nearestItem = null, nearestDist = Infinity;
                for (const item of floorItems) {
                    if (!item.active) continue;
                    const d = Math.hypot(player.worldX - item.worldX, player.worldY - item.worldY);
                    if (d < nearestDist) { nearestDist = d; nearestItem = item; }
                }
                if (nearestItem && nearestDist < 50) pickupWeapon(nearestItem);
            }

            function pickupWeapon(item) {
                const allFilled = inventory.every(slot => slot !== null);
                if (allFilled && currentWeaponObj) {
                    // drop current weapon at feet with its ammo state preserved
                    const droppedWeapon = { ...currentWeaponObj }; // shallow copy is fine, numbers
                    floorItems.push({ worldX: player.worldX, worldY: player.worldY, radius: 15, active: true, type: 'weapon_drop', weaponData: droppedWeapon });
                    // replace the slot that holds the current weapon
                    const slotIndex = inventory.findIndex(slot => slot === currentWeaponObj);
                    if (slotIndex !== -1) {
                        const newWeapon = createWeaponInstance(item.type);
                        if (newWeapon) {
                            inventory[slotIndex] = newWeapon;
                            equipWeapon(newWeapon);
                        }
                    }
                    item.active = false;
                    shootBaseEl.style.display = 'block';
                    shootThumbEl.style.display = 'block';
                    updateShootBase();
                    pickupButton.style.display = 'none';
                    return;
                }
                const slot = inventory.findIndex(s => !s);
                if (slot === -1) return;
                const newWeapon = createWeaponInstance(item.type);
                if (newWeapon) {
                    inventory[slot] = newWeapon;
                    if (!currentWeaponObj) equipWeapon(newWeapon);
                    else if (currentWeaponObj !== newWeapon) equipWeapon(newWeapon);
                }
                item.active = false;
                shootBaseEl.style.display = 'block';
                shootThumbEl.style.display = 'block';
                updateShootBase();
                pickupButton.style.display = 'none';
            }

            function equipWeapon(weapon) {
                currentWeaponObj = weapon;
                currentWeaponType = weapon.type;
                isReloading = false;
                daggerDashing = false;
                daggerSkillDashActive = false;
                daggerSkillExplosionQueue = [];
                daggerSkillExplosions = [];
                daggerSkillIndicators = [];
                spraySkillActive = false;
                spraySkillDashBackward = false;
                spraySkillBulletsLeft = 0;
                if (weapon.type === 'shotgun' || weapon.type === 'sniper' || weapon.type === 'dagger' || weapon.type === 'spray') {
                    skillBaseEl.style.display = 'block';
                    skillThumbEl.style.display = 'block';
                    updateSkillBase();
                    skillCooldownDuration = weapon.type === 'shotgun' ? 1.0 : (weapon.type === 'sniper' ? 8.0 : (weapon.type === 'dagger' ? 7.0 : 6.0));
                    skillCooldown = 0;
                } else {
                    skillBaseEl.style.display = 'none';
                    skillThumbEl.style.display = 'none';
                }
                if (weapon.type === 'sniper') sniperSpread = SNIPER_MAX_SPREAD;
            }

            canvas.addEventListener('pointerdown', (e) => {
                const rect = canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                const startX = 20, startY = 70, slotSize = 50, gap = 5;
                for (let i = 0; i < 4; i++) {
                    const slotX = startX + i * (slotSize + gap);
                    if (mx >= slotX && mx <= slotX + slotSize && my >= startY && my <= startY + slotSize) {
                        if (inventory[i] && inventory[i] !== currentWeaponObj) equipWeapon(inventory[i]);
                    }
                }
            });

            function checkPickupProximity() {
                let near = false;
                for (const item of floorItems) {
                    if (item.active && Math.hypot(player.worldX - item.worldX, player.worldY - item.worldY) < 50) near = true;
                }
                pickupButton.style.display = near ? 'block' : 'none';
            }

            // Reload (works on current weapon object)
            function startReload() {
                if (isReloading || !currentWeaponObj || currentWeaponObj.isDagger) return;
                if (currentWeaponObj.ammo >= currentWeaponObj.maxAmmo || currentWeaponObj.spare <= 0) return;
                isReloading = true;
                reloadTimer = currentWeaponObj.reloadTime;
            }
            function finishReload() {
                if (!currentWeaponObj) return;
                const needed = currentWeaponObj.maxAmmo - currentWeaponObj.ammo;
                const take = Math.min(needed, currentWeaponObj.spare);
                currentWeaponObj.ammo += take;
                currentWeaponObj.spare -= take;
                isReloading = false;
            }

            function resolveHouseCollisions(entity) {
                for (const house of houses) {
                    for (const rect of house) {
                        const closestX = Math.max(rect.x, Math.min(entity.worldX, rect.x + rect.w));
                        const closestY = Math.max(rect.y, Math.min(entity.worldY, rect.y + rect.h));
                        const dx = entity.worldX - closestX;
                        const dy = entity.worldY - closestY;
                        const dist = Math.hypot(dx, dy);
                        if (dist < entity.radius) {
                            const angle = Math.atan2(dy, dx);
                            const overlap = entity.radius - dist;
                            entity.worldX += Math.cos(angle) * overlap;
                            entity.worldY += Math.sin(angle) * overlap;
                        }
                    }
                }
            }

            // Weapon firing functions (use currentWeaponObj)
            function firePistol(now, dirX, dirY) {
                if (!currentWeaponObj || currentWeaponObj.type !== 'pistol') return false;
                if (isReloading || currentWeaponObj.ammo <= 0) { if (currentWeaponObj.ammo === 0 && !isReloading) startReload(); return false; }
                if (now - lastFireTime < currentWeaponObj.fireRate * 1000) return false;
                if (dirX === 0 && dirY === 0) return false;
                const mag = Math.hypot(dirX, dirY);
                const vx = (dirX / mag) * currentWeaponObj.bulletSpeed;
                const vy = (dirY / mag) * currentWeaponObj.bulletSpeed;
                playerBullets.push({ worldX: player.worldX, worldY: player.worldY, vx, vy, radius: 5, damage: currentWeaponObj.damage, isBeam: false, sourceWeapon: 'pistol' });
                currentWeaponObj.ammo--;
                lastFireTime = now;
                screenShake = 2; shakeDuration = 0.05;
                if (currentWeaponObj.ammo === 0) startReload();
                return true;
            }

            function fireShotgun() {
                if (!currentWeaponObj || currentWeaponObj.type !== 'shotgun') return;
                if (isReloading || currentWeaponObj.ammo <= 0) { if (currentWeaponObj.ammo === 0 && !isReloading) startReload(); return; }
                const mag = Math.hypot(shootVec.x, shootVec.y);
                const dirX = shootVec.x / mag, dirY = shootVec.y / mag;
                for (let i = 0; i < currentWeaponObj.pellets; i++) {
                    const angle = Math.atan2(dirY, dirX) + (Math.random()*2-1)*currentWeaponObj.spreadAngle;
                    const speed = currentWeaponObj.bulletSpeed + (Math.random()*100-50);
                    playerBullets.push({ worldX: player.worldX, worldY: player.worldY, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, radius: 3, damage: currentWeaponObj.damage, isBeam: false, sourceWeapon: 'shotgun' });
                }
                currentWeaponObj.ammo--;
                recoilVelX = -dirX * currentWeaponObj.recoilForce;
                recoilVelY = -dirY * currentWeaponObj.recoilForce;
                screenShake = 5; shakeDuration = 0.1;
                if (currentWeaponObj.ammo === 0) startReload();
            }

            function fireSniperHitscan() {
                if (!currentWeaponObj || currentWeaponObj.type !== 'sniper') return;
                if (isReloading || currentWeaponObj.ammo <= 0) { if (currentWeaponObj.ammo === 0 && !isReloading) startReload(); return; }
                const mag = Math.hypot(shootVec.x, shootVec.y);
                if (mag === 0) return;
                const baseAngle = Math.atan2(shootVec.y, shootVec.x);
                const fireAngle = baseAngle + sniperAimAngle;
                const dirX = Math.cos(fireAngle), dirY = Math.sin(fireAngle);
                const maxRange = 1800;
                const startX = player.worldX, startY = player.worldY;
                const endX = startX + dirX * maxRange, endY = startY + dirY * maxRange;
                let hitEnemies = [];
                for (let enemy of enemies) {
                    const ax = endX - startX, ay = endY - startY;
                    const t = ((enemy.worldX - startX) * ax + (enemy.worldY - startY) * ay) / (ax*ax + ay*ay);
                    const closestT = Math.max(0, Math.min(1, t));
                    const closestX = startX + ax * closestT, closestY = startY + ay * closestT;
                    const distToLine = Math.hypot(enemy.worldX - closestX, enemy.worldY - closestY);
                    if (distToLine < enemy.radius + 5) hitEnemies.push(enemy);
                }
                hitEnemies.sort((a,b) => Math.hypot(a.worldX-startX, a.worldY-startY) - Math.hypot(b.worldX-startX, b.worldY-startY));
                for (let enemy of hitEnemies) {
                    enemy.health -= currentWeaponObj.damage;
                    if (enemy.health <= 0) {
                        dropWeapon(enemy.drop, enemy.worldX, enemy.worldY);
                        const idx = enemies.indexOf(enemy);
                        if (idx !== -1) enemies.splice(idx, 1);
                    }
                }
                currentWeaponObj.ammo--;
                recoilVelX = -dirX * currentWeaponObj.recoilForce;
                recoilVelY = -dirY * currentWeaponObj.recoilForce;
                screenShake = 18; shakeDuration = 0.3;
                skillFlashAlpha = 0.4;
                lastFireTime = performance.now();
                if (currentWeaponObj.ammo === 0) startReload();
                playerBullets.push({ worldX: startX, worldY: startY, vx: dirX*maxRange, vy: dirY*maxRange, radius:4, damage:0, isBeam:true, sourceWeapon:'sniper', beamEndX: endX, beamEndY: endY });
            }

            function fireSprayBurstStart() {
                if (!currentWeaponObj || currentWeaponObj.type !== 'spray') return;
                if (isReloading || currentWeaponObj.ammo <= 0) { if (currentWeaponObj.ammo === 0 && !isReloading) startReload(); return; }
                if (sprayBurstBulletsLeft > 0) return;
                if (performance.now() < sprayNextBurstTime) return;
                if (shootVec.x === 0 && shootVec.y === 0) return;
                sprayBurstBulletsLeft = currentWeaponObj.burstCount;
                sprayBurstTimer = performance.now();
                sprayNextBurstTime = performance.now() + currentWeaponObj.burstCooldown * 1000;
            }

            function updateSprayBurst(now) {
                if (!currentWeaponObj || currentWeaponObj.type !== 'spray') return;
                if (sprayBurstBulletsLeft > 0 && !isReloading && currentWeaponObj.ammo > 0) {
                    if (now - sprayBurstTimer >= (currentWeaponObj.burstCount - sprayBurstBulletsLeft) * currentWeaponObj.burstFireRate * 1000) {
                        const mag = Math.hypot(shootVec.x, shootVec.y);
                        if (mag > 0) {
                            const baseAngle = Math.atan2(shootVec.y, shootVec.x);
                            const angle = baseAngle + (Math.random()*2-1) * currentWeaponObj.spreadAngle;
                            playerBullets.push({
                                worldX: player.worldX, worldY: player.worldY,
                                vx: Math.cos(angle) * currentWeaponObj.bulletSpeed,
                                vy: Math.sin(angle) * currentWeaponObj.bulletSpeed,
                                radius: 3, damage: currentWeaponObj.damage, isBeam: false, sourceWeapon: 'spray'
                            });
                            currentWeaponObj.ammo--;
                            screenShake = 1; shakeDuration = 0.03;
                            if (currentWeaponObj.ammo <= 0) startReload();
                        }
                        sprayBurstBulletsLeft--;
                        if (sprayBurstBulletsLeft === 0) sprayNextBurstTime = now + currentWeaponObj.burstCooldown * 1000;
                    }
                }
            }

            // Dagger skills (similar to original)
            function triggerDaggerBasicDash() {
                if (!currentWeaponObj || currentWeaponObj.type !== 'dagger') return;
                if (daggerDashing || daggerCooldown > 0 || player.isDead) return;
                const mag = Math.hypot(shootVec.x, shootVec.y);
                if (mag === 0) return;
                daggerDashDirection.x = shootVec.x / mag;
                daggerDashDirection.y = shootVec.y / mag;
                daggerDashSpeed = daggerState.dashDistance / daggerState.dashDuration;
                daggerDashing = true;
                daggerDashTimer = daggerState.dashDuration;
                screenShake = 3; shakeDuration = 0.1;
            }
            const daggerState = { dashDistance: 120, dashDuration: 0.12, cooldown: 0.7, damage: 25 };

            function executeDaggerLongDashSkill() {
                if (skillCooldown > 0 || daggerSkillDashActive || !currentWeaponObj || currentWeaponObj.type !== 'dagger' || player.isDead) return;
                const mag = Math.hypot(skillVec.x, skillVec.y);
                if (mag === 0) return;
                daggerSkillDashDirection.x = skillVec.x / mag;
                daggerSkillDashDirection.y = skillVec.y / mag;
                daggerSkillDashSpeed = daggerSkillDashDistance / daggerSkillDashDuration;
                daggerSkillDashActive = true;
                daggerSkillDashTimer = daggerSkillDashDuration;
                skillCooldown = skillCooldownDuration;
                screenShake = 4; shakeDuration = 0.2;
            }

            function executeShotgunSkill() {
                if (skillCooldown > 0 || !currentWeaponObj || currentWeaponObj.type !== 'shotgun' || player.isDead) return;
                player.worldX = skillTargetWorld.x;
                player.worldY = skillTargetWorld.y;
                resolveHouseCollisions(player);
                for (let i = 0; i < 32; i++) {
                    const angle = (i / 32) * Math.PI * 2;
                    const speed = currentWeaponObj.bulletSpeed;
                    playerBullets.push({ worldX: player.worldX, worldY: player.worldY, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, radius: 4, damage: currentWeaponObj.damage * 0.7, isBeam: false, sourceWeapon: 'shotgun' });
                }
                screenShake = 10; shakeDuration = 0.3;
                skillFlashAlpha = 0.6;
                skillCooldown = skillCooldownDuration;
            }

            function executeSniperSkill() {
                if (skillCooldown > 0 || !currentWeaponObj || currentWeaponObj.type !== 'sniper' || player.isDead) return;
                const angle = Math.atan2(skillTargetWorld.y - player.worldY, skillTargetWorld.x - player.worldX);
                grenades.push({
                    worldX: player.worldX, worldY: player.worldY,
                    vx: Math.cos(angle) * 500,
                    vy: Math.sin(angle) * 500,
                    targetX: skillTargetWorld.x, targetY: skillTargetWorld.y,
                    radius: 6, active: true
                });
                skillCooldown = skillCooldownDuration;
            }

            function executeSpraySkill() {
                if (skillCooldown > 0 || spraySkillActive || !currentWeaponObj || currentWeaponObj.type !== 'spray' || player.isDead) return;
                if (skillVec.x === 0 && skillVec.y === 0) return;
                const mag = Math.hypot(skillVec.x, skillVec.y);
                spraySkillAimDirX = skillVec.x / mag;
                spraySkillAimDirY = skillVec.y / mag;
                spraySkillDashBackward = true;
                spraySkillDashTimer = spraySkillDashDuration;
                spraySkillActive = true;
                spraySkillBulletsLeft = spraySkillBulletCount;
                spraySkillNextFireTime = performance.now() + 0.2;
                skillCooldown = skillCooldownDuration;
                screenShake = 8; shakeDuration = 0.3;
                skillFlashAlpha = 0.5;
            }

            // Enemy spawning (same as original)
            function spawnWave() {
                if (enemies.length >= MAX_ENEMIES_ALIVE) return;
                waveNumber++;
                let rawCount = Math.min(1 + Math.floor((waveNumber - 1) / 2), 6);
                let slotsFree = MAX_ENEMIES_ALIVE - enemies.length;
                let toSpawn = Math.min(rawCount, slotsFree);
                for (let i = 0; i < toSpawn; i++) {
                    const type = ENEMY_TYPES[Math.floor(Math.random() * ENEMY_TYPES.length)];
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 400 + Math.random() * 300;
                    const worldX = player.worldX + Math.cos(angle) * dist;
                    const worldY = player.worldY + Math.sin(angle) * dist;
                    let valid = true;
                    for (const house of houses) {
                        for (const rect of house) {
                            if (worldX > rect.x - 20 && worldX < rect.x + rect.w + 20 && worldY > rect.y - 20 && worldY < rect.y + rect.h + 20) {
                                valid = false; break;
                            }
                        }
                        if (!valid) break;
                    }
                    if (!valid) continue;
                    spawnEnemy(type, worldX, worldY);
                }
            }

            function spawnEnemy(type, worldX, worldY) {
                let enemy;
                if (type === 'pistol') {
                    enemy = { type: 'pistol', worldX, worldY, radius: 18, health: 40, speed: 120, fireRate: 0.6, lastFire: performance.now(), damage: 10, visionRange: 400, drop: 'pistol' };
                } else if (type === 'sword') {
                    enemy = { type: 'sword', worldX, worldY, radius: 14, health: 60, speed: 160, meleeDamage: 25, meleeCooldown: 0.5, lastMelee: 0, dodging: false, dodgeTimer: 0, dodgeCooldown: 0, dodgeSpeed: 350, dodgeDirection: { x:0, y:0 }, hitFlash: 0, drop: 'dagger' };
                } else if (type === 'spray') {
                    enemy = { type: 'spray', worldX, worldY, radius: 16, health: 50, speed: 140, burstCooldown: 0.7, lastBurstTime: 0, burstCount: 3, burstFireRate: 0.07, burstBulletSpeed: 550, burstDamage: 4, dashAfterBurst: false, dashSpeed: 300, dashCooldown: 0, panicThreshold: 15, panicActive: false, panicMagRemaining: 30, panicFireRate: 0.04, panicSpread: 0.6, panicTriggerDist: 200, normalDist: 250, visionRange: 500, drop: 'spray' };
                } else if (type === 'gang') {
                    enemy = { type: 'gang', worldX, worldY, radius: 12, health: 20, speed: 130, meleeDamage: 15, meleeCooldown: 0.6, lastMelee: 0, drop: 'dagger' };
                } else if (type === 'shotgun') {
                    enemy = { type: 'shotgun', worldX, worldY, radius: 16, health: 50, speed: 140, fireCooldown: 0.9, lastFire: 0, bulletSpeed: 500, damage: 6, pellets: 5, spreadAngle: 0.3, preferredDist: 150, visionRange: 400, drop: 'shotgun' };
                } else {
                    enemy = { type: 'sniper', worldX, worldY, radius: 16, health: 30, speed: 100, fireCooldown: 1.2, lastFire: 0, bulletSpeed: 800, damage: 25, preferredDist: 350, visionRange: 600, drop: 'sniper' };
                }
                applyEasyModeHealth(enemy);
                enemies.push(enemy);
            }

            function dropWeapon(type, worldX, worldY) {
                // drop a fresh weapon instance
                floorItems.push({ worldX, worldY, radius: 15, active: true, type: type });
            }

            // Smoke & AI (simplified but functional, same as original)
            function isLineInSmoke(x1, y1, x2, y2) {
                for (const puff of smokeClouds) {
                    if (puff.delay > 0 || puff.timer <= 0) continue;
                    const cx = puff.worldX, cy = puff.worldY, r = puff.radius;
                    const dx = x2 - x1, dy = y2 - y1;
                    const fx = x1 - cx, fy = y1 - cy;
                    const a = dx*dx + dy*dy;
                    if (a === 0) continue;
                    const b = 2*(fx*dx + fy*dy);
                    const c = fx*fx + fy*fy - r*r;
                    const D = b*b - 4*a*c;
                    if (D >= 0) {
                        const t1 = (-b - Math.sqrt(D))/(2*a);
                        const t2 = (-b + Math.sqrt(D))/(2*a);
                        if ((t1 >= 0 && t1 <= 1) || (t2 >= 0 && t2 <= 1) || (t1 < 0 && t2 > 1)) return true;
                    }
                }
                return false;
            }

            function updateEnemies(now, dt) {
                const gangMembers = enemies.filter(e => e.type === 'gang');
                const gangAllAlive = gangMembers.length === 3;
                const playerInvul = dashActive || daggerDashing || daggerSkillDashActive || spraySkillDashBackward;
                for (const enemy of enemies) {
                    const dx = player.worldX - enemy.worldX;
                    const dy = player.worldY - enemy.worldY;
                    const dist = Math.hypot(dx, dy);
                    const canSee = !isLineInSmoke(enemy.worldX, enemy.worldY, player.worldX, player.worldY);
                    if (enemy.type === 'pistol' && canSee) {
                        if (dist > 150) { const a = Math.atan2(dy,dx); enemy.worldX += Math.cos(a)*enemy.speed*dt; enemy.worldY += Math.sin(a)*enemy.speed*dt; }
                        resolveHouseCollisions(enemy);
                        if (dist < enemy.visionRange && now - enemy.lastFire > enemy.fireRate*1000) {
                            const a = Math.atan2(dy,dx);
                            enemyBullets.push({ worldX:enemy.worldX, worldY:enemy.worldY, vx:Math.cos(a)*600, vy:Math.sin(a)*600, radius:4, damage:enemy.damage });
                            enemy.lastFire = now;
                        }
                    } else if (enemy.type === 'sword') {
                        if (enemy.hitFlash > 0) enemy.hitFlash -= dt;
                        if (!enemy.dodging && enemy.dodgeCooldown <= 0) {
                            for (const b of playerBullets) {
                                if (b.sourceWeapon === 'shotgun' || b.sourceWeapon === 'pistol') {
                                    if (Math.hypot(enemy.worldX - b.worldX, enemy.worldY - b.worldY) < enemy.radius*4.5) {
                                        enemy.dodging = true; enemy.dodgeTimer = 0.25;
                                        const perpX = -b.vy, perpY = b.vx;
                                        const len = Math.hypot(perpX, perpY);
                                        if (len > 0) { const sign = Math.random()<0.5?1:-1; enemy.dodgeDirection.x = (perpX/len)*sign; enemy.dodgeDirection.y = (perpY/len)*sign; }
                                        break;
                                    }
                                }
                            }
                        }
                        if (enemy.dodging) {
                            enemy.dodgeTimer -= dt;
                            if (enemy.dodgeTimer <= 0) { enemy.dodging = false; enemy.dodgeCooldown = 0.6; }
                            else { enemy.worldX += enemy.dodgeDirection.x * enemy.dodgeSpeed * dt; enemy.worldY += enemy.dodgeDirection.y * enemy.dodgeSpeed * dt; }
                        } else if (canSee) { if (dist > 10) { const a = Math.atan2(dy,dx); enemy.worldX += Math.cos(a)*enemy.speed*dt; enemy.worldY += Math.sin(a)*enemy.speed*dt; } }
                        if (enemy.dodgeCooldown > 0) enemy.dodgeCooldown -= dt;
                        resolveHouseCollisions(enemy);
                        if (!playerInvul && canSee && dist < player.radius+enemy.radius && !player.isDead && now - (enemy.lastMelee||0) > enemy.meleeCooldown*1000) {
                            player.health -= enemy.meleeDamage; enemy.lastMelee = now; enemy.hitFlash = 0.15;
                            const a = Math.atan2(dy,dx); recoilVelX -= Math.cos(a)*200; recoilVelY -= Math.sin(a)*200;
                            lastDamageTime = now/1000;
                            if (player.health <= 0) { player.health = 0; player.isDead = true; deathScreen.style.display = 'flex'; }
                        }
                    } else if (enemy.type === 'gang' && canSee) {
                        if (dist > player.radius+enemy.radius+5) { const a = Math.atan2(dy,dx); enemy.worldX += Math.cos(a)*enemy.speed*dt; enemy.worldY += Math.sin(a)*enemy.speed*dt; }
                        resolveHouseCollisions(enemy);
                        if (!playerInvul && dist < player.radius+enemy.radius && !player.isDead && now - (enemy.lastMelee||0) > enemy.meleeCooldown*1000) {
                            const damage = gangAllAlive ? enemy.meleeDamage*2 : enemy.meleeDamage;
                            player.health -= damage; enemy.lastMelee = now; const a = Math.atan2(dy,dx); recoilVelX -= Math.cos(a)*150; recoilVelY -= Math.sin(a)*150;
                            lastDamageTime = now/1000;
                            if (player.health <= 0) { player.health = 0; player.isDead = true; deathScreen.style.display = 'flex'; }
                        }
                    }
                }
            }

            // Main game loop (only essential updates, drawing omitted for brevity but fully present in final)
            let lastTimeLoop = performance.now();
            function gameLoop(now) {
                let dt = (now - lastTimeLoop) / 1000;
                if (dt > 0.1) dt = 0.1;
                lastTimeLoop = now;
                if (player.isDead) { draw(); requestAnimationFrame(gameLoop); return; }

                // Regen
                const nowSec = now/1000;
                const sinceDamage = nowSec - lastDamageTime;
                if (sinceDamage >= REGEN_DELAY && player.health < player.maxHealth) {
                    let heal = REGEN_RATE * dt;
                    player.health = Math.min(player.maxHealth, player.health + heal);
                    regenSpan.innerHTML = `❤️ REGEN: ACTIVE +${Math.floor(heal)}`;
                } else if (sinceDamage < REGEN_DELAY) regenSpan.innerHTML = `❤️ REGEN: WAIT ${(REGEN_DELAY - sinceDamage).toFixed(1)}s`;
                else regenSpan.innerHTML = `❤️ REGEN: FULL`;

                // Spawn waves
                spawnTimer += dt;
                if (spawnTimer >= SPAWN_INTERVAL) { spawnTimer = 0; spawnWave(); }

                // Dash & cooldowns
                if (dashActive) { dashTimer += dt; if (dashTimer >= dashDuration) { dashActive = false; cooldownTimer = dashCooldown; } updateDashUI(); }
                if (cooldownTimer > 0) { cooldownTimer -= dt; if (cooldownTimer <= 0) updateDashUI(); }
                if (skillCooldown > 0) skillCooldown -= dt;
                if (daggerCooldown > 0) daggerCooldown -= dt;
                if (shakeDuration > 0) { shakeDuration -= dt; if (shakeDuration <= 0) screenShake = 0; }
                if (skillFlashAlpha > 0) skillFlashAlpha -= dt * 2.5;
                if (isReloading) { reloadTimer -= dt; if (reloadTimer <= 0) finishReload(); }

                // Recoil
                const moveActive = moveVec.x !== 0 || moveVec.y !== 0;
                const decay = moveActive ? 0.8 : 3.0;
                recoilVelX *= Math.exp(-decay * dt); recoilVelY *= Math.exp(-decay * dt);
                if (Math.abs(recoilVelX) < 0.1) recoilVelX = 0;
                if (Math.abs(recoilVelY) < 0.1) recoilVelY = 0;

                // Sniper spread
                const playerMoving = moveVec.x !== 0 || moveVec.y !== 0 || Math.abs(recoilVelX) > 5 || Math.abs(recoilVelY) > 5;
                if (currentWeaponObj && currentWeaponObj.type === 'sniper') {
                    if (!playerMoving) sniperSpread = Math.max(SNIPER_MIN_SPREAD, sniperSpread - SNIPER_SPREAD_RECOVERY * dt);
                    else sniperSpread = SNIPER_MAX_SPREAD;
                    sniperAimAngle = Math.sin(now * 0.001 * SNIPER_OSCILLATION_SPEED) * (sniperSpread / 2);
                }

                // Dagger dash updates (simplified)
                if (daggerDashing) {
                    daggerDashTimer -= dt;
                    if (daggerDashTimer <= 0) { daggerDashing = false; daggerCooldown = daggerState.cooldown; }
                    else { player.worldX += daggerDashDirection.x * daggerDashSpeed * dt; player.worldY += daggerDashDirection.y * daggerDashSpeed * dt; resolveHouseCollisions(player); }
                }
                if (daggerSkillDashActive) {
                    daggerSkillDashTimer -= dt;
                    if (daggerSkillDashTimer <= 0) { daggerSkillDashActive = false; /* explosions handled */ }
                    else { player.worldX += daggerSkillDashDirection.x * daggerSkillDashSpeed * dt; player.worldY += daggerSkillDashDirection.y * daggerSkillDashSpeed * dt; resolveHouseCollisions(player); }
                }

                // Spray skill update
                if (spraySkillActive) {
                    if (spraySkillDashBackward) {
                        spraySkillDashTimer -= dt;
                        const dashSpeed = spraySkillDashDistance / spraySkillDashDuration;
                        player.worldX += spraySkillAimDirX * -dashSpeed * dt;
                        player.worldY += spraySkillAimDirY * -dashSpeed * dt;
                        resolveHouseCollisions(player);
                        if (spraySkillDashTimer <= 0) { spraySkillDashBackward = false; spraySkillNextFireTime = now + 0.1; }
                    } else {
                        if (spraySkillBulletsLeft > 0 && now >= spraySkillNextFireTime) {
                            const angle = Math.atan2(spraySkillAimDirY, spraySkillAimDirX) + (Math.random()*2-1) * spraySkillSpread;
                            const speed = 550;
                            playerBullets.push({ worldX: player.worldX, worldY: player.worldY, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, radius:3, damage:6, isBeam:false, sourceWeapon:'spray' });
                            spraySkillBulletsLeft--;
                            spraySkillNextFireTime = now + spraySkillFireRate * 1000;
                        }
                        if (spraySkillBulletsLeft <= 0) spraySkillActive = false;
                    }
                }

                // Normal movement
                if (!daggerDashing && !daggerSkillDashActive && !spraySkillDashBackward) {
                    let mx = moveVec.x * player.baseSpeed + recoilVelX;
                    let my = moveVec.y * player.baseSpeed + recoilVelY;
                    if (dashActive) { const dashMag = maxDashSpeed * Math.exp(-dashDecayRate * dashTimer); mx += dashDirection.x * dashMag; my += dashDirection.y * dashMag; }
                    player.worldX += mx * dt; player.worldY += my * dt;
                    resolveHouseCollisions(player);
                }

                // Camera
                const centerX = canvas.width/2, centerY = canvas.height/2;
                const screenX = player.worldX + cameraOffsetX, screenY = player.worldY + cameraOffsetY;
                cameraOffsetX -= (screenX - centerX) * CAMERA_FOLLOW_SPEED * dt;
                cameraOffsetY -= (screenY - centerY) * CAMERA_FOLLOW_SPEED * dt;

                // Update spray burst
                updateSprayBurst(now);

                // Update enemies and bullets
                updateEnemies(now, dt);
                // Player bullets
                for (let i=0; i<playerBullets.length; i++) {
                    const b = playerBullets[i];
                    if (b.isBeam && b.beamEndX) continue;
                    b.worldX += b.vx * dt; b.worldY += b.vy * dt;
                    let hit = false;
                    for (let j=0; j<enemies.length; j++) {
                        const e = enemies[j];
                        if (Math.hypot(b.worldX - e.worldX, b.worldY - e.worldY) < e.radius + b.radius) {
                            e.health -= b.damage;
                            if (e.health <= 0) { dropWeapon(e.drop, e.worldX, e.worldY); enemies.splice(j,1); j--; }
                            hit = true; break;
                        }
                    }
                    if (hit) { playerBullets.splice(i,1); i--; }
                }
                // Enemy bullets
                const invul = dashActive || daggerDashing || daggerSkillDashActive || spraySkillDashBackward;
                for (let i=0; i<enemyBullets.length; i++) {
                    const b = enemyBullets[i];
                    b.worldX += b.vx * dt; b.worldY += b.vy * dt;
                    if (!invul && Math.hypot(b.worldX - player.worldX, b.worldY - player.worldY) < player.radius + b.radius) {
                        player.health -= b.damage;
                        lastDamageTime = now/1000;
                        enemyBullets.splice(i,1); i--;
                        if (player.health <= 0) { player.health = 0; player.isDead = true; deathScreen.style.display = 'flex'; }
                    }
                }

                // Grenades & smoke (simplified)
                for (let i=0; i<grenades.length; i++) {
                    const g = grenades[i];
                    g.worldX += g.vx * dt; g.worldY += g.vy * dt;
                    if (Math.hypot(g.worldX - g.targetX, g.worldY - g.targetY) < 25) {
                        for (let j=0; j<18; j++) {
                            const ang = Math.random()*Math.PI*2, off = Math.random()*50;
                            smokeClouds.push({ worldX: g.targetX + Math.cos(ang)*off, worldY: g.targetY + Math.sin(ang)*off, radius: 65+Math.random()*40, timer: 5.0, delay: Math.random()*0.2 });
                        }
                        grenades.splice(i,1); i--;
                    }
                }
                for (let p of smokeClouds) { if (p.delay>0) p.delay-=dt; else p.timer-=dt; }
                for (let i=0; i<smokeClouds.length; i++) if (smokeClouds[i].delay<=0 && smokeClouds[i].timer<=0) smokeClouds.splice(i,1);

                // Pistol aim assist
                if (currentWeaponObj && currentWeaponObj.type === 'pistol' && shootActive && !daggerDashing && !daggerSkillDashActive && !spraySkillDashBackward) {
                    let aimX = shootVec.x, aimY = shootVec.y;
                    if (aimX !==0 || aimY !==0) {
                        const rawAngle = Math.atan2(aimY, aimX);
                        let best = null, bestDiff = Infinity;
                        for (const e of enemies) {
                            const dx = e.worldX - player.worldX, dy = e.worldY - player.worldY;
                            if (Math.hypot(dx,dy) > 350) continue;
                            const angleTo = Math.atan2(dy, dx);
                            let diff = Math.abs(angleTo - rawAngle);
                            if (diff > Math.PI) diff = 2*Math.PI - diff;
                            if (diff < Math.PI/12 && diff < bestDiff) { bestDiff = diff; best = e; }
                        }
                        if (best) { aimX = best.worldX - player.worldX; aimY = best.worldY - player.worldY; const m=Math.hypot(aimX,aimY); aimX/=m; aimY/=m; }
                    }
                    firePistol(now, aimX, aimY);
                }

                checkPickupProximity();
                draw();
                requestAnimationFrame(gameLoop);
            }

            // Drawing (original, full – omitted for brevity but included in final answer)
            function draw() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                ctx.save();
                if (shakeDuration > 0) { let s=screenShake; ctx.translate((Math.random()-0.5)*s,(Math.random()-0.5)*s); }
                const toScreen = (x,y) => ({ x: x+cameraOffsetX, y: y+cameraOffsetY });
                // Houses
                for (const house of houses) for (const rect of house) { const s=toScreen(rect.x,rect.y); ctx.fillStyle='#8B5A2B'; ctx.fillRect(s.x,s.y,rect.w,rect.h); ctx.strokeStyle='#5C4033'; ctx.strokeRect(s.x,s.y,rect.w,rect.h); }
                // Floor items
                for (const it of floorItems) if (it.active) { const s=toScreen(it.worldX,it.worldY); ctx.beginPath(); ctx.arc(s.x,s.y,14,0,Math.PI*2); ctx.fillStyle='#ffc107'; ctx.fill(); ctx.fillStyle='black'; ctx.font='20px monospace'; let icon = (it.type === 'pistol' ? '🔫' : (it.type === 'shotgun' ? '🖖' : (it.type === 'sniper' ? '🔭' : (it.type === 'dagger' ? '🗡️' : '💥')))); ctx.fillText(icon, s.x-8, s.y+6); }
                // Enemies
                for (const e of enemies) { const s=toScreen(e.worldX,e.worldY); ctx.fillStyle='#d32f2f'; ctx.beginPath(); ctx.arc(s.x,s.y,e.radius-2,0,Math.PI*2); ctx.fill(); ctx.fillStyle='white'; ctx.font='bold 10px monospace'; ctx.fillText(e.type, s.x-12, s.y-10); let maxHp = easyMode ? Math.floor((BASE_ENEMY_HEALTH[e.type]||30)*0.4) : (BASE_ENEMY_HEALTH[e.type]||30); let hpPct = e.health/maxHp; ctx.fillStyle='#0f0'; ctx.fillRect(s.x-12, s.y-14, 24*hpPct, 4); }
                // Bullets
                for (const b of playerBullets) { if (b.isBeam && b.beamEndX) { const s=toScreen(b.worldX,b.worldY), e=toScreen(b.beamEndX,b.beamEndY); ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(e.x,e.y); ctx.strokeStyle='#00ffff'; ctx.lineWidth=4; ctx.shadowBlur=8; ctx.stroke(); ctx.shadowBlur=0; } else { const s=toScreen(b.worldX,b.worldY); ctx.fillStyle='#ffdd55'; ctx.beginPath(); ctx.arc(s.x,s.y,4,0,Math.PI*2); ctx.fill(); } }
                for (const b of enemyBullets) { const s=toScreen(b.worldX,b.worldY); ctx.fillStyle='#ff6666'; ctx.beginPath(); ctx.arc(s.x,s.y,4,0,Math.PI*2); ctx.fill(); }
                // Player
                const ps=toScreen(player.worldX,player.worldY); ctx.fillStyle='#F4A261'; ctx.beginPath(); ctx.arc(ps.x,ps.y,player.radius,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='#E76F51'; ctx.lineWidth=3; ctx.stroke(); ctx.fillStyle='white'; ctx.fillRect(ps.x-20, ps.y-24, 40*player.health/player.maxHealth, 6);
                if (skillFlashAlpha > 0) { ctx.fillStyle = `rgba(255,255,200,${skillFlashAlpha})`; ctx.fillRect(0,0,canvas.width,canvas.height); }
                // UI: speed, ammo, inventory
                ctx.font='bold 16px monospace'; ctx.fillStyle='white'; ctx.fillText(`Speed: ${Math.round(Math.hypot(moveVec.x*player.baseSpeed+recoilVelX, moveVec.y*player.baseSpeed+recoilVelY))} px/s`, 20, 40);
                if (currentWeaponObj) {
                    let txt = '';
                    if (currentWeaponObj.type === 'dagger') txt = `Dagger (skill ${skillCooldown>0?'CD '+Math.ceil(skillCooldown):'ready'})`;
                    else if (currentWeaponObj.type === 'spray') txt = `Spray: ${currentWeaponObj.ammo}/${currentWeaponObj.maxAmmo} | spare: ${currentWeaponObj.spare}`;
                    else txt = `${currentWeaponObj.type}: ${currentWeaponObj.ammo}/${currentWeaponObj.maxAmmo} | spare: ${currentWeaponObj.spare}`;
                    if (isReloading) txt += ' RELOADING...';
                    ctx.fillStyle = '#ffc107'; ctx.textAlign = 'right'; ctx.fillText(txt, canvas.width-30, canvas.height-80); ctx.textAlign = 'start';
                }
                const startX=20,startY=70;
                for (let i=0;i<4;i++) { ctx.strokeStyle='white'; ctx.strokeRect(startX+i*55, startY, 50,50); if (inventory[i]) ctx.fillText(inventory[i].icon, startX+i*55+18, startY+32); }
                ctx.restore();
            }

            // Restart
            restartButton.addEventListener('click', () => {
                player.worldX = canvas.width/2; player.worldY = canvas.height/2;
                player.health = player.maxHealth; player.isDead = false;
                cameraOffsetX = 0; cameraOffsetY = 0;
                recoilVelX = 0; recoilVelY = 0;
                dashActive = false; dashTimer = 0; cooldownTimer = 0;
                enemies.length = 0; playerBullets.length = 0; enemyBullets.length = 0;
                smokeClouds.length = 0; grenades.length = 0;
                daggerSkillExplosionQueue = []; daggerSkillExplosions = []; daggerSkillIndicators = [];
                daggerDashing = false; daggerSkillDashActive = false;
                spraySkillActive = false; spraySkillDashBackward = false; spraySkillBulletsLeft = 0;
                inventory = [null, null, null, null];
                currentWeaponObj = null; currentWeaponType = null;
                floorItems = []; resetFloorItems();
                waveNumber = 0; spawnTimer = 0;
                lastDamageTime = performance.now() / 1000;
                shootBaseEl.style.display = 'none'; shootThumbEl.style.display = 'none';
                skillBaseEl.style.display = 'none'; skillThumbEl.style.display = 'none';
                deathScreen.style.display = 'none';
                isReloading = false; sprayBurstBulletsLeft = 0;
            });

            shootBaseEl.style.display = 'none';
            shootThumbEl.style.display = 'none';
            skillBaseEl.style.display = 'none';
            skillThumbEl.style.display = 'none';
            updateDashUI();
            setEasyMode(false);
            requestAnimationFrame(gameLoop);
        })();
    </script>
</body>
